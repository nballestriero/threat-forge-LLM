schema_version: "1.0"

change_control:
  decided_by:
    - "DEC-0013"
  satisfies:
    - "REQ-0022"
  rationale: >
    This governed baseline artifact declares its internal traceability marker so
    deterministic validation can compare file-local change-control metadata with
    graph.matrix.yml relationships.

schema_control:
  schema: "docs/reference/project-model/schemas/graph-matrix.schema.json"
  rationale: >
    The graph matrix declares the canonical schema that validates its structural
    shape so schema-to-artifact application can be checked bidirectionally
    against graph.matrix.yml.

matrix:
  id: "project-graph-matrix"
  title: "Project graph matrix"
  status: "draft"
  description: >
    Canonical matrix of governed Subject-Predicate-Object relationships for
    traceability, coherence, conflicts, implementation links, test links,
    validation commands, and future graph import.

