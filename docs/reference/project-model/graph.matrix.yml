schema_version: "1.0"

matrix:
  id: "project-graph-matrix"
  title: "Project graph matrix"
  status: "draft"
  description: >
    Canonical matrix of governed Subject-Predicate-Object relationships for
    traceability, coherence, conflicts, implementation links, test links,
    validation commands, and future graph import.

nodes:
  - id: "GATE-DOCS-STRUCTURE"
    type: "Gate"
    description: "Gate that validates the governed documentation folder and file layout."

  - id: "GATE-DOCS-CHECK"
    type: "Gate"
    description: "Aggregate documentation gate."

  - id: "GATE-PRE-COMMIT"
    type: "Gate"
    description: "Git pre-commit gate that runs documentation checks."

  - id: "GATE-PROJECT-MODEL"
    type: "Gate"
    description: "Gate that validates the compact project model and bidirectional traceability."

  - id: "GATE-DOCS-FORMAT"
    type: "Gate"
    description: "Gate that validates governed YAML and Markdown file formats."

  - id: "GATE-VALIDATOR-NEGATIVE-FIXTURES"
    type: "Gate"
    description: "Gate that proves validators reject controlled negative fixtures."

  - id: "CMD-DOCS-CHECK-STRUCTURE"
    type: "Command"
    command: "npm run docs:check:structure"
    description: "Runs the documentation structure guard."

  - id: "CMD-DOCS-CHECK"
    type: "Command"
    command: "npm run docs:check"
    description: "Runs all documentation checks."

  - id: "CMD-PRECOMMIT"
    type: "Command"
    command: "npm run precommit"
    description: "Runs the repository pre-commit validation command."

  - id: "CMD-DOCS-CHECK-FORMAT"
    type: "Command"
    command: "npm run docs:check:format"
    description: "Runs governed YAML and Markdown file format validation."

  - id: "CMD-PROJECT-MODEL-CHECK"
    type: "Command"
    command: "npm run docs:check:model"
    description: "Runs compact project model and bidirectional traceability validation."

  - id: "CMD-CHECK"
    type: "Command"
    command: "npm run check"
    description: "Runs the repository-level aggregate check command."

  - id: "CMD-DOCS-TEST-NEGATIVE"
    type: "Command"
    command: "npm run docs:test:negative"
    description: "Runs controlled validator negative fixtures."

  - id: "TOOL-DOCS-STRUCTURE-GUARD"
    type: "ValidationTool"
    path: "tools/docs/check-docs-structure.mjs"
    description: "Deterministic documentation structure guard."

  - id: "TOOL-PROJECT-MODEL-CHECK"
    type: "ValidationTool"
    path: "tools/docs/check-project-model.mjs"
    description: "Deterministic project model and bidirectional traceability validator."

  - id: "TOOL-DOCS-FORMAT-CHECK"
    type: "ValidationTool"
    path: "tools/docs/check-docs-format.mjs"
    description: "Deterministic governed YAML and Markdown file format validator."

  - id: "TOOL-VALIDATOR-NEGATIVE-FIXTURES"
    type: "ValidationTool"
    path: "tools/docs/check-validator-negative-fixtures.mjs"
    description: "Deterministic runner for controlled validator negative fixtures."

