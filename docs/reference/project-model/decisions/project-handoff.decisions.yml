decisions:
- id: DEC-0011
  title: Project handoff archives are generated by a Node.js repository tool
  status: accepted
  statement: 'Project handoff archives shall be generated by a deterministic Node.js repository tool
    that includes .git and hidden project metadata while excluding dependency installations, generated
    artifacts, local IDE caches, and environment files by default.

    '
  rationale: 'A repository-owned tool avoids platform-specific archive behavior and gives human and
    LLM handoffs a repeatable archive policy on Windows, Linux, and macOS.

    '
  consequences:
  - The handoff archive command is declared in package.json.
  - The archive policy includes .git by default.
  - Dependency installations and local caches are excluded by default.
  - Environment files remain excluded unless explicitly requested.
