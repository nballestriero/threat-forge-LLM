schema_version: '1.0'
change_control:
  decided_by:
  - graph-traceability:DEC-0029
  satisfies:
  - graph-traceability:REQ-0038
  rationale: This graph part is loaded through the governed graph index as part of the complete modular
    project-model layout.
schema_control:
  schema: docs/reference/project-model/schemas/graph-part.schema.json
  rationale: The graph part declares the canonical schema that validates modular graph part shape
    through check-docs-format.mjs.
part:
  area_id: global
  title: Global and cross-area graph part
  status: draft
  description: Cross-area graph nodes and relationships.
