        trigger: "The backend source tree has not been introduced."
        steps:
          - id: "FLOW-REQ-0010-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Keeps the requirement approved but not implemented."
            expected_result: "No runtime checker is required until backend files exist."

    postconditions:
      - id: "POST-REQ-0010-001"
        statement: "Backend architecture violations are detectable by deterministic tooling."

    acceptance_criteria:
      - id: "AC-REQ-0010-001"
        statement: "The checker detects controller or route-handler imports of concrete infrastructure
          adapters."

      - id: "AC-REQ-0010-002"
        statement: "The checker detects direct concrete adapter construction outside approved factories
          or composition roots."

      - id: "AC-REQ-0010-003"
        statement: "The checker can be added to the repository aggregate check command when backend
          code exists."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "source-comment"

