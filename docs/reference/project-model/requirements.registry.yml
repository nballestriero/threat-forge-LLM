  - id: "REQ-0040"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"
    title: "Modular project model loader design"
    statement: >
      The project shall define the modular project-model loader and aggregation
      design before implementing index-and-part loading or extracting the first
      project-model area.
    rationale: >
      Requirements, graph traceability, and decisions have separate
      modularization contracts. Without a shared loader design, each future
      extraction could invent its own discovery, canonical ID, and aggregation
      rules. A loader design establishes one logical project model assembled
      from governed indexes and declared parts while preserving the existing
      validation responsibility split.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0040-001"
        statement: "REQ-0034 defines the overall project model modularization direction."
      - id: "PRE-REQ-0040-002"
        statement: "REQ-0036 enforces the project_model_areas taxonomy before modular parts rely broadly
          on area_id values."
      - id: "PRE-REQ-0040-003"
        statement: "REQ-0037, REQ-0038, and REQ-0039 define the requirements, graph, and decisions
          modularization contracts."

    main_flow:
      - id: "FLOW-REQ-0040-001"
        step: 1
        actor: "Project model maintainer"
        action: "Defines central index files as the only stable loading boundary for modular requirements,
          graph, and decisions parts."
        expected_result: "Future validators load declared parts through governed indexes instead of
          scanning directories ad hoc."
      - id: "FLOW-REQ-0040-002"
        step: 2
        actor: "Project model maintainer"
        action: "Defines canonical <area_id>:<local_id> derivation for modular requirements, macro
          requirements, graph entities, and decisions."
        expected_result: "Local identifiers may restart per area only after the loader constructs
          globally resolvable canonical identifiers."
      - id: "FLOW-REQ-0040-003"
        step: 3
        actor: "Project model maintainer"
        action: "Defines how check-project-model.mjs will eventually aggregate index and part files
          into one logical project model before semantic validation."
        expected_result: "Semantic checks remain centralized and operate on the aggregated model rather
          than on isolated part files."

    alternative_flows:
      - id: "ALT-REQ-0040-001"
        title: "Temporary migration state needed to keep gates green"
        trigger: "A future extraction cannot update every schema, part, graph reference, and validator
          in one atomic edit without a short transitional state."
        steps:
          - id: "FLOW-REQ-0040-ALT-001"
            step: 1
            actor: "Project model maintainer"
            action: "Allows temporary dual handling only inside the controlled migration micropass
              and records the cleanup boundary."
            expected_result: "The project avoids permanent compatibility with the monolithic layout
              while preserving deterministic gates during the migration step."

    postconditions:
      - id: "POST-REQ-0040-001"
        statement: "docs/reference/project-model/schema-design/modular-project-model-loader-design.md
          defines the future modular loader and aggregation model."
      - id: "POST-REQ-0040-002"
        statement: "No requirements, graph triples, or decisions are migrated before the loader implementation
          and first extraction micropasses."

    acceptance_criteria:
      - id: "AC-REQ-0040-001"
        statement: "The design document defines central index files as the future loading boundary
          for modular project-model parts."
      - id: "AC-REQ-0040-002"
        statement: "The design document defines one logical aggregated project model built from requirements,
          graph, governance, and decision parts."
      - id: "AC-REQ-0040-003"
        statement: "The design document defines canonical <area_id>:<local_id> derivation and duplicate
          detection responsibilities."
      - id: "AC-REQ-0040-004"
        statement: "The design document preserves check-docs-format.mjs as the single JSON Schema
          validation entrypoint."
      - id: "AC-REQ-0040-005"
        statement: "The design document preserves check-project-model.mjs as the semantic aggregation
          and cross-file validation tool."
      - id: "AC-REQ-0040-006"
        statement: "The workplan keeps first area extraction after the loader design step."

    verification:
      method: "inspection"
      required_evidence:
        - "document"
        - "yaml"
        - "command"
        - "tool-output"
  - id: REQ-0041
    macro_requirement_id: MR-0001
    capability_id: CAP-DOCUMENTATION-GOVERNANCE
    title: First project model area extraction
    statement: The project model shall extract the schema-validation area into governed modular
      requirements, graph, and decision parts while preserving one deterministic logical model.
    rationale: The first extraction proves that the modularization design scales beyond
      documentation-only contracts and that validators can aggregate area parts without losing
      traceability.
    status: accepted
    implementation_status: implemented
    priority: must
    type: documentation
    scope: project-model
    preconditions:
      - id: PRE-REQ-0041-001
        statement: The project_model_areas taxonomy is governed and semantically enforced.
      - id: PRE-REQ-0041-002
        statement: Requirements, graph, decisions, and modular loader contracts are documented.
    main_flow:
      - id: FLOW-REQ-0041-001
        step: 1
        actor: Maintainer
        action: Declares the schema-validation requirements part from the requirements index.
        expected_result: Schema-validation requirements are loaded into the aggregate project
          model.
      - id: FLOW-REQ-0041-002
        step: 2
        actor: Maintainer
        action: Declares the schema-validation decisions part from the governance registry.
        expected_result: Schema-validation decisions are loaded into the aggregate project
          model.
      - id: FLOW-REQ-0041-003
        step: 3
        actor: Maintainer
        action: Declares the schema-validation graph part from the graph index.
        expected_result: Schema-validation graph triples are loaded into the aggregate graph
          model.
      - id: FLOW-REQ-0041-004
        step: 4
        actor: Validator
        action: Aggregates root registries and declared area parts before semantic validation.
        expected_result: Project-model validation sees one logical requirements, decisions, and
          graph model.
    alternative_flows:
      - id: ALT-REQ-0041-001
        title: Part declaration is invalid
        trigger: An index references an unknown area_id, missing file, or mismatched part area.
        steps:
          - id: FLOW-REQ-0041-ALT-001
            step: 1
            actor: Validator
            action: Rejects the project model during semantic validation.
            expected_result: Invalid modular extraction does not pass docs:check.
    postconditions:
      - id: POST-REQ-0041-001
        statement: The schema-validation area has requirements, decisions, and graph parts.
      - id: POST-REQ-0041-002
        statement: The project model validator aggregates root and part files before cross-file
          checks.
    acceptance_criteria:
      - id: AC-REQ-0041-001
        statement: docs/reference/project-model/requirements/schema-validation.requirements.yml
          exists and is schema validated.
      - id: AC-REQ-0041-002
        statement: docs/reference/project-model/decisions/schema-validation.decisions.yml exists
          and is schema validated.
      - id: AC-REQ-0041-003
        statement: docs/reference/project-model/graph/schema-validation.graph.yml exists and is
          schema validated.
      - id: AC-REQ-0041-004
        statement: check-project-model.mjs aggregates modular parts before validating references
          and graph triples.
    verification:
      method: test
      required_evidence:
        - yaml
        - json-schema
        - command
        - source-comment
