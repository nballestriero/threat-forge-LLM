schema_version: '1.0'
change_control:
  decided_by:
  - graph-traceability:DEC-0013
  satisfies:
  - graph-traceability:REQ-0022
  rationale: 'This governed baseline artifact declares its internal traceability marker so deterministic
    validation can compare file-local change-control metadata with graph.matrix.yml relationships.

    '
schema_control:
  schema: docs/reference/project-model/schemas/requirements-registry.schema.json
  rationale: 'The requirements registry declares the canonical schema that validates its structural
    shape so schema-to-artifact application can be checked bidirectionally against graph.matrix.yml.

    '
registry:
  id: requirements-registry
  title: Requirements registry
  status: draft
  description: 'Authoritative registry of macro requirements and atomic requirements.

    '
parts:
- area_id: schema-validation
  path: docs/reference/project-model/requirements/schema-validation.requirements.yml
  description: Area-owned requirements part for schema-validation.
- area_id: documentation-structure
  path: docs/reference/project-model/requirements/documentation-structure.requirements.yml
  description: Area-owned requirements part for documentation-structure.
- area_id: markdown-format
  path: docs/reference/project-model/requirements/markdown-format.requirements.yml
  description: Area-owned requirements part for markdown-format.
- area_id: requirements-governance
  path: docs/reference/project-model/requirements/requirements-governance.requirements.yml
  description: Area-owned requirements part for requirements-governance.
- area_id: graph-traceability
  path: docs/reference/project-model/requirements/graph-traceability.requirements.yml
  description: Area-owned requirements part for graph-traceability.
- area_id: source-traceability
  path: docs/reference/project-model/requirements/source-traceability.requirements.yml
  description: Area-owned requirements part for source-traceability.
- area_id: governance-control
  path: docs/reference/project-model/requirements/governance-control.requirements.yml
  description: Area-owned requirements part for governance-control.
- area_id: project-handoff
  path: docs/reference/project-model/requirements/project-handoff.requirements.yml
  description: Area-owned requirements part for project-handoff.
- area_id: backend-architecture
  path: docs/reference/project-model/requirements/backend-architecture.requirements.yml
  description: Area-owned requirements part for backend-architecture.
macro_requirements:
- id: MR-0001
  title: Governed documentation and traceability
  statement: 'The project shall maintain governed documentation, requirements, decisions, and traceability
    structures that can be validated and later imported into a graph database.

    '
  rationale: 'Documentation, requirements, decisions, and relationships must be stable enough for
    humans, deterministic tools, and future graph import.

    '
  status: accepted
  implementation_status: implemented
  priority: must
- id: MR-0002
  title: Default backend architecture and contracts
  statement: 'The project shall define default backend implementation patterns and backend/API contract
    documentation rules before runtime backend code is introduced.

    '
  rationale: 'Successful backend patterns from the previous project should be preserved as approved
    defaults while still being reintroduced cleanly in the new repository model.

    '
  status: accepted
  implementation_status: not_implemented
  priority: must
- id: MR-0003
  title: Governance control report and admin surface
  statement: 'The project shall expose repository governance state through a deterministic report
    contract that can be consumed by a static page, future protected admin UI, CLI tools, backend
    APIs, and LLM agents.

    '
  rationale: 'Repository governance must be observable without relying only on terminal output or
    ad-hoc manual file inspection.

    '
  status: accepted
  implementation_status: not_implemented
  priority: must
requirements: []
