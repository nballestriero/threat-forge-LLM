    capability_id: "CAP-BACKEND-ARCHITECTURE"

    title: "Backend architecture pattern enforcement"
    statement: >
      The project shall provide deterministic tooling that checks backend code
      against approved composition and layering patterns.
    rationale: >
      Architecture rules should not rely only on human memory or code review.
      A deterministic checker must catch direct adapter instantiation,
      controller-to-infrastructure coupling, missing factories, and contract
      drift where practical.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"
