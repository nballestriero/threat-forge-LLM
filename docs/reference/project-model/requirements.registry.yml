    capability_id: "CAP-GOVERNANCE-CONTROL"

    title: "Governance control check execution status"
    statement: >
      The Governance Control Report builder shall execute leaf validation
      commands and record their real pass/fail status, exit code, duration, and
      output excerpts without recursively invoking aggregate documentation
      checks.
    rationale: >
      The control page must show real validation state rather than placeholder
      unknown values. The report builder can safely execute leaf checks, but it
      must avoid calling aggregate commands that include the report builder and
      would create recursion.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "governance-control"

    preconditions:
      - id: "PRE-REQ-0019-001"
        statement: "The Governance Control Report builder exists."

      - id: "PRE-REQ-0019-002"
        statement: "Leaf validation commands are declared independently from aggregate docs:check."

    main_flow:
      - id: "FLOW-REQ-0019-001"
        step: 1
        actor: "Report builder"
        action: "Executes each approved leaf validation command."
        expected_result: "Each leaf check returns an exit code, output, and duration."

      - id: "FLOW-REQ-0019-002"
        step: 2
        actor: "Report builder"
        action: "Records pass or fail status, exit_code, duration_ms, stdout_excerpt, and stderr_excerpt
          for each check."
        expected_result: "The report exposes real check execution status."

      - id: "FLOW-REQ-0019-003"
        step: 3
        actor: "Report builder"
        action: "Marks the current control report check as pass after report validation succeeds."
        expected_result: "The report reflects that the current builder run succeeded."

    alternative_flows:
      - id: "ALT-REQ-0019-001"
        title: "Leaf check fails"
        trigger: "A leaf validation command exits with a non-zero status."
        steps:
          - id: "FLOW-REQ-0019-ALT-001"
            step: 1
            actor: "Report builder"
            action: "Records the failure and output excerpt in the report."
            expected_result: "The report shows the failed check with diagnostic evidence."

      - id: "ALT-REQ-0019-002"
        title: "Recursive aggregate command"
        trigger: "A check candidate is docs:check, docs:check:control-report, docs:check:control-page,
          or another aggregate command that can call the report builder."
        steps:
          - id: "FLOW-REQ-0019-ALT-002"
            step: 1
            actor: "Report builder"
            action: "Does not execute the recursive command."
            expected_result: "The report builder avoids recursive execution."

    postconditions:
      - id: "POST-REQ-0019-001"
        statement: "The Governance Control Report exposes real validation status for leaf checks."

    acceptance_criteria:
      - id: "AC-REQ-0019-001"
        statement: "The report builder runs leaf validation commands for structure, project model,
          format, and negative fixtures."

      - id: "AC-REQ-0019-002"
        statement: "The report records pass/fail status, exit_code, duration_ms, stdout_excerpt, and
          stderr_excerpt for each executed check."

      - id: "AC-REQ-0019-003"
        statement: "The report builder never invokes docs:check recursively."

      - id: "AC-REQ-0019-004"
        statement: "The static page displays real check statuses from report data."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "json-schema"


  - id: "REQ-0020"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Project handoff ZIP command"
    statement: >
      The project shall provide a deterministic cross-platform command that
      creates a local handoff ZIP archive containing the repository state,
      including hidden project metadata such as .git, while excluding dependency
      installations, build outputs, generated artifacts, local IDE caches, and
      environment files by default.
    rationale: >
      Handoffs between human and LLM work sessions require a reproducible
      project snapshot that can be created on Windows, Linux, or macOS without
      relying on platform-specific archive commands or accidentally packaging
      large dependency installations and local caches.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "tooling"

    preconditions:
      - id: "PRE-REQ-0020-001"
        statement: "The project is available as a local repository checkout."

      - id: "PRE-REQ-0020-002"
        statement: "Node.js is available according to the package engine baseline."

    main_flow:
      - id: "FLOW-REQ-0020-001"
        step: 1
        actor: "Handoff ZIP builder"
        action: "Walks the repository filesystem using Node.js standard library APIs."
        expected_result: "The builder discovers repository files consistently across supported operating
          systems."

      - id: "FLOW-REQ-0020-002"
        step: 2
        actor: "Handoff ZIP builder"
        action: "Includes hidden project metadata such as .git while applying the controlled exclusion
          policy."
        expected_result: "The archive contains repository history and excludes dependency folders,
          local caches, generated artifacts, and environment files."

      - id: "FLOW-REQ-0020-003"
        step: 3
        actor: "Handoff ZIP builder"
        action: "Writes a ZIP archive and manifest under artifacts/handoff unless an explicit output
          path is provided."
        expected_result: "A local handoff archive is available without adding generated artifacts
          to Git."

    alternative_flows:
      - id: "ALT-REQ-0020-001"
        title: "Dry run"
        trigger: "The dry-run command is executed."
        steps:
          - id: "FLOW-REQ-0020-ALT-001"
            step: 1
            actor: "Handoff ZIP builder"
            action: "Reports the planned output path, included file count, .git inclusion, and skipped
              entries without writing an archive."
            expected_result: "The exclusion policy can be inspected before creating a ZIP."

      - id: "ALT-REQ-0020-002"
        title: "Explicit environment inclusion"
        trigger: "The command is executed with --include-env."
        steps:
          - id: "FLOW-REQ-0020-ALT-002"
            step: 1
            actor: "Handoff ZIP builder"
            action: "Includes .env files only after an explicit command-line request."
            expected_result: "Sensitive environment files remain excluded by default."

    postconditions:
      - id: "POST-REQ-0020-001"
        statement: "The repository can generate a handoff ZIP archive with .git included and dependency
          installations excluded."

    acceptance_criteria:
      - id: "AC-REQ-0020-001"
        statement: "The command npm run context:zip:handoff writes a ZIP archive under artifacts/handoff
          by default."

      - id: "AC-REQ-0020-002"
        statement: "The command npm run context:zip:handoff:dry-run reports the archive plan without
          writing a ZIP."

      - id: "AC-REQ-0020-003"
        statement: "The generated archive includes .git and excludes node_modules, .vs, artifacts,
          build outputs, caches, logs, archive files, and .env files by default."

      - id: "AC-REQ-0020-004"
        statement: "Generated handoff artifacts remain outside Git tracking."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "repository-path"
        - "source-comment"


  - id: "REQ-0021"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Explicit governed registry schemas"
    statement: >
      The project shall define explicit machine-readable schema files for every
      governed project registry and graph matrix, and deterministic validation
      tools shall load and apply those canonical schemas instead of relying only
      on hardcoded registry-shape checks. For every registry, fields constrained
      to controlled value sets shall declare their authoritative dataset or
      taxonomy, and each controlled value set shall be explicitly decided,
      documented, and motivated.
    rationale: >
      The project model is itself a contract. If registry schemas and controlled
      value datasets exist only implicitly inside validator code, future changes
      can create drift between registries, validators, reports, editor support,
      generated pages, and LLM consumers. Explicit schemas and motivated
      datasets make governance rules inspectable, reusable, and enforceable.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"
    type: "data"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0021-001"
        statement: "The project has governed registries for governance, requirements, and graph relationships."

      - id: "PRE-REQ-0021-002"
        statement: "Deterministic validation tools already parse and validate the project model baseline."

    main_flow:
      - id: "FLOW-REQ-0021-001"
        step: 1
        actor: "Maintainer"
        action: "Defines canonical schema files for each governed registry and graph matrix."
        expected_result: "Registry structure is documented as explicit machine-readable schema artifacts."

      - id: "FLOW-REQ-0021-002"
        step: 2
        actor: "Maintainer"
        action: "Identifies which registry fields are constrained by controlled datasets or taxonomies."
        expected_result: "Each controlled field names the authoritative dataset or taxonomy used for
          validation."

      - id: "FLOW-REQ-0021-003"
        step: 3
        actor: "Maintainer"
        action: "Documents the meaning, rationale, and validation impact of each controlled value
          set."
        expected_result: "Controlled values are justified before they become binding validation inputs."

      - id: "FLOW-REQ-0021-004"
        step: 4
        actor: "Validator"
        action: "Loads the canonical schema files and validates registries against them."
        expected_result: "Registry validation is driven by governed schema artifacts rather than hardcoded
          shape logic alone."

    alternative_flows:
      - id: "ALT-REQ-0021-001"
        title: "Schema missing or invalid"
        trigger: "A governed registry has no canonical schema file or the schema itself is invalid."
        steps:
          - id: "FLOW-REQ-0021-ALT-001"
            step: 1
            actor: "Validator"
            action: "Rejects the validation run and reports the missing or invalid schema artifact."
            expected_result: "Registries cannot be accepted without valid schema governance."

      - id: "ALT-REQ-0021-002"
        title: "Unjustified controlled value set"
        trigger: "A registry field is constrained to enumerated values without an authoritative dataset,
          meaning, rationale, or validation impact."
        steps:
          - id: "FLOW-REQ-0021-ALT-002"
            step: 1
            actor: "Validator"
            action: "Reports the incomplete controlled dataset definition."
            expected_result: "Controlled values cannot become hidden hardcoded assumptions."

    postconditions:
      - id: "POST-REQ-0021-001"
        statement: "Every governed registry has a canonical schema path and validation policy."

      - id: "POST-REQ-0021-002"
        statement: "Every controlled registry field has an explicit authoritative dataset or taxonomy
          decision."

    acceptance_criteria:
      - id: "AC-REQ-0021-001"
        statement: "The project defines schema artifacts for governance.registry.yml, requirements.registry.yml,
          and graph.matrix.yml."

      - id: "AC-REQ-0021-002"
        statement: "The project model validator reads canonical registry schema files during validation."

      - id: "AC-REQ-0021-003"
        statement: "Each controlled field in the governed registries is mapped to an authoritative
          dataset or taxonomy."

      - id: "AC-REQ-0021-004"
        statement: "Each controlled value set documents meaning, rationale, and validation impact."

      - id: "AC-REQ-0021-005"
        statement: "Validator logic may add semantic checks, but it must not be the only source of
          registry shape definitions."

    verification:
      method: "analysis"
      required_evidence:
        - "json-schema"
        - "yaml"
        - "registry-entry"
        - "tool-output"

  - id: "REQ-0022"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Governed baseline artifact bidirectional traceability"
    statement: >
      The project shall require governed baseline artifacts to declare internal
      change-control markers that identify the governing requirement and
      decision, and the project graph shall contain matching relationships for
      those artifacts. Deterministic validation shall reject baseline artifacts
      whose file-local markers and graph relationships do not agree.
    rationale: >
      Registry, graph, schema, and contract files define the governance system
      itself. If they can be added or modified without internal traceability, the
      graph may look complete while the artifact body remains ungoverned, or the
      artifact may claim a requirement that the graph does not confirm.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0022-001"
        statement: "The project model registry, requirements registry, and graph matrix exist as governed
          baseline artifacts."

      - id: "PRE-REQ-0022-002"
        statement: "The project model validator already validates graph relationships and source-file
          traceability."

    main_flow:
      - id: "FLOW-REQ-0022-001"
        step: 1
        actor: "Maintainer"
        action: "Adds file-local change_control metadata to governed baseline artifacts."
        expected_result: "Each baseline artifact identifies the decision and requirement governing
          its baseline role."

      - id: "FLOW-REQ-0022-002"
        step: 2
        actor: "Maintainer"
        action: "Adds matching graph.matrix.yml triples from the governing requirement to each baseline
          artifact."
        expected_result: "The project graph confirms the artifact-local traceability claim."

      - id: "FLOW-REQ-0022-003"
        step: 3
        actor: "Project model validator"
        action: "Checks marker-to-graph and graph-to-marker consistency for governed baseline artifacts."
        expected_result: "A baseline artifact without bidirectional traceability is rejected."

    alternative_flows:
      - id: "ALT-REQ-0022-001"
        title: "Missing baseline marker"
        trigger: "A governed baseline artifact has no change_control metadata."
        steps:
          - id: "FLOW-REQ-0022-ALT-001"
            step: 1
            actor: "Project model validator"
            action: "Reports the missing file-local marker."
            expected_result: "The project model check fails before the artifact can be accepted."

      - id: "ALT-REQ-0022-002"
        title: "Graph mismatch"
        trigger: "A baseline artifact marker names a requirement or decision that is not confirmed
          by graph.matrix.yml."
        steps:
          - id: "FLOW-REQ-0022-ALT-002"
            step: 1
            actor: "Project model validator"
            action: "Reports the mismatched marker and graph relationship."
            expected_result: "The drift between artifact metadata and graph traceability is visible
              and blocking."

    postconditions:
      - id: "POST-REQ-0022-001"
        statement: "Project-model baseline artifacts have bidirectional marker and graph traceability."

    acceptance_criteria:
      - id: "AC-REQ-0022-001"
        statement: "governance.registry.yml, requirements.registry.yml, and graph.matrix.yml declare
          change_control.decided_by and change_control.satisfies markers."

      - id: "AC-REQ-0022-002"
        statement: "graph.matrix.yml contains matching SPECIFIED_BY relationships for each baseline
          artifact marker."

      - id: "AC-REQ-0022-003"
        statement: "The project model validator rejects a governed baseline artifact with missing
          or mismatched change_control metadata."

      - id: "AC-REQ-0022-004"
        statement: "A controlled negative fixture proves that baseline artifact marker removal is
          rejected."

    verification:
      method: "test"
      required_evidence:
        - "yaml"
        - "registry-entry"
        - "command"
        - "tool-output"

  - id: "REQ-0034"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"
    title: "Project model modularization analysis"
    statement: >
      The project shall define the modularization model for requirements,
      graph traceability, and decisions before splitting monolithic project-model
      registries into area-owned parts.
    rationale: >
      requirements.registry.yml, graph.matrix.yml, and governance.registry.yml
      are growing together. Splitting only one artifact would move the scaling
      problem elsewhere and could break deterministic traceability. The project
      needs a governed analysis that defines composite identifiers, project-model
      areas, index and part boundaries, decision ownership, cross-area graph
      relationships, and validator responsibilities before any migration.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0034-001"
        statement: "The governance, requirements, and graph matrix registries are schema-controlled
          baseline artifacts."

      - id: "PRE-REQ-0034-002"
        statement: "REQ-0033 establishes tools/docs/check-docs-format.mjs as the single JSON Schema
          validation entrypoint for governed artifacts."

      - id: "PRE-REQ-0034-003"
        statement: "The project is before first release, so coordinated clean breaking changes are
          allowed for project-model refactoring."

    main_flow:
      - id: "FLOW-REQ-0034-001"
        step: 1
        actor: "Maintainer"
        action: "Defines the canonical composite identifier form <area_id>:<local_id>."
        expected_result: "Future modular registries can restart local sequences inside governed project-model
          areas."

      - id: "FLOW-REQ-0034-002"
        step: 2
        actor: "Maintainer"
        action: "Defines requirements, graph, and decision index/part boundaries."
        expected_result: "The future project model can split growing files without losing one aggregated
          logical model."

      - id: "FLOW-REQ-0034-003"
        step: 3
        actor: "Maintainer"
        action: "Defines that project_model_areas must be a controlled taxonomy with deterministic
          validation and bidirectional traceability before broad extraction."
        expected_result: "Modularization does not rely on free-form area identifiers."

      - id: "FLOW-REQ-0034-004"
        step: 4
        actor: "Maintainer"
        action: "Defines clean migration policy for the pre-release project model."
        expected_result: "Future migration steps prefer coordinated breaking changes over long-term
          compatibility with the monolithic layout."

    alternative_flows:
      - id: "ALT-REQ-0034-001"
        title: "A taxonomy is introduced during modularization"
        trigger: "A modular file or index introduces a new controlled taxonomy such as project_model_areas."
        steps:
          - id: "FLOW-REQ-0034-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Introduces a dedicated taxonomy contract and enforcement step with graph and
              tool traceability before broad use."
            expected_result: "New taxonomy values are controlled by deterministic validation rather
              than convention."

    postconditions:
      - id: "POST-REQ-0034-001"
        statement: "The modularization analysis document exists under docs/reference/project-model/schema-design."

      - id: "POST-REQ-0034-002"
        statement: "The workplan records the taxonomy contract and enforcement steps before requirements,
          graph, or decision part extraction."

    acceptance_criteria:
      - id: "AC-REQ-0034-001"
        statement: "docs/reference/project-model/schema-design/project-model-modularization-analysis.md
          exists."

      - id: "AC-REQ-0034-002"
        statement: "The analysis defines <area_id>:<local_id> as the future canonical composite identifier
          model."

      - id: "AC-REQ-0034-003"
        statement: "The analysis covers requirements parts, graph parts, decision parts, cross-area
          graph ownership, and central indexes."

      - id: "AC-REQ-0034-004"
        statement: "The analysis states that project_model_areas must be a governed taxonomy with
          deterministic validation, bidirectional implementation traceability, and negative fixture
          coverage before broad use."

      - id: "AC-REQ-0034-005"
        statement: "The analysis states that the migration may prefer clean coordinated breaking changes
          over preserving compatibility with the monolithic layout."

    verification:
      method: "inspection"
      required_evidence:
        - "document"
        - "registry-entry"
        - "yaml"
        - "command"
        - "tool-output"

  - id: "REQ-0035"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"
    title: "Project model areas taxonomy contract"
    statement: >
      The project shall introduce project_model_areas as an explicit governed
      taxonomy before requirements, graph traceability, or decisions are split
      into area-owned modular parts.
    rationale: >
      Modular project-model files need a controlled ownership boundary. Deriving
      area identifiers automatically from capability_id would couple physical
      file modularization to product capability taxonomy changes. A dedicated
      taxonomy lets the project align areas with capabilities where useful while
      preserving a stable loading and traceability boundary for the project
      model.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "data"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0035-001"
        statement: "REQ-0034 defines project-model modularization by governed area and canonical <area_id>:<local_id>
          identifiers."

      - id: "PRE-REQ-0035-002"
        statement: "DEC-0025 chooses an explicit project_model_areas taxonomy instead of deriving
          area_id from capability_id."

    main_flow:
      - id: "FLOW-REQ-0035-001"
        step: 1
        actor: "Maintainer"
        action: "Declares taxonomies.project_model_areas in the governance registry."
        expected_result: "The future area_id value set has a governed source of truth."

      - id: "FLOW-REQ-0035-002"
        step: 2
        actor: "Maintainer"
        action: "Provides description, rationale, and validation impact for every project model area
          value."
        expected_result: "Area values are reviewable and do not become unexplained free-form labels."

      - id: "FLOW-REQ-0035-003"
        step: 3
        actor: "Maintainer"
        action: "Registers the taxonomy in the graph model with requirement, decision, document, and
          validation traceability."
        expected_result: "The taxonomy contract has explicit bidirectional governance traceability."

      - id: "FLOW-REQ-0035-004"
        step: 4
        actor: "Maintainer"
        action: "Separates the taxonomy contract step from the later enforcement step."
        expected_result: "M000.024C can introduce the controlled contract without pretending modular
          area_id usage is already enforced."

    alternative_flows:
      - id: "ALT-REQ-0035-001"
        title: "A new project model area is needed"
        trigger: "A future modular part needs an area_id not present in project_model_areas."
        steps:
          - id: "FLOW-REQ-0035-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Adds the area through the governed taxonomy with description, rationale, validation
              impact, requirement/decision traceability, and tool coverage."
            expected_result: "New area values are introduced deliberately and are visible to deterministic
              validation."

    postconditions:
      - id: "POST-REQ-0035-001"
        statement: "taxonomies.project_model_areas exists in governance.registry.yml."

      - id: "POST-REQ-0035-002"
        statement: "docs/reference/project-model/schema-design/project-model-areas-taxonomy-contract.md
          documents the taxonomy contract and boundaries."

      - id: "POST-REQ-0035-003"
        statement: "M000.024D remains responsible for deterministic area_id enforcement and negative
          fixture coverage."

    acceptance_criteria:
      - id: "AC-REQ-0035-001"
        statement: "governance.registry.yml declares taxonomies.project_model_areas with explicit
          value descriptions, rationale, and validation impact."

      - id: "AC-REQ-0035-002"
        statement: "The graph model contains a Taxonomy node for project_model_areas."

      - id: "AC-REQ-0035-003"
        statement: "The graph model traces DEC-0026 to REQ-0035 and to the project_model_areas taxonomy."

      - id: "AC-REQ-0035-004"
        statement: "The taxonomy contract document states that area_id is not derived automatically
          from capability_id."

      - id: "AC-REQ-0035-005"
        statement: "The workplan keeps M000.024D as the separate enforcement and negative-fixture
          step."

    verification:
      method: "inspection"
      required_evidence:
        - "document"
        - "registry-entry"
        - "yaml"
        - "command"
        - "tool-output"

  - id: "REQ-0036"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"
    title: "Project model areas taxonomy enforcement"
    statement: >
      The project model validator shall enforce the governed
      project_model_areas taxonomy before modular requirements, graph, or
      decision parts rely broadly on area_id values.
    rationale: >
      M000.024C introduced the taxonomy contract, but a contract alone is not
      enough. The future modular project model will use area_id values as part
      of canonical identifiers and file ownership boundaries. The semantic
      validator must therefore reject invalid, duplicate, incomplete, or
      ungoverned project_model_areas entries before modular loaders and part
      files are introduced.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0036-001"
        statement: "REQ-0035 introduces project_model_areas as a governed taxonomy contract."

      - id: "PRE-REQ-0036-002"
        statement: "DEC-0026 separates project_model_areas from capability_id derivation."

    main_flow:
      - id: "FLOW-REQ-0036-001"
        step: 1
        actor: "Project model validator"
        action: "Loads taxonomies.project_model_areas from governance.registry.yml."
        expected_result: "The semantic validator can use the governed taxonomy as the source of truth
          for future area_id values."

      - id: "FLOW-REQ-0036-002"
        step: 2
        actor: "Project model validator"
        action: "Rejects missing, malformed, duplicate, or incomplete project_model_areas entries."
        expected_result: "The area taxonomy cannot silently degrade into free-form labels."

      - id: "FLOW-REQ-0036-003"
        step: 3
        actor: "Negative fixture runner"
        action: "Exercises an invalid project_model_areas value against the project model validator."
        expected_result: "The validator rejects the invalid fixture with a deterministic diagnostic."

    alternative_flows:
      - id: "ALT-REQ-0036-001"
        title: "Future modular part uses area_id"
        trigger: "Requirements, graph, or decision part files introduce area_id fields."
        steps:
          - id: "FLOW-REQ-0036-ALT-001"
            step: 1
            actor: "Project model validator"
            action: "Validates that the referenced area_id exists in project_model_areas after loading
              the index and part files."
            expected_result: "Future modular parts use the same taxonomy enforcement path instead
              of local ad hoc checks."

    postconditions:
      - id: "POST-REQ-0036-001"
        statement: "tools/docs/check-project-model.mjs enforces the semantic project_model_areas taxonomy
          contract."

      - id: "POST-REQ-0036-002"
        statement: "A controlled negative fixture proves invalid project_model_areas values are rejected."

    acceptance_criteria:
      - id: "AC-REQ-0036-001"
        statement: "check-project-model.mjs rejects project_model_areas values with invalid local
          ID shape."

      - id: "AC-REQ-0036-002"
        statement: "check-project-model.mjs rejects project_model_areas entries missing description,
          rationale, or validation impact."

      - id: "AC-REQ-0036-003"
        statement: "check-project-model.mjs rejects duplicate project_model_areas values."

      - id: "AC-REQ-0036-004"
        statement: "tools/docs/fixtures/negative/invalid-project-model-area.json exercises the taxonomy
          enforcement path."

      - id: "AC-REQ-0036-005"
        statement: "The project model graph traces REQ-0036 to the project_model_areas taxonomy, the
          semantic validator, the project-model gate, and the negative-fixture gate."

    verification:
      method: "test"
      required_evidence:
        - "registry-entry"
        - "yaml"
