schema_version: "1.0"

registry:
  id: "requirements-registry"
  title: "Requirements registry"
  status: "draft"
  description: >
    Authoritative registry of macro requirements and atomic requirements.

macro_requirements:
  - id: "MR-0001"
    title: "Governed documentation and traceability"
    statement: >
      The project shall maintain governed documentation, requirements, decisions,
      and traceability structures that can be validated and later imported into a
      graph database.
    rationale: >
      Documentation, requirements, decisions, and relationships must be stable
      enough for humans, deterministic tools, and future graph import.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"

  - id: "MR-0002"
    title: "Default backend architecture and contracts"
    statement: >
      The project shall define default backend implementation patterns and
      backend/API contract documentation rules before runtime backend code is
      introduced.
    rationale: >
      Successful backend patterns from the previous project should be preserved
      as approved defaults while still being reintroduced cleanly in the new
      repository model.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"

  - id: "MR-0003"
    title: "Governance control report and admin surface"
    statement: >
      The project shall expose repository governance state through a deterministic
      report contract that can be consumed by a static page, future protected
      admin UI, CLI tools, backend APIs, and LLM agents.
    rationale: >
      Repository governance must be observable without relying only on terminal
      output or ad-hoc manual file inspection.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"

requirements:
  - id: "REQ-0001"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Diátaxis documentation corpus"
    statement: >
      The documentation corpus shall be organized according to the Diátaxis
      model.
    rationale: >
      Diátaxis separates learning, task execution, technical reference, and
      explanation, reducing ambiguity in document purpose.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0001-001"
        statement: "The repository contains a docs directory."

    main_flow:
      - id: "FLOW-REQ-0001-001"
        step: 1
        actor: "Maintainer"
        action: "Creates the tutorials, how-to, reference, and explanation sections."
        expected_result: "The docs directory follows the Diátaxis top-level structure."

      - id: "FLOW-REQ-0001-002"
        step: 2
        actor: "Maintainer"
        action: "Places governed technical project model files under docs/reference/project-model."
        expected_result: "The reference corpus contains the compact project model."

    alternative_flows:
      - id: "ALT-REQ-0001-001"
        title: "Operational project state"
        trigger: "A file represents temporary work state instead of product documentation."
        steps:
          - id: "FLOW-REQ-0001-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Stores the file outside the Diátaxis documentation corpus."
            expected_result: "The operational file is placed under project."

    postconditions:
      - id: "POST-REQ-0001-001"
        statement: "The documentation corpus has stable Diátaxis folders."

      - id: "POST-REQ-0001-002"
        statement: "The compact project model has a stable location."

    acceptance_criteria:
      - id: "AC-REQ-0001-001"
        statement: "docs/tutorials exists."

      - id: "AC-REQ-0001-002"
        statement: "docs/how-to exists."

      - id: "AC-REQ-0001-003"
        statement: "docs/reference exists."

      - id: "AC-REQ-0001-004"
        statement: "docs/explanation exists."

      - id: "AC-REQ-0001-005"
        statement: "docs/reference/project-model exists."

    verification:
      method: "inspection"
      required_evidence:
        - "repository-path"
        - "document"

  - id: "REQ-0002"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-GRAPH-IMPORT"

    title: "Canonical SPO relationships"
    statement: >
      Governed relationships shall be represented as Subject-Predicate-Object
      triples.
    rationale: >
      SPO triples make relationships deterministic, validateable, and suitable
      for future graph import.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "data"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0002-001"
        statement: "The project has governed entities that require traceability."

    main_flow:
      - id: "FLOW-REQ-0002-001"
        step: 1
        actor: "Maintainer"
        action: "Adds governed relationships to the graph matrix as SPO triples."
        expected_result: "Each governed relationship has a subject, predicate, and object."

      - id: "FLOW-REQ-0002-002"
        step: 2
        actor: "Future validator"
        action: "Checks the predicate against the governance registry."
        expected_result: "Only registered predicates are accepted."

    alternative_flows:
      - id: "ALT-REQ-0002-001"
        title: "Grouped relationship field is present"
        trigger: "A human-friendly grouped relationship field is introduced."
        steps:
          - id: "FLOW-REQ-0002-ALT-001"
            step: 1
            actor: "Future validator"
            action: "Checks that the grouped field is derived from or equivalent to SPO triples."
            expected_result: "The grouped field does not contradict the graph matrix."

    postconditions:
      - id: "POST-REQ-0002-001"
        statement: "The graph matrix remains the canonical source of governed relationships."

    acceptance_criteria:
      - id: "AC-REQ-0002-001"
        statement: "Each governed relationship in graph.matrix.yml uses subject, predicate, and object."

      - id: "AC-REQ-0002-002"
        statement: "Each predicate used by graph.matrix.yml is registered in governance.registry.yml."

    verification:
      method: "inspection"
      required_evidence:
        - "yaml"
        - "registry-entry"

  - id: "REQ-0003"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Validated Markdown body profiles"
    statement: >
      Governed Markdown documents shall be validated against registered body
      profiles, not only against frontmatter.
    rationale: >
      Validating only frontmatter leaves the body uncontrolled. Body profiles
      make documents predictable, parseable, and suitable for future deterministic
      checks.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0003-001"
        statement: "Governed Markdown documents exist in the documentation corpus."

    main_flow:
      - id: "FLOW-REQ-0003-001"
        step: 1
        actor: "Maintainer"
        action: "Assigns a document type with an associated body profile."
        expected_result: "The document has a known body structure."

      - id: "FLOW-REQ-0003-002"
        step: 2
        actor: "Future validator"
        action: "Checks the document body against the registered profile."
        expected_result: "Required headings and structural rules are enforced."

    alternative_flows:
      - id: "ALT-REQ-0003-001"
        title: "Document does not match its profile"
        trigger: "A governed Markdown document has missing or invalid body sections."
        steps:
          - id: "FLOW-REQ-0003-ALT-001"
            step: 1
            actor: "Future validator"
            action: "Reports the body profile violation."
            expected_result: "The invalid document is blocked or flagged according to the gate policy."

    postconditions:
      - id: "POST-REQ-0003-001"
        statement: "Governed Markdown documents have deterministic body structures."

    acceptance_criteria:
      - id: "AC-REQ-0003-001"
        statement: "governance.registry.yml defines body profiles."

      - id: "AC-REQ-0003-002"
        statement: "Each document type references a body profile."

    verification:
      method: "inspection"
      required_evidence:
        - "registry-entry"
        - "document"

  - id: "REQ-0004"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Documentation structure guard"
    statement: >
      The repository shall provide a deterministic validation tool that checks
      the governed documentation folder structure and required canonical files.
    rationale: >
      The documentation corpus must not drift from the agreed Diátaxis structure
      or from the compact project-model layout without an explicit governed
      change.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0004-001"
        statement: "The repository contains the governed documentation corpus."

      - id: "PRE-REQ-0004-002"
        statement: "The canonical project model files are expected under docs/reference/project-model."

    main_flow:
      - id: "FLOW-REQ-0004-001"
        step: 1
        actor: "Maintainer"
        action: "Runs the documentation structure check command."
        expected_result: "The deterministic structure guard starts."

      - id: "FLOW-REQ-0004-002"
        step: 2
        actor: "Validation tool"
        action: "Checks required documentation directories."
        expected_result: "Required Diátaxis and project-model directories exist."

      - id: "FLOW-REQ-0004-003"
        step: 3
        actor: "Validation tool"
        action: "Checks required canonical files."
        expected_result: "Required project files, documentation files, and tool files exist."

      - id: "FLOW-REQ-0004-004"
        step: 4
        actor: "Validation tool"
        action: "Checks forbidden legacy or uncontrolled paths."
        expected_result: "Forbidden paths are reported as validation errors."

    alternative_flows:
      - id: "ALT-REQ-0004-001"
        title: "Structure violation"
        trigger: "A required directory or file is missing, or a forbidden path exists."
        steps:
          - id: "FLOW-REQ-0004-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports the structure violation."
            expected_result: "The check exits with a non-zero status."

          - id: "FLOW-REQ-0004-ALT-002"
            step: 2
            actor: "Git hook"
            action: "Blocks the commit when the validation command fails."
            expected_result: "The invalid structure is not committed."

    postconditions:
      - id: "POST-REQ-0004-001"
        statement: "The documentation structure is confirmed valid or the check fails explicitly."

      - id: "POST-REQ-0004-002"
        statement: "Commits are blocked when the structure guard fails and the hook is enabled."

    acceptance_criteria:
      - id: "AC-REQ-0004-001"
        statement: "The repository provides a docs:check:structure command."

      - id: "AC-REQ-0004-002"
        statement: "The structure guard checks required Diátaxis directories."

      - id: "AC-REQ-0004-003"
        statement: "The structure guard checks required canonical project-model files."

      - id: "AC-REQ-0004-004"
        statement: "The structure guard rejects forbidden legacy paths."

      - id: "AC-REQ-0004-005"
        statement: "The pre-commit hook runs the documentation checks."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "git-hook"

  - id: "REQ-0005"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-REQUIREMENTS-MANAGEMENT"

    title: "Bidirectional implementation traceability"
    statement: >
      The project shall verify that implementation relationships declared in
      graph.matrix.yml are mirrored by traceability references in source-file
      comments, and that source-file traceability claims are mirrored by graph
      matrix triples.
    rationale: >
      Bidirectional checks prevent the matrix from claiming implementation that
      code does not acknowledge and prevent code comments from claiming governed
      implementation that the graph matrix does not record.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0005-001"
        statement: "The graph matrix contains IMPLEMENTED_BY relationships involving source files."

      - id: "PRE-REQ-0005-002"
        statement: "Source files can contain parseable file-level JSDoc traceability comments."

    main_flow:
      - id: "FLOW-REQ-0005-001"
        step: 1
        actor: "Validation tool"
        action: "Reads IMPLEMENTED_BY triples from graph.matrix.yml."
        expected_result: "The expected requirement-to-source-file relationships are known."

      - id: "FLOW-REQ-0005-002"
        step: 2
        actor: "Validation tool"
        action: "Reads file-level traceability comments from referenced source files."
        expected_result: "The source-file implementation claims are known."

      - id: "FLOW-REQ-0005-003"
        step: 3
        actor: "Validation tool"
        action: "Compares matrix-to-code and code-to-matrix traceability."
        expected_result: "The two directions are consistent."

    alternative_flows:
      - id: "ALT-REQ-0005-001"
        title: "Matrix references source file without source comment"
        trigger: "graph.matrix.yml contains an IMPLEMENTED_BY SourceFile triple but the source file does not cite the requirement."
        steps:
          - id: "FLOW-REQ-0005-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing source-file traceability comment."
            expected_result: "The check fails with a traceability error."

      - id: "ALT-REQ-0005-002"
        title: "Source comment references requirement without matrix triple"
        trigger: "A source file claims it implements a requirement but graph.matrix.yml has no matching IMPLEMENTED_BY triple."
        steps:
          - id: "FLOW-REQ-0005-ALT-002"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing graph matrix relationship."
            expected_result: "The check fails with a traceability error."

    postconditions:
      - id: "POST-REQ-0005-001"
        statement: "Implementation traceability is consistent between graph.matrix.yml and source-file comments."

      - id: "POST-REQ-0005-002"
        statement: "Traceability is enforced at file level before future code-symbol-level traceability is introduced."

    acceptance_criteria:
      - id: "AC-REQ-0005-001"
        statement: "Each IMPLEMENTED_BY SourceFile triple points to an existing source file."

      - id: "AC-REQ-0005-002"
        statement: "Each SourceFile referenced by an IMPLEMENTED_BY requirement triple declares the related requirement in file-level JSDoc."

      - id: "AC-REQ-0005-003"
        statement: "Each file-level JSDoc requirement claim has a matching IMPLEMENTED_BY triple in graph.matrix.yml."

      - id: "AC-REQ-0005-004"
        statement: "Each validation tool node declared by a source file exists in graph.matrix.yml."

      - id: "AC-REQ-0005-005"
        statement: "Each validation tool implemented by a source file has a matching IMPLEMENTED_BY triple."

    verification:
      method: "test"
      required_evidence:
        - "source-comment"
        - "yaml"
        - "tool-output"


  - id: "REQ-0006"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-REQUIREMENTS-MANAGEMENT"

    title: "Validation command consistency"
    statement: >
      The project shall verify that governed validation Command nodes in
      graph.matrix.yml are consistent with executable scripts declared in
      package.json.
    rationale: >
      Validation command traceability is only useful if the graph matrix and
      package manifest agree on the commands that can actually be run.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "tooling"

    preconditions:
      - id: "PRE-REQ-0006-001"
        statement: "The repository declares validation commands as Command nodes in graph.matrix.yml."

      - id: "PRE-REQ-0006-002"
        statement: "The repository declares executable npm scripts in package.json."

    main_flow:
      - id: "FLOW-REQ-0006-001"
        step: 1
        actor: "Validation tool"
        action: "Reads Command nodes from graph.matrix.yml."
        expected_result: "The governed command set is known."

      - id: "FLOW-REQ-0006-002"
        step: 2
        actor: "Validation tool"
        action: "Reads scripts from package.json."
        expected_result: "The executable npm script set is known."

      - id: "FLOW-REQ-0006-003"
        step: 3
        actor: "Validation tool"
        action: "Compares npm run Command nodes with package.json scripts."
        expected_result: "Each governed npm validation command points to an existing script."

    alternative_flows:
      - id: "ALT-REQ-0006-001"
        title: "Command node references missing script"
        trigger: "A Command node declares an npm run command whose script does not exist in package.json."
        steps:
          - id: "FLOW-REQ-0006-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing package.json script."
            expected_result: "The check fails with a command consistency error."

      - id: "ALT-REQ-0006-002"
        title: "Governed validation script lacks Command node"
        trigger: "A validation script in package.json has no matching Command node."
        steps:
          - id: "FLOW-REQ-0006-ALT-002"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing graph matrix Command node."
            expected_result: "The check fails with a command consistency error."

    postconditions:
      - id: "POST-REQ-0006-001"
        statement: "Governed validation commands are consistent between graph.matrix.yml and package.json."

    acceptance_criteria:
      - id: "AC-REQ-0006-001"
        statement: "Each npm run Command node references an existing package.json script."

      - id: "AC-REQ-0006-002"
        statement: "Each governed validation script in package.json has a matching Command node."

      - id: "AC-REQ-0006-003"
        statement: "Command nodes are still linked through SPO triples."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "yaml"
        - "tool-output"


  - id: "REQ-0007"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Governed file format validation"
    statement: >
      The project shall provide deterministic validation for governed YAML and
      Markdown file formats.
    rationale: >
      Governed files must remain parseable and structurally predictable. YAML
      project-model files need baseline top-level format checks, and Markdown
      documentation files need body profile checks.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "documentation-corpus"

    preconditions:
      - id: "PRE-REQ-0007-001"
        statement: "The repository contains governed YAML project-model files."

      - id: "PRE-REQ-0007-002"
        statement: "The repository contains governed Markdown documentation files."

      - id: "PRE-REQ-0007-003"
        statement: "The governance registry defines document types and body profiles."

    main_flow:
      - id: "FLOW-REQ-0007-001"
        step: 1
        actor: "Validation tool"
        action: "Parses governed YAML project-model files."
        expected_result: "The YAML files are parseable and expose required top-level fields."

      - id: "FLOW-REQ-0007-002"
        step: 2
        actor: "Validation tool"
        action: "Loads registered Markdown body profiles."
        expected_result: "The allowed body structures are known."

      - id: "FLOW-REQ-0007-003"
        step: 3
        actor: "Validation tool"
        action: "Checks governed Markdown files against their expected body profiles."
        expected_result: "Required body headings are present and forbidden headings are absent."

    alternative_flows:
      - id: "ALT-REQ-0007-001"
        title: "Invalid YAML project model file"
        trigger: "A governed YAML file is not parseable or misses a required top-level section."
        steps:
          - id: "FLOW-REQ-0007-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports the invalid YAML format."
            expected_result: "The check fails with a format validation error."

      - id: "ALT-REQ-0007-002"
        title: "Markdown file violates body profile"
        trigger: "A governed Markdown file misses a required body heading or contains a forbidden heading."
        steps:
          - id: "FLOW-REQ-0007-ALT-002"
            step: 1
            actor: "Validation tool"
            action: "Reports the Markdown body profile violation."
            expected_result: "The check fails with a format validation error."

    postconditions:
      - id: "POST-REQ-0007-001"
        statement: "Governed YAML and Markdown file formats are confirmed valid or the check fails explicitly."

    acceptance_criteria:
      - id: "AC-REQ-0007-001"
        statement: "YAML project-model files are parsed and checked for required top-level format."

      - id: "AC-REQ-0007-002"
        statement: "Markdown files are checked against registered body profiles."

      - id: "AC-REQ-0007-003"
        statement: "docs:check runs the format validator."

      - id: "AC-REQ-0007-004"
        statement: "Invalid governed file formats block commits."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "document"


  - id: "REQ-0008"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-REQUIREMENTS-MANAGEMENT"

    title: "Validator negative fixtures"
    statement: >
      The project shall provide controlled negative fixtures that verify
      deterministic validators fail for intentionally invalid governed states.
    rationale: >
      Negative fixtures prove that validators catch the classes of errors they
      claim to enforce and reduce the risk of false-positive green gates.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "tooling"

    preconditions:
      - id: "PRE-REQ-0008-001"
        statement: "The repository provides deterministic documentation governance validators."

      - id: "PRE-REQ-0008-002"
        statement: "The repository can create temporary copies of governed files for fixture execution."

    main_flow:
      - id: "FLOW-REQ-0008-001"
        step: 1
        actor: "Validation tool"
        action: "Loads controlled negative fixture specifications."
        expected_result: "Each fixture declares a mutation, target validator, and expected error."

      - id: "FLOW-REQ-0008-002"
        step: 2
        actor: "Validation tool"
        action: "Applies each fixture mutation to a temporary repository copy."
        expected_result: "The real working tree remains unchanged."

      - id: "FLOW-REQ-0008-003"
        step: 3
        actor: "Validation tool"
        action: "Runs the target validator for each negative fixture."
        expected_result: "The target validator fails with the expected error."

    alternative_flows:
      - id: "ALT-REQ-0008-001"
        title: "Invalid fixture is accepted"
        trigger: "A target validator exits successfully for an intentionally invalid fixture."
        steps:
          - id: "FLOW-REQ-0008-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports that the negative fixture was accepted unexpectedly."
            expected_result: "The negative fixture runner fails."

      - id: "ALT-REQ-0008-002"
        title: "Expected diagnostic is missing"
        trigger: "A target validator fails but does not report the expected error."
        steps:
          - id: "FLOW-REQ-0008-ALT-002"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing expected diagnostic."
            expected_result: "The negative fixture runner fails."

    postconditions:
      - id: "POST-REQ-0008-001"
        statement: "Validator failure behavior is covered by controlled negative fixtures."

    acceptance_criteria:
      - id: "AC-REQ-0008-001"
        statement: "At least one negative fixture covers duplicate governed IDs."

      - id: "AC-REQ-0008-002"
        statement: "At least one negative fixture covers invalid SPO predicates."

      - id: "AC-REQ-0008-003"
        statement: "At least one negative fixture covers invalid package command traceability."

      - id: "AC-REQ-0008-004"
        statement: "At least one negative fixture covers missing source-file traceability."

      - id: "AC-REQ-0008-005"
        statement: "At least one negative fixture covers invalid Markdown body profile format."

      - id: "AC-REQ-0008-006"
        statement: "At least one negative fixture covers invalid YAML project-model format."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "yaml"


  - id: "REQ-0009"
    macro_requirement_id: "MR-0002"
    capability_id: "CAP-BACKEND-ARCHITECTURE"

    title: "Default backend composition pattern"
    statement: >
      Backend implementation shall use factory or composition-root based
      dependency composition as the default pattern.
    rationale: >
      Dependency composition must stay explicit and centralized so controllers,
      route handlers, and application services do not create concrete
      infrastructure dependencies directly.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"
    type: "non-functional"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0009-001"
        statement: "Runtime backend implementation has not yet started."

    main_flow:
      - id: "FLOW-REQ-0009-001"
        step: 1
        actor: "Maintainer"
        action: "Defines backend components using separated controller, service, port, adapter, and factory boundaries."
        expected_result: "Concrete dependency assembly remains centralized in a factory or composition root."

      - id: "FLOW-REQ-0009-002"
        step: 2
        actor: "Maintainer"
        action: "Wires route handlers or controllers to application services through composed dependencies."
        expected_result: "Route handlers and controllers do not instantiate concrete adapters directly."

    alternative_flows:
      - id: "ALT-REQ-0009-001"
        title: "Direct adapter instantiation"
        trigger: "A controller or route handler creates a concrete adapter directly."
        steps:
          - id: "FLOW-REQ-0009-ALT-001"
            step: 1
            actor: "Architecture checker"
            action: "Reports a backend composition violation."
            expected_result: "The implementation is rejected until dependency assembly is moved to a factory or composition root."

    postconditions:
      - id: "POST-REQ-0009-001"
        statement: "Backend implementation follows the default composition pattern."

    acceptance_criteria:
      - id: "AC-REQ-0009-001"
        statement: "Controllers and route handlers do not instantiate concrete infrastructure adapters."

      - id: "AC-REQ-0009-002"
        statement: "Concrete dependencies are assembled in factories or composition roots."

      - id: "AC-REQ-0009-003"
        statement: "Application services depend on explicit ports or boundaries where external dependencies are required."

    verification:
      method: "analysis"
      required_evidence:
        - "document"
        - "source-comment"
        - "tool-output"

  - id: "REQ-0010"
    macro_requirement_id: "MR-0002"
    capability_id: "CAP-BACKEND-ARCHITECTURE"

    title: "Backend architecture pattern enforcement"
    statement: >
      The project shall provide deterministic tooling that checks backend code
      against approved composition and layering patterns.
    rationale: >
      Architecture rules should not rely only on human memory or code review.
      A deterministic checker must catch direct adapter instantiation,
      controller-to-infrastructure coupling, missing factories, and contract
      drift where practical.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"
    type: "operational"
    scope: "tooling"

    preconditions:
      - id: "PRE-REQ-0010-001"
        statement: "A runtime backend source tree exists."

      - id: "PRE-REQ-0010-002"
        statement: "Approved backend layering and composition rules are documented."

    main_flow:
      - id: "FLOW-REQ-0010-001"
        step: 1
        actor: "Architecture checker"
        action: "Scans backend controllers, services, ports, adapters, factories, and route handlers."
        expected_result: "Backend files are classified by approved layer or boundary."

      - id: "FLOW-REQ-0010-002"
        step: 2
        actor: "Architecture checker"
        action: "Checks that controllers and route handlers do not instantiate concrete adapters directly."
        expected_result: "Forbidden coupling is reported as a deterministic violation."

      - id: "FLOW-REQ-0010-003"
        step: 3
        actor: "Architecture checker"
        action: "Checks that public backend routes are connected to governed API contracts."
        expected_result: "Route and contract drift is reported."

    alternative_flows:
      - id: "ALT-REQ-0010-001"
        title: "Backend not present yet"
        trigger: "The backend source tree has not been introduced."
        steps:
          - id: "FLOW-REQ-0010-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Keeps the requirement approved but not implemented."
            expected_result: "No runtime checker is required until backend files exist."

    postconditions:
      - id: "POST-REQ-0010-001"
        statement: "Backend architecture violations are detectable by deterministic tooling."

    acceptance_criteria:
      - id: "AC-REQ-0010-001"
        statement: "The checker detects controller or route-handler imports of concrete infrastructure adapters."

      - id: "AC-REQ-0010-002"
        statement: "The checker detects direct concrete adapter construction outside approved factories or composition roots."

      - id: "AC-REQ-0010-003"
        statement: "The checker can be added to the repository aggregate check command when backend code exists."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "source-comment"

  - id: "REQ-0011"
    macro_requirement_id: "MR-0002"
    capability_id: "CAP-API-CONTRACTS"

    title: "Backend API contracts as documentation source"
    statement: >
      Backend/API contracts shall be treated as authoritative documentation
      sources for public HTTP behavior.
    rationale: >
      Public API behavior must be documented by governed contracts so future
      implementation, tests, admin documentation, and generated views share the
      same source of truth.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"
    type: "documentation"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0011-001"
        statement: "A public backend API is introduced."

    main_flow:
      - id: "FLOW-REQ-0011-001"
        step: 1
        actor: "Maintainer"
        action: "Defines or updates the governed backend/API contract for each public route."
        expected_result: "HTTP behavior is documented in an authoritative contract."

      - id: "FLOW-REQ-0011-002"
        step: 2
        actor: "Maintainer"
        action: "Links the contract to requirements, capabilities, and implementation evidence."
        expected_result: "The contract can be explored through the governed graph."

    alternative_flows:
      - id: "ALT-REQ-0011-001"
        title: "Route without contract"
        trigger: "A public route is added without a governed backend/API contract."
        steps:
          - id: "FLOW-REQ-0011-ALT-001"
            step: 1
            actor: "Contract checker"
            action: "Reports the undocumented route."
            expected_result: "The implementation is rejected until the contract is added or updated."

    postconditions:
      - id: "POST-REQ-0011-001"
        statement: "Public backend HTTP behavior has an authoritative governed documentation source."

    acceptance_criteria:
      - id: "AC-REQ-0011-001"
        statement: "Each public backend route has a governed API contract before or together with implementation."

      - id: "AC-REQ-0011-002"
        statement: "API contracts are linked to requirements and capabilities."

      - id: "AC-REQ-0011-003"
        statement: "API contracts are available to future admin documentation and control-page views."

    verification:
      method: "analysis"
      required_evidence:
        - "document"
        - "yaml"
        - "tool-output"


  - id: "REQ-0012"
    macro_requirement_id: "MR-0003"
    capability_id: "CAP-GOVERNANCE-CONTROL"

    title: "Governance control report contract"
    statement: >
      The project shall define a deterministic machine-readable governance
      control report contract for repository governance state.
    rationale: >
      The report contract is the stable interface shared by the static control
      page, future protected admin UI, CLI tools, backend APIs, and LLM
      consumers.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "data"
    scope: "contracts"

    preconditions:
      - id: "PRE-REQ-0012-001"
        statement: "The repository has governed documentation, requirements, decisions, commands, tools, gates, and graph relationships."

    main_flow:
      - id: "FLOW-REQ-0012-001"
        step: 1
        actor: "Report builder"
        action: "Reads governed repository files and project-model registries."
        expected_result: "Repository governance state is available as structured data."

      - id: "FLOW-REQ-0012-002"
        step: 2
        actor: "Report builder"
        action: "Builds a governance control report that follows the canonical JSON Schema contract."
        expected_result: "The report contains stable sections for repository metadata, checks, documents, requirements, decisions, entities, graphs, and diagnostics."

      - id: "FLOW-REQ-0012-003"
        step: 3
        actor: "Report validator"
        action: "Validates the generated report against the governed JSON Schema."
        expected_result: "Invalid report structure is rejected deterministically."

    alternative_flows:
      - id: "ALT-REQ-0012-001"
        title: "Report contract violation"
        trigger: "The generated report does not satisfy the canonical JSON Schema."
        steps:
          - id: "FLOW-REQ-0012-ALT-001"
            step: 1
            actor: "Report validator"
            action: "Reports the schema violation."
            expected_result: "The report generation command fails."

    postconditions:
      - id: "POST-REQ-0012-001"
        statement: "Repository governance state has a stable, machine-readable report contract."

    acceptance_criteria:
      - id: "AC-REQ-0012-001"
        statement: "The report contract defines schema_version, generated_at, repository, checks, documents, requirements, decisions, capabilities, commands, tools, gates, graphs, and diagnostics."

      - id: "AC-REQ-0012-002"
        statement: "The canonical external contract is JSON Schema."

      - id: "AC-REQ-0012-003"
        statement: "The generated report is validated against the JSON Schema before being used by visual or automated consumers."

      - id: "AC-REQ-0012-004"
        statement: "Runtime validators such as Zod may be used internally only if they are generated from, checked against, or kept aligned with the canonical JSON Schema."

    verification:
      method: "test"
      required_evidence:
        - "json-schema"
        - "tool-output"
        - "document"

  - id: "REQ-0013"
    macro_requirement_id: "MR-0003"
    capability_id: "CAP-GOVERNANCE-CONTROL"

    title: "Static governance control page generation"
    statement: >
      The project shall generate a static HTML governance control page from the
      validated governance control report.
    rationale: >
      A static page provides immediate human-readable exploration without
      requiring a backend server, authentication, database, or admin runtime.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"
    type: "functional"
    scope: "governance-control"

    preconditions:
      - id: "PRE-REQ-0013-001"
        statement: "The governance control report contract is defined."

    main_flow:
      - id: "FLOW-REQ-0013-001"
        step: 1
        actor: "Static page generator"
        action: "Reads the validated governance control report."
        expected_result: "The page uses report data instead of re-reading repository files independently."

      - id: "FLOW-REQ-0013-002"
        step: 2
        actor: "Static page generator"
        action: "Renders document, requirement, graph, file relationship, and diagnostic views."
        expected_result: "A human-readable static HTML control page is generated."

    alternative_flows:
      - id: "ALT-REQ-0013-001"
        title: "Report unavailable"
        trigger: "The governance control report cannot be generated or validated."
        steps:
          - id: "FLOW-REQ-0013-ALT-001"
            step: 1
            actor: "Static page generator"
            action: "Stops page generation."
            expected_result: "The page is not generated from invalid or missing report data."

    postconditions:
      - id: "POST-REQ-0013-001"
        statement: "A static HTML governance control page can be generated from the report."

    acceptance_criteria:
      - id: "AC-REQ-0013-001"
        statement: "The generated page displays repository health and check status."

      - id: "AC-REQ-0013-002"
        statement: "The generated page displays a documentation explorer."

      - id: "AC-REQ-0013-003"
        statement: "The generated page displays knowledge graph, documentation graph, and file relationship graph data."

      - id: "AC-REQ-0013-004"
        statement: "The generated page displays structured diagnostics."

      - id: "AC-REQ-0013-005"
        statement: "The generated page does not duplicate repository analysis logic that belongs to the report builder."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "document"

  - id: "REQ-0014"
    macro_requirement_id: "MR-0003"
    capability_id: "CAP-GOVERNANCE-CONTROL"

    title: "Machine-readable governance control interface"
    statement: >
      The governance control report shall be consumable by non-interactive tools
      and LLM agents without requiring the static HTML page.
    rationale: >
      The same repository governance state must support automated analysis,
      command-line workflows, future backend APIs, and LLM-assisted review.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"
    type: "data"
    scope: "governance-control"

    preconditions:
      - id: "PRE-REQ-0014-001"
        statement: "The governance control report contract is defined."

    main_flow:
      - id: "FLOW-REQ-0014-001"
        step: 1
        actor: "Tool or LLM consumer"
        action: "Reads the governance control report JSON."
        expected_result: "The consumer can inspect repository governance state without browser interaction."

      - id: "FLOW-REQ-0014-002"
        step: 2
        actor: "Tool or LLM consumer"
        action: "Uses stable IDs, graph edges, diagnostics, and source paths."
        expected_result: "Automated analysis can cite and navigate governed entities deterministically."

    alternative_flows:
      - id: "ALT-REQ-0014-001"
        title: "Consumer receives HTML only"
        trigger: "A tool or LLM is given only the static page instead of the structured report."
        steps:
          - id: "FLOW-REQ-0014-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Provides or exposes the report JSON instead."
            expected_result: "Machine consumers use structured report data."

    postconditions:
      - id: "POST-REQ-0014-001"
        statement: "Governance state is accessible to tools and LLM agents without a graphical interface."

    acceptance_criteria:
      - id: "AC-REQ-0014-001"
        statement: "The report uses stable governed IDs and normalized graph nodes and edges."

      - id: "AC-REQ-0014-002"
        statement: "Diagnostics are structured with severity, code, subject, evidence, and suggested action fields."

      - id: "AC-REQ-0014-003"
        statement: "The report can be consumed independently from the HTML page."

    verification:
      method: "analysis"
      required_evidence:
        - "json-schema"
        - "document"
        - "tool-output"

  - id: "REQ-0015"
    macro_requirement_id: "MR-0003"
    capability_id: "CAP-GOVERNANCE-CONTROL"

    title: "Future protected admin governance surface"
    statement: >
      A future protected admin governance surface shall consume or expose the
      same governance control report model instead of duplicating repository
      analysis logic.
    rationale: >
      The future admin interface must remain aligned with CLI tools, static
      reports, backend contracts, and LLM consumers.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "should"
    type: "functional"
    scope: "governance-control"

    preconditions:
      - id: "PRE-REQ-0015-001"
        statement: "The governance control report contract and static generator are defined."

    main_flow:
      - id: "FLOW-REQ-0015-001"
        step: 1
        actor: "Admin backend"
        action: "Exposes the governance control report through a protected interface."
        expected_result: "Admin clients receive the same data model used by static and CLI consumers."

      - id: "FLOW-REQ-0015-002"
        step: 2
        actor: "Admin UI"
        action: "Renders governance views from the report model."
        expected_result: "Admin UI behavior stays aligned with deterministic report generation."

    alternative_flows:
      - id: "ALT-REQ-0015-001"
        title: "Admin UI duplicates analysis logic"
        trigger: "The admin UI reads repository files independently using divergent parsing rules."
        steps:
          - id: "FLOW-REQ-0015-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Moves parsing logic back into the shared report builder or backend report service."
            expected_result: "The admin UI becomes a consumer of the governed report model."

    postconditions:
      - id: "POST-REQ-0015-001"
        statement: "The future protected admin surface remains a consumer of the governed report model."

    acceptance_criteria:
      - id: "AC-REQ-0015-001"
        statement: "Future admin endpoints expose or derive from the same governance control report contract."

      - id: "AC-REQ-0015-002"
        statement: "Future admin UI views do not duplicate repository parsing rules that belong to the report builder."

      - id: "AC-REQ-0015-003"
        statement: "Authentication and authorization are deferred until a backend admin runtime exists."

    verification:
      method: "analysis"
      required_evidence:
        - "api-contract"
        - "document"
        - "tool-output"


  - id: "REQ-0016"
    macro_requirement_id: "MR-0003"
    capability_id: "CAP-GOVERNANCE-CONTROL"

    title: "Governance control report JSON Schema validation"
    statement: >
      The project shall provide a canonical JSON Schema contract for the
      Governance Control Report and validate the schema file as part of
      deterministic documentation format checks.
    rationale: >
      The report-first governance control design needs an explicit machine
      contract before report generation or HTML rendering can be implemented.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "data"
    scope: "contracts"

    preconditions:
      - id: "PRE-REQ-0016-001"
        statement: "The governance control report contract requirement is accepted."

      - id: "PRE-REQ-0016-002"
        statement: "The repository has a governed contracts reference area."

    main_flow:
      - id: "FLOW-REQ-0016-001"
        step: 1
        actor: "Maintainer"
        action: "Defines the Governance Control Report JSON Schema."
        expected_result: "The schema declares the report top-level structure, required sections, graph records, and diagnostics records."

      - id: "FLOW-REQ-0016-002"
        step: 2
        actor: "Format validator"
        action: "Parses and checks the JSON Schema file."
        expected_result: "Invalid or incomplete schema structure is rejected."

      - id: "FLOW-REQ-0016-003"
        step: 3
        actor: "Future report generator"
        action: "Uses the schema to validate generated Governance Control Reports."
        expected_result: "Generated report validation is ready to be implemented in a later step."

    alternative_flows:
      - id: "ALT-REQ-0016-001"
        title: "Invalid JSON Schema file"
        trigger: "The schema file is not valid JSON or does not expose required JSON Schema baseline fields."
        steps:
          - id: "FLOW-REQ-0016-ALT-001"
            step: 1
            actor: "Format validator"
            action: "Reports the invalid schema contract."
            expected_result: "The documentation check fails."

    postconditions:
      - id: "POST-REQ-0016-001"
        statement: "The Governance Control Report has a canonical JSON Schema contract file."

    acceptance_criteria:
      - id: "AC-REQ-0016-001"
        statement: "The repository contains docs/reference/contracts/governance-control-report.schema.json."

      - id: "AC-REQ-0016-002"
        statement: "The schema declares all required top-level Governance Control Report sections."

      - id: "AC-REQ-0016-003"
        statement: "The format validator parses and checks the schema file."

      - id: "AC-REQ-0016-004"
        statement: "The schema is linked to governance control report requirements through the graph matrix."

    verification:
      method: "test"
      required_evidence:
        - "json-schema"
        - "tool-output"
        - "document"


  - id: "REQ-0017"
    macro_requirement_id: "MR-0003"
    capability_id: "CAP-GOVERNANCE-CONTROL"

    title: "Static governance control report builder"
    statement: >
      The project shall provide a deterministic command that builds a
      Governance Control Report JSON from governed repository state and validates
      it against the canonical report contract.
    rationale: >
      The report builder is the shared data-production layer for the future
      static page, protected admin UI, CLI consumers, backend APIs, and LLM
      agents.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "governance-control"

    preconditions:
      - id: "PRE-REQ-0017-001"
        statement: "The Governance Control Report JSON Schema contract exists."

      - id: "PRE-REQ-0017-002"
        statement: "Governed repository files can be read locally."

    main_flow:
      - id: "FLOW-REQ-0017-001"
        step: 1
        actor: "Report builder"
        action: "Reads project-model registries, graph matrix, documentation files, package scripts, and repository metadata."
        expected_result: "The builder has deterministic input data."

      - id: "FLOW-REQ-0017-002"
        step: 2
        actor: "Report builder"
        action: "Builds the Governance Control Report JSON object."
        expected_result: "The report includes repository metadata, checks, documents, requirements, decisions, capabilities, commands, tools, gates, graphs, and diagnostics."

      - id: "FLOW-REQ-0017-003"
        step: 3
        actor: "Report builder"
        action: "Validates the report against the canonical report schema baseline."
        expected_result: "Invalid reports are rejected before they are written or consumed."

      - id: "FLOW-REQ-0017-004"
        step: 4
        actor: "Report builder"
        action: "Writes artifacts/governance-control/report.json unless running in check mode."
        expected_result: "A local generated report is available for human and automated consumers."

    alternative_flows:
      - id: "ALT-REQ-0017-001"
        title: "Check mode"
        trigger: "The command is executed with --check."
        steps:
          - id: "FLOW-REQ-0017-ALT-001"
            step: 1
            actor: "Report builder"
            action: "Builds and validates the report without writing generated artifacts."
            expected_result: "The aggregate documentation check can validate report generation without modifying the working tree."

      - id: "ALT-REQ-0017-002"
        title: "Invalid report"
        trigger: "The generated report violates the schema baseline."
        steps:
          - id: "FLOW-REQ-0017-ALT-002"
            step: 1
            actor: "Report builder"
            action: "Reports the validation failure."
            expected_result: "The command fails and no invalid report is accepted."

    postconditions:
      - id: "POST-REQ-0017-001"
        statement: "The repository can produce a valid machine-readable Governance Control Report."

    acceptance_criteria:
      - id: "AC-REQ-0017-001"
        statement: "The command npm run docs:control:report writes artifacts/governance-control/report.json."

      - id: "AC-REQ-0017-002"
        statement: "The command npm run docs:check:control-report validates report generation without writing artifacts."

      - id: "AC-REQ-0017-003"
        statement: "The generated report contains the top-level sections required by the canonical JSON Schema."

      - id: "AC-REQ-0017-004"
        statement: "docs:check runs the control report check command."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "json-schema"
