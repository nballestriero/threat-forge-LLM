schema_version: "1.0"

change_control:
  decided_by:
    - "DEC-0013"
  satisfies:
    - "REQ-0022"
  rationale: >
    This governed baseline artifact declares its internal traceability marker so
    deterministic validation can compare file-local change-control metadata with
    graph.matrix.yml relationships.

schema_control:
  schema: "docs/reference/project-model/schemas/requirements-registry.schema.json"
  rationale: >
    The requirements registry declares the canonical schema that validates its
    structural shape so schema-to-artifact application can be checked
    bidirectionally against graph.matrix.yml.

registry:
  id: "requirements-registry"
  title: "Requirements registry"
  status: "draft"
  description: >
    Authoritative registry of macro requirements and atomic requirements.

parts:
  - area_id: schema-validation
    path: docs/reference/project-model/requirements/schema-validation.requirements.yml
    description: First extracted requirements part for governed schema contracts, schema
      application traceability, and schema validation execution.
macro_requirements:
  - id: "MR-0001"
    title: "Governed documentation and traceability"
    statement: >
      The project shall maintain governed documentation, requirements, decisions,
      and traceability structures that can be validated and later imported into a
      graph database.
    rationale: >
      Documentation, requirements, decisions, and relationships must be stable
      enough for humans, deterministic tools, and future graph import.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"

  - id: "MR-0002"
    title: "Default backend architecture and contracts"
    statement: >
      The project shall define default backend implementation patterns and
      backend/API contract documentation rules before runtime backend code is
      introduced.
    rationale: >
      Successful backend patterns from the previous project should be preserved
      as approved defaults while still being reintroduced cleanly in the new
      repository model.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"

  - id: "MR-0003"
    title: "Governance control report and admin surface"
    statement: >
      The project shall expose repository governance state through a deterministic
      report contract that can be consumed by a static page, future protected
      admin UI, CLI tools, backend APIs, and LLM agents.
    rationale: >
      Repository governance must be observable without relying only on terminal
      output or ad-hoc manual file inspection.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"

requirements:
  - id: "REQ-0001"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Diátaxis documentation corpus"
    statement: >
      The documentation corpus shall be organized according to the Diátaxis
      model.
    rationale: >
      Diátaxis separates learning, task execution, technical reference, and
      explanation, reducing ambiguity in document purpose.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0001-001"
        statement: "The repository contains a docs directory."

    main_flow:
      - id: "FLOW-REQ-0001-001"
        step: 1
        actor: "Maintainer"
        action: "Creates the tutorials, how-to, reference, and explanation sections."
        expected_result: "The docs directory follows the Diátaxis top-level structure."

      - id: "FLOW-REQ-0001-002"
        step: 2
        actor: "Maintainer"
        action: "Places governed technical project model files under docs/reference/project-model."
        expected_result: "The reference corpus contains the compact project model."

    alternative_flows:
      - id: "ALT-REQ-0001-001"
        title: "Operational project state"
        trigger: "A file represents temporary work state instead of product documentation."
        steps:
          - id: "FLOW-REQ-0001-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Stores the file outside the Diátaxis documentation corpus."
            expected_result: "The operational file is placed under project."

    postconditions:
      - id: "POST-REQ-0001-001"
        statement: "The documentation corpus has stable Diátaxis folders."

      - id: "POST-REQ-0001-002"
        statement: "The compact project model has a stable location."

    acceptance_criteria:
      - id: "AC-REQ-0001-001"
        statement: "docs/tutorials exists."

      - id: "AC-REQ-0001-002"
        statement: "docs/how-to exists."

      - id: "AC-REQ-0001-003"
        statement: "docs/reference exists."

      - id: "AC-REQ-0001-004"
        statement: "docs/explanation exists."

      - id: "AC-REQ-0001-005"
        statement: "docs/reference/project-model exists."

    verification:
      method: "inspection"
      required_evidence:
        - "repository-path"
        - "document"

  - id: "REQ-0002"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-GRAPH-IMPORT"

    title: "Canonical SPO relationships"
    statement: >
      Governed relationships shall be represented as Subject-Predicate-Object
      triples.
    rationale: >
      SPO triples make relationships deterministic, validateable, and suitable
      for future graph import.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "data"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0002-001"
        statement: "The project has governed entities that require traceability."

    main_flow:
      - id: "FLOW-REQ-0002-001"
        step: 1
        actor: "Maintainer"
        action: "Adds governed relationships to the graph matrix as SPO triples."
        expected_result: "Each governed relationship has a subject, predicate, and object."

      - id: "FLOW-REQ-0002-002"
        step: 2
        actor: "Future validator"
        action: "Checks the predicate against the governance registry."
        expected_result: "Only registered predicates are accepted."

    alternative_flows:
      - id: "ALT-REQ-0002-001"
        title: "Grouped relationship field is present"
        trigger: "A human-friendly grouped relationship field is introduced."
        steps:
          - id: "FLOW-REQ-0002-ALT-001"
            step: 1
            actor: "Future validator"
            action: "Checks that the grouped field is derived from or equivalent to SPO triples."
            expected_result: "The grouped field does not contradict the graph matrix."

    postconditions:
      - id: "POST-REQ-0002-001"
        statement: "The graph matrix remains the canonical source of governed relationships."

    acceptance_criteria:
      - id: "AC-REQ-0002-001"
        statement: "Each governed relationship in graph.matrix.yml uses subject, predicate, and object."

      - id: "AC-REQ-0002-002"
        statement: "Each predicate used by graph.matrix.yml is registered in governance.registry.yml."

    verification:
      method: "inspection"
      required_evidence:
        - "yaml"
        - "registry-entry"

  - id: "REQ-0003"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Validated Markdown body profiles"
    statement: >
      Governed Markdown documents shall be validated against registered body
      profiles, not only against frontmatter.
    rationale: >
      Validating only frontmatter leaves the body uncontrolled. Body profiles
      make documents predictable, parseable, and suitable for future deterministic
      checks.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0003-001"
        statement: "Governed Markdown documents exist in the documentation corpus."

    main_flow:
      - id: "FLOW-REQ-0003-001"
        step: 1
        actor: "Maintainer"
        action: "Assigns a document type with an associated body profile."
        expected_result: "The document has a known body structure."

      - id: "FLOW-REQ-0003-002"
        step: 2
        actor: "Future validator"
        action: "Checks the document body against the registered profile."
        expected_result: "Required headings and structural rules are enforced."

    alternative_flows:
      - id: "ALT-REQ-0003-001"
        title: "Document does not match its profile"
        trigger: "A governed Markdown document has missing or invalid body sections."
        steps:
          - id: "FLOW-REQ-0003-ALT-001"
            step: 1
            actor: "Future validator"
            action: "Reports the body profile violation."
            expected_result: "The invalid document is blocked or flagged according to the gate policy."

    postconditions:
      - id: "POST-REQ-0003-001"
        statement: "Governed Markdown documents have deterministic body structures."

    acceptance_criteria:
      - id: "AC-REQ-0003-001"
        statement: "governance.registry.yml defines body profiles."

      - id: "AC-REQ-0003-002"
        statement: "Each document type references a body profile."

    verification:
      method: "inspection"
      required_evidence:
        - "registry-entry"
        - "document"

  - id: "REQ-0004"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Documentation structure guard"
    statement: >
      The repository shall provide a deterministic validation tool that checks
      the governed documentation folder structure and required canonical files.
    rationale: >
      The documentation corpus must not drift from the agreed Diátaxis structure
      or from the compact project-model layout without an explicit governed
      change.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0004-001"
        statement: "The repository contains the governed documentation corpus."

      - id: "PRE-REQ-0004-002"
        statement: "The canonical project model files are expected under docs/reference/project-model."

    main_flow:
      - id: "FLOW-REQ-0004-001"
        step: 1
        actor: "Maintainer"
        action: "Runs the documentation structure check command."
        expected_result: "The deterministic structure guard starts."

      - id: "FLOW-REQ-0004-002"
        step: 2
        actor: "Validation tool"
        action: "Checks required documentation directories."
        expected_result: "Required Diátaxis and project-model directories exist."

      - id: "FLOW-REQ-0004-003"
        step: 3
        actor: "Validation tool"
        action: "Checks required canonical files."
        expected_result: "Required project files, documentation files, and tool files exist."

      - id: "FLOW-REQ-0004-004"
        step: 4
        actor: "Validation tool"
        action: "Checks forbidden legacy or uncontrolled paths."
        expected_result: "Forbidden paths are reported as validation errors."

    alternative_flows:
      - id: "ALT-REQ-0004-001"
        title: "Structure violation"
        trigger: "A required directory or file is missing, or a forbidden path exists."
        steps:
          - id: "FLOW-REQ-0004-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports the structure violation."
            expected_result: "The check exits with a non-zero status."

          - id: "FLOW-REQ-0004-ALT-002"
            step: 2
            actor: "Git hook"
            action: "Blocks the commit when the validation command fails."
            expected_result: "The invalid structure is not committed."

    postconditions:
      - id: "POST-REQ-0004-001"
        statement: "The documentation structure is confirmed valid or the check fails explicitly."

      - id: "POST-REQ-0004-002"
        statement: "Commits are blocked when the structure guard fails and the hook is enabled."

    acceptance_criteria:
      - id: "AC-REQ-0004-001"
        statement: "The repository provides a docs:check:structure command."

      - id: "AC-REQ-0004-002"
        statement: "The structure guard checks required Diátaxis directories."

      - id: "AC-REQ-0004-003"
        statement: "The structure guard checks required canonical project-model files."

      - id: "AC-REQ-0004-004"
        statement: "The structure guard rejects forbidden legacy paths."

      - id: "AC-REQ-0004-005"
        statement: "The pre-commit hook runs the documentation checks."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "git-hook"

  - id: "REQ-0005"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-REQUIREMENTS-MANAGEMENT"

    title: "Bidirectional implementation traceability"
    statement: >
      The project shall verify that governed source files are registered in
      graph.matrix.yml, that implementation relationships declared in
      graph.matrix.yml are mirrored by traceability references in source-file
      comments, and that source-file traceability claims are mirrored by graph
      matrix triples.
    rationale: >
      Bidirectional checks prevent unregistered source files from entering the
      repository, prevent the matrix from claiming implementation that code does
      not acknowledge, and prevent code comments from claiming governed
      implementation that the graph matrix does not record.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "repository"

    preconditions:
      - id: "PRE-REQ-0005-001"
        statement: "The graph matrix contains IMPLEMENTED_BY relationships involving source files."

      - id: "PRE-REQ-0005-002"
        statement: "Source files can contain parseable file-level JSDoc traceability comments."

    main_flow:
      - id: "FLOW-REQ-0005-001"
        step: 1
        actor: "Validation tool"
        action: "Discovers governed source files under controlled source roots."
        expected_result: "Source files that require graph traceability are known even before graph.matrix.yml
          references them."

      - id: "FLOW-REQ-0005-002"
        step: 2
        actor: "Validation tool"
        action: "Reads IMPLEMENTED_BY triples from graph.matrix.yml."
        expected_result: "The expected requirement-to-source-file relationships are known."

      - id: "FLOW-REQ-0005-003"
        step: 3
        actor: "Validation tool"
        action: "Reads file-level traceability comments from referenced and discovered source files."
        expected_result: "The source-file implementation claims are known."

      - id: "FLOW-REQ-0005-004"
        step: 4
        actor: "Validation tool"
        action: "Compares discovered files, matrix-to-code traceability, and code-to-matrix traceability."
        expected_result: "Unregistered source files and bidirectional traceability mismatches are
          rejected."

    alternative_flows:
      - id: "ALT-REQ-0005-001"
        title: "Governed source file is not registered"
        trigger: "A source file exists under a governed source root but has no IMPLEMENTED_BY relationship
          in graph.matrix.yml."
        steps:
          - id: "FLOW-REQ-0005-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports the unregistered governed source file."
            expected_result: "The check fails before an untraceable source file can be committed."

      - id: "ALT-REQ-0005-002"
        title: "Matrix references source file without source comment"
        trigger: "graph.matrix.yml contains an IMPLEMENTED_BY SourceFile triple but the source file
          does not cite the requirement."
        steps:
          - id: "FLOW-REQ-0005-ALT-002"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing source-file traceability comment."
            expected_result: "The check fails with a traceability error."

      - id: "ALT-REQ-0005-003"
        title: "Source comment references requirement without matrix triple"
        trigger: "A source file claims it implements a requirement but graph.matrix.yml has no matching
          IMPLEMENTED_BY triple."
        steps:
          - id: "FLOW-REQ-0005-ALT-003"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing graph matrix relationship."
            expected_result: "The check fails with a traceability error."

    postconditions:
      - id: "POST-REQ-0005-001"
        statement: "Every governed source file is represented by IMPLEMENTED_BY traceability in graph.matrix.yml."

      - id: "POST-REQ-0005-002"
        statement: "Implementation traceability is consistent between graph.matrix.yml and source-file
          comments."

      - id: "POST-REQ-0005-003"
        statement: "Traceability is enforced at file level before future code-symbol-level traceability
          is introduced."

    acceptance_criteria:
      - id: "AC-REQ-0005-001"
        statement: "Each governed source file under controlled source roots has at least one matching
          IMPLEMENTED_BY SourceFile triple."

      - id: "AC-REQ-0005-002"
        statement: "Each IMPLEMENTED_BY SourceFile triple points to an existing source file."

      - id: "AC-REQ-0005-003"
        statement: "Each SourceFile referenced by an IMPLEMENTED_BY requirement triple declares the
          related requirement in file-level JSDoc."

      - id: "AC-REQ-0005-004"
        statement: "Each file-level JSDoc requirement claim has a matching IMPLEMENTED_BY triple in
          graph.matrix.yml."

      - id: "AC-REQ-0005-005"
        statement: "Each validation tool node declared by a source file exists in graph.matrix.yml."

      - id: "AC-REQ-0005-006"
        statement: "Each validation tool implemented by a source file has a matching IMPLEMENTED_BY
          triple."

    verification:
      method: "test"
      required_evidence:
        - "source-comment"
        - "yaml"
        - "tool-output"


  - id: "REQ-0006"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-REQUIREMENTS-MANAGEMENT"

    title: "Validation command consistency"
    statement: >
      The project shall verify that governed validation Command nodes in
      graph.matrix.yml are consistent with executable scripts declared in
      package.json.
    rationale: >
      Validation command traceability is only useful if the graph matrix and
      package manifest agree on the commands that can actually be run.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "tooling"

    preconditions:
      - id: "PRE-REQ-0006-001"
        statement: "The repository declares validation commands as Command nodes in graph.matrix.yml."

      - id: "PRE-REQ-0006-002"
        statement: "The repository declares executable npm scripts in package.json."

    main_flow:
      - id: "FLOW-REQ-0006-001"
        step: 1
        actor: "Validation tool"
        action: "Reads Command nodes from graph.matrix.yml."
        expected_result: "The governed command set is known."

      - id: "FLOW-REQ-0006-002"
        step: 2
        actor: "Validation tool"
        action: "Reads scripts from package.json."
        expected_result: "The executable npm script set is known."

      - id: "FLOW-REQ-0006-003"
        step: 3
        actor: "Validation tool"
        action: "Compares npm run Command nodes with package.json scripts."
        expected_result: "Each governed npm validation command points to an existing script."

    alternative_flows:
      - id: "ALT-REQ-0006-001"
        title: "Command node references missing script"
        trigger: "A Command node declares an npm run command whose script does not exist in package.json."
        steps:
          - id: "FLOW-REQ-0006-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing package.json script."
            expected_result: "The check fails with a command consistency error."

      - id: "ALT-REQ-0006-002"
        title: "Governed validation script lacks Command node"
        trigger: "A validation script in package.json has no matching Command node."
        steps:
          - id: "FLOW-REQ-0006-ALT-002"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing graph matrix Command node."
            expected_result: "The check fails with a command consistency error."

    postconditions:
      - id: "POST-REQ-0006-001"
        statement: "Governed validation commands are consistent between graph.matrix.yml and package.json."

    acceptance_criteria:
      - id: "AC-REQ-0006-001"
        statement: "Each npm run Command node references an existing package.json script."

      - id: "AC-REQ-0006-002"
        statement: "Each governed validation script in package.json has a matching Command node."

      - id: "AC-REQ-0006-003"
        statement: "Command nodes are still linked through SPO triples."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "yaml"
        - "tool-output"


  - id: "REQ-0007"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Governed file format validation"
    statement: >
      The project shall provide deterministic validation for governed YAML and
      Markdown file formats.
    rationale: >
      Governed files must remain parseable and structurally predictable. YAML
      project-model files need baseline top-level format checks, and Markdown
      documentation files need body profile checks.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "documentation-corpus"

    preconditions:
      - id: "PRE-REQ-0007-001"
        statement: "The repository contains governed YAML project-model files."

      - id: "PRE-REQ-0007-002"
        statement: "The repository contains governed Markdown documentation files."

      - id: "PRE-REQ-0007-003"
        statement: "The governance registry defines document types and body profiles."

    main_flow:
      - id: "FLOW-REQ-0007-001"
        step: 1
        actor: "Validation tool"
        action: "Parses governed YAML project-model files."
        expected_result: "The YAML files are parseable and expose required top-level fields."

      - id: "FLOW-REQ-0007-002"
        step: 2
        actor: "Validation tool"
        action: "Loads registered Markdown body profiles."
        expected_result: "The allowed body structures are known."

      - id: "FLOW-REQ-0007-003"
        step: 3
        actor: "Validation tool"
        action: "Checks governed Markdown files against their expected body profiles."
        expected_result: "Required body headings are present and forbidden headings are absent."

    alternative_flows:
      - id: "ALT-REQ-0007-001"
        title: "Invalid YAML project model file"
        trigger: "A governed YAML file is not parseable or misses a required top-level section."
        steps:
          - id: "FLOW-REQ-0007-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports the invalid YAML format."
            expected_result: "The check fails with a format validation error."

      - id: "ALT-REQ-0007-002"
        title: "Markdown file violates body profile"
        trigger: "A governed Markdown file misses a required body heading or contains a forbidden
          heading."
        steps:
          - id: "FLOW-REQ-0007-ALT-002"
            step: 1
            actor: "Validation tool"
            action: "Reports the Markdown body profile violation."
            expected_result: "The check fails with a format validation error."

    postconditions:
      - id: "POST-REQ-0007-001"
        statement: "Governed YAML and Markdown file formats are confirmed valid or the check fails
          explicitly."

    acceptance_criteria:
      - id: "AC-REQ-0007-001"
        statement: "YAML project-model files are parsed and checked for required top-level format."

      - id: "AC-REQ-0007-002"
        statement: "Markdown files are checked against registered body profiles."

      - id: "AC-REQ-0007-003"
        statement: "docs:check runs the format validator."

      - id: "AC-REQ-0007-004"
        statement: "Invalid governed file formats block commits."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "document"


  - id: "REQ-0008"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-REQUIREMENTS-MANAGEMENT"

    title: "Validator negative fixtures"
    statement: >
      The project shall provide controlled negative fixtures that verify
      deterministic validators fail for intentionally invalid governed states.
    rationale: >
      Negative fixtures prove that validators catch the classes of errors they
      claim to enforce and reduce the risk of false-positive green gates.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "tooling"

    preconditions:
      - id: "PRE-REQ-0008-001"
        statement: "The repository provides deterministic documentation governance validators."

      - id: "PRE-REQ-0008-002"
        statement: "The repository can create temporary copies of governed files for fixture execution."

    main_flow:
      - id: "FLOW-REQ-0008-001"
        step: 1
        actor: "Validation tool"
        action: "Loads controlled negative fixture specifications."
        expected_result: "Each fixture declares a mutation, target validator, and expected error."

      - id: "FLOW-REQ-0008-002"
        step: 2
        actor: "Validation tool"
        action: "Applies each fixture mutation to a temporary repository copy."
        expected_result: "The real working tree remains unchanged."

      - id: "FLOW-REQ-0008-003"
        step: 3
        actor: "Validation tool"
        action: "Runs the target validator for each negative fixture."
        expected_result: "The target validator fails with the expected error."

    alternative_flows:
      - id: "ALT-REQ-0008-001"
        title: "Invalid fixture is accepted"
        trigger: "A target validator exits successfully for an intentionally invalid fixture."
        steps:
          - id: "FLOW-REQ-0008-ALT-001"
            step: 1
            actor: "Validation tool"
            action: "Reports that the negative fixture was accepted unexpectedly."
            expected_result: "The negative fixture runner fails."

      - id: "ALT-REQ-0008-002"
        title: "Expected diagnostic is missing"
        trigger: "A target validator fails but does not report the expected error."
        steps:
          - id: "FLOW-REQ-0008-ALT-002"
            step: 1
            actor: "Validation tool"
            action: "Reports the missing expected diagnostic."
            expected_result: "The negative fixture runner fails."

    postconditions:
      - id: "POST-REQ-0008-001"
        statement: "Validator failure behavior is covered by controlled negative fixtures."

    acceptance_criteria:
      - id: "AC-REQ-0008-001"
        statement: "At least one negative fixture covers duplicate governed IDs."

      - id: "AC-REQ-0008-002"
        statement: "At least one negative fixture covers invalid SPO predicates."

      - id: "AC-REQ-0008-003"
        statement: "At least one negative fixture covers invalid package command traceability."

      - id: "AC-REQ-0008-004"
        statement: "At least one negative fixture covers missing source-file traceability."

      - id: "AC-REQ-0008-005"
        statement: "At least one negative fixture covers invalid Markdown body profile format."

      - id: "AC-REQ-0008-006"
        statement: "At least one negative fixture covers invalid YAML project-model format."

      - id: "AC-REQ-0008-007"
        statement: "At least one negative fixture covers an unregistered governed source file."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "yaml"


  - id: "REQ-0009"
    macro_requirement_id: "MR-0002"
    capability_id: "CAP-BACKEND-ARCHITECTURE"

    title: "Default backend composition pattern"
    statement: >
      Backend implementation shall use factory or composition-root based
      dependency composition as the default pattern.
    rationale: >
      Dependency composition must stay explicit and centralized so controllers,
      route handlers, and application services do not create concrete
      infrastructure dependencies directly.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"
    type: "non-functional"
    scope: "repository"

