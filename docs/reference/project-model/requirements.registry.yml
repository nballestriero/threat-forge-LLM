      part schema contract before splitting the monolithic requirements
      registry into area-owned part files.
    rationale: >
      Requirements modularization changes identifier semantics, loading
      boundaries, parent macro resolution, graph references, and schema
      validation. Defining the contract first prevents an ad hoc split that
      duplicates validation logic or loses traceability.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "project-model"

