    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"
    title: "Graph index and part schema contracts"
    statement: >
      The project shall define the future graph index and graph part schema
      contract before splitting the monolithic graph matrix into area-owned
      graph part files.
    rationale: >
      Graph modularization changes traceability ownership, node and triple
      loading boundaries, cross-area relationship ownership, predicate
      compatibility checks, entity resolution, command validation, schema
      application checks, and source traceability checks. Defining the contract
      first prevents an ad hoc graph split that loses deterministic semantic
      validation or duplicates schema validation logic.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "project-model"

