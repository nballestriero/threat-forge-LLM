            step: 1
            actor: "Maintainer"
            action: "Leaves the rule in the semantic validator and documents the boundary in the schema analysis."
            expected_result: "The schema remains a shape contract and does not pretend to validate cross-file semantics."

    postconditions:
      - id: "POST-REQ-0024-001"
        statement: "The governance registry has a canonical JSON Schema artifact."

      - id: "POST-REQ-0024-002"
        statement: "The schema artifact is registered and traceable as a governed baseline artifact."

    acceptance_criteria:
      - id: "AC-REQ-0024-001"
        statement: "docs/reference/project-model/schemas/governance-registry.schema.json exists and is valid JSON."

      - id: "AC-REQ-0024-002"
