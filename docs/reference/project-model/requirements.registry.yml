        statement: "The governance registry schema artifact exists."

      - id: "PRE-REQ-0026-002"
        statement: "The governance registry is validated against the schema by docs:check:format."

    main_flow:
      - id: "FLOW-REQ-0026-001"
        step: 1
        actor: "Schema artifact"
        action: "Declares the governed target artifact paths it applies to."
        expected_result: "Schema coverage is explicit inside the schema artifact."

      - id: "FLOW-REQ-0026-002"
        step: 2
        actor: "Governed target artifact"
        action: "Declares its canonical schema through schema_control metadata."
        expected_result: "The target artifact exposes artifact-to-schema traceability."

      - id: "FLOW-REQ-0026-003"
        step: 3
        actor: "Project model validator"
        action: "Compares schema-local x-applies_to metadata, artifact schema_control metadata, and graph.matrix.yml APPLIES_TO triples."
        expected_result: "Schema application traceability is consistent in both directions."

    alternative_flows:
      - id: "ALT-REQ-0026-001"
        title: "Schema application is missing from one side"
        trigger: "A schema, target artifact, or graph relationship omits the schema application relationship."
        steps:
          - id: "FLOW-REQ-0026-ALT-001"
            step: 1
            actor: "Project model validator"
            action: "Reports the missing schema application traceability side."
            expected_result: "The change is rejected until schema, artifact, and graph agree."

    postconditions:
      - id: "POST-REQ-0026-001"
        statement: "The governance registry schema application relationship is explicit in the schema, target artifact, and graph matrix."

    acceptance_criteria:
      - id: "AC-REQ-0026-001"
        statement: "docs/reference/project-model/schemas/governance-registry.schema.json declares x-applies_to for docs/reference/project-model/governance.registry.yml."

      - id: "AC-REQ-0026-002"
        statement: "docs/reference/project-model/governance.registry.yml declares schema_control.schema for the governance registry schema."

      - id: "AC-REQ-0026-003"
        statement: "graph.matrix.yml contains a schema APPLIES_TO governance registry triple."

      - id: "AC-REQ-0026-004"
