  - id: "REQ-0020"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Project handoff ZIP command"
    statement: >
      The project shall provide a deterministic cross-platform command that
      creates a local handoff ZIP archive containing the repository state,
      including hidden project metadata such as .git, while excluding dependency
      installations, build outputs, generated artifacts, local IDE caches, and
      environment files by default.
    rationale: >
      Handoffs between human and LLM work sessions require a reproducible
      project snapshot that can be created on Windows, Linux, or macOS without
      relying on platform-specific archive commands or accidentally packaging
      large dependency installations and local caches.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "tooling"

    preconditions:
      - id: "PRE-REQ-0020-001"
        statement: "The project is available as a local repository checkout."

      - id: "PRE-REQ-0020-002"
        statement: "Node.js is available according to the package engine baseline."

    main_flow:
      - id: "FLOW-REQ-0020-001"
        step: 1
        actor: "Handoff ZIP builder"
        action: "Walks the repository filesystem using Node.js standard library APIs."
        expected_result: "The builder discovers repository files consistently across supported operating systems."

      - id: "FLOW-REQ-0020-002"
        step: 2
        actor: "Handoff ZIP builder"
        action: "Includes hidden project metadata such as .git while applying the controlled exclusion policy."
        expected_result: "The archive contains repository history and excludes dependency folders, local caches, generated artifacts, and environment files."

      - id: "FLOW-REQ-0020-003"
        step: 3
        actor: "Handoff ZIP builder"
        action: "Writes a ZIP archive and manifest under artifacts/handoff unless an explicit output path is provided."
        expected_result: "A local handoff archive is available without adding generated artifacts to Git."

    alternative_flows:
      - id: "ALT-REQ-0020-001"
        title: "Dry run"
        trigger: "The dry-run command is executed."
        steps:
          - id: "FLOW-REQ-0020-ALT-001"
            step: 1
            actor: "Handoff ZIP builder"
            action: "Reports the planned output path, included file count, .git inclusion, and skipped entries without writing an archive."
            expected_result: "The exclusion policy can be inspected before creating a ZIP."

      - id: "ALT-REQ-0020-002"
        title: "Explicit environment inclusion"
        trigger: "The command is executed with --include-env."
        steps:
          - id: "FLOW-REQ-0020-ALT-002"
            step: 1
            actor: "Handoff ZIP builder"
            action: "Includes .env files only after an explicit command-line request."
            expected_result: "Sensitive environment files remain excluded by default."

    postconditions:
      - id: "POST-REQ-0020-001"
        statement: "The repository can generate a handoff ZIP archive with .git included and dependency installations excluded."

    acceptance_criteria:
      - id: "AC-REQ-0020-001"
        statement: "The command npm run context:zip:handoff writes a ZIP archive under artifacts/handoff by default."

      - id: "AC-REQ-0020-002"
        statement: "The command npm run context:zip:handoff:dry-run reports the archive plan without writing a ZIP."

      - id: "AC-REQ-0020-003"
        statement: "The generated archive includes .git and excludes node_modules, .vs, artifacts, build outputs, caches, logs, archive files, and .env files by default."

      - id: "AC-REQ-0020-004"
        statement: "Generated handoff artifacts remain outside Git tracking."

    verification:
      method: "test"
      required_evidence:
        - "command"
        - "tool-output"
        - "repository-path"
        - "source-comment"


  - id: "REQ-0021"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Explicit governed registry schemas"
    statement: >
      The project shall define explicit machine-readable schema files for every
      governed project registry and graph matrix, and deterministic validation
      tools shall load and apply those canonical schemas instead of relying only
      on hardcoded registry-shape checks. For every registry, fields constrained
      to controlled value sets shall declare their authoritative dataset or
      taxonomy, and each controlled value set shall be explicitly decided,
      documented, and motivated.
    rationale: >
      The project model is itself a contract. If registry schemas and controlled
      value datasets exist only implicitly inside validator code, future changes
      can create drift between registries, validators, reports, editor support,
      generated pages, and LLM consumers. Explicit schemas and motivated
      datasets make governance rules inspectable, reusable, and enforceable.
    status: "accepted"
    implementation_status: "not_implemented"
    priority: "must"
    type: "data"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0021-001"
        statement: "The project has governed registries for governance, requirements, and graph relationships."

      - id: "PRE-REQ-0021-002"
        statement: "Deterministic validation tools already parse and validate the project model baseline."

    main_flow:
      - id: "FLOW-REQ-0021-001"
        step: 1
        actor: "Maintainer"
        action: "Defines canonical schema files for each governed registry and graph matrix."
        expected_result: "Registry structure is documented as explicit machine-readable schema artifacts."

      - id: "FLOW-REQ-0021-002"
        step: 2
        actor: "Maintainer"
        action: "Identifies which registry fields are constrained by controlled datasets or taxonomies."
        expected_result: "Each controlled field names the authoritative dataset or taxonomy used for validation."

      - id: "FLOW-REQ-0021-003"
        step: 3
        actor: "Maintainer"
        action: "Documents the meaning, rationale, and validation impact of each controlled value set."
        expected_result: "Controlled values are justified before they become binding validation inputs."

      - id: "FLOW-REQ-0021-004"
        step: 4
        actor: "Validator"
        action: "Loads the canonical schema files and validates registries against them."
        expected_result: "Registry validation is driven by governed schema artifacts rather than hardcoded shape logic alone."

    alternative_flows:
      - id: "ALT-REQ-0021-001"
        title: "Schema missing or invalid"
        trigger: "A governed registry has no canonical schema file or the schema itself is invalid."
        steps:
          - id: "FLOW-REQ-0021-ALT-001"
            step: 1
            actor: "Validator"
            action: "Rejects the validation run and reports the missing or invalid schema artifact."
            expected_result: "Registries cannot be accepted without valid schema governance."

      - id: "ALT-REQ-0021-002"
        title: "Unjustified controlled value set"
        trigger: "A registry field is constrained to enumerated values without an authoritative dataset, meaning, rationale, or validation impact."
        steps:
          - id: "FLOW-REQ-0021-ALT-002"
            step: 1
            actor: "Validator"
            action: "Reports the incomplete controlled dataset definition."
            expected_result: "Controlled values cannot become hidden hardcoded assumptions."

    postconditions:
      - id: "POST-REQ-0021-001"
        statement: "Every governed registry has a canonical schema path and validation policy."

      - id: "POST-REQ-0021-002"
        statement: "Every controlled registry field has an explicit authoritative dataset or taxonomy decision."

    acceptance_criteria:
      - id: "AC-REQ-0021-001"
        statement: "The project defines schema artifacts for governance.registry.yml, requirements.registry.yml, and graph.matrix.yml."

      - id: "AC-REQ-0021-002"
        statement: "The project model validator reads canonical registry schema files during validation."

      - id: "AC-REQ-0021-003"
        statement: "Each controlled field in the governed registries is mapped to an authoritative dataset or taxonomy."

      - id: "AC-REQ-0021-004"
        statement: "Each controlled value set documents meaning, rationale, and validation impact."

      - id: "AC-REQ-0021-005"
        statement: "Validator logic may add semantic checks, but it must not be the only source of registry shape definitions."

    verification:
      method: "analysis"
      required_evidence:
        - "json-schema"
        - "yaml"
        - "registry-entry"
        - "tool-output"

  - id: "REQ-0022"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Governed baseline artifact bidirectional traceability"
    statement: >
      The project shall require governed baseline artifacts to declare internal
      change-control markers that identify the governing requirement and
      decision, and the project graph shall contain matching relationships for
      those artifacts. Deterministic validation shall reject baseline artifacts
      whose file-local markers and graph relationships do not agree.
    rationale: >
      Registry, graph, schema, and contract files define the governance system
      itself. If they can be added or modified without internal traceability, the
      graph may look complete while the artifact body remains ungoverned, or the
      artifact may claim a requirement that the graph does not confirm.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0022-001"
        statement: "The project model registry, requirements registry, and graph matrix exist as governed baseline artifacts."

      - id: "PRE-REQ-0022-002"
        statement: "The project model validator already validates graph relationships and source-file traceability."

    main_flow:
      - id: "FLOW-REQ-0022-001"
        step: 1
        actor: "Maintainer"
        action: "Adds file-local change_control metadata to governed baseline artifacts."
        expected_result: "Each baseline artifact identifies the decision and requirement governing its baseline role."

      - id: "FLOW-REQ-0022-002"
        step: 2
        actor: "Maintainer"
        action: "Adds matching graph.matrix.yml triples from the governing requirement to each baseline artifact."
        expected_result: "The project graph confirms the artifact-local traceability claim."

      - id: "FLOW-REQ-0022-003"
        step: 3
        actor: "Project model validator"
        action: "Checks marker-to-graph and graph-to-marker consistency for governed baseline artifacts."
        expected_result: "A baseline artifact without bidirectional traceability is rejected."

    alternative_flows:
      - id: "ALT-REQ-0022-001"
        title: "Missing baseline marker"
        trigger: "A governed baseline artifact has no change_control metadata."
        steps:
          - id: "FLOW-REQ-0022-ALT-001"
            step: 1
            actor: "Project model validator"
            action: "Reports the missing file-local marker."
            expected_result: "The project model check fails before the artifact can be accepted."

      - id: "ALT-REQ-0022-002"
        title: "Graph mismatch"
        trigger: "A baseline artifact marker names a requirement or decision that is not confirmed by graph.matrix.yml."
        steps:
          - id: "FLOW-REQ-0022-ALT-002"
            step: 1
            actor: "Project model validator"
            action: "Reports the mismatched marker and graph relationship."
            expected_result: "The drift between artifact metadata and graph traceability is visible and blocking."

    postconditions:
      - id: "POST-REQ-0022-001"
        statement: "Project-model baseline artifacts have bidirectional marker and graph traceability."

    acceptance_criteria:
      - id: "AC-REQ-0022-001"
        statement: "governance.registry.yml, requirements.registry.yml, and graph.matrix.yml declare change_control.decided_by and change_control.satisfies markers."

      - id: "AC-REQ-0022-002"
        statement: "graph.matrix.yml contains matching SPECIFIED_BY relationships for each baseline artifact marker."

      - id: "AC-REQ-0022-003"
        statement: "The project model validator rejects a governed baseline artifact with missing or mismatched change_control metadata."

      - id: "AC-REQ-0022-004"
        statement: "A controlled negative fixture proves that baseline artifact marker removal is rejected."

    verification:
      method: "test"
      required_evidence:
        - "yaml"
        - "registry-entry"
        - "command"
        - "tool-output"

  - id: "REQ-0023"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Governance registry schema field classification"
    statement: >
      Before creating the explicit governance registry schema, the project shall
      document the current governance registry field model, classify fields as
      structural, free text, controlled values, governed IDs, ID references, or
      semantic validation rules, and inventory the validator rules that are
      currently hardcoded.
    rationale: >
      The governance registry contains the datasets that control capabilities,
      decisions, document types, body profiles, graph node types, and predicates.
      Its schema must be designed deliberately instead of copying hidden
      validator assumptions into a schema file.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0023-001"
        statement: "REQ-0021 requires explicit governed registry schemas and motivated controlled datasets."

      - id: "PRE-REQ-0023-002"
        statement: "The governance registry exists and is already consumed by deterministic validators."

    main_flow:
      - id: "FLOW-REQ-0023-001"
        step: 1
        actor: "Maintainer"
        action: "Inventories the top-level sections and nested fields of governance.registry.yml."
        expected_result: "The future schema scope is explicit."

      - id: "FLOW-REQ-0023-002"
        step: 2
        actor: "Maintainer"
        action: "Classifies each field as structural, free text, controlled value, governed ID, ID reference, or semantic validation rule."
        expected_result: "The project can decide what belongs in JSON Schema and what remains in semantic validation."

      - id: "FLOW-REQ-0023-003"
        step: 3
        actor: "Maintainer"
        action: "Maps controlled fields to authoritative datasets or identifies missing datasets that must be introduced."
        expected_result: "Controlled values are explicit and motivated before becoming binding."

      - id: "FLOW-REQ-0023-004"
        step: 4
        actor: "Maintainer"
        action: "Inventories current hardcoded validator rules related to governance registry shape and semantics."
        expected_result: "Validator assumptions are visible before schema migration."

    alternative_flows:
      - id: "ALT-REQ-0023-001"
        title: "Field cannot be classified yet"
        trigger: "A governance registry field has unclear ownership between schema, dataset, and semantic validator."
        steps:
          - id: "FLOW-REQ-0023-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Records the uncertainty as an open design decision in the analysis document."
            expected_result: "Unclear fields are not silently encoded into the schema."

    postconditions:
      - id: "POST-REQ-0023-001"
        statement: "The governance registry schema design has a field-level analysis artifact."

      - id: "POST-REQ-0023-002"
        statement: "The project has an explicit list of controlled datasets to add or enrich for the governance registry."

    acceptance_criteria:
      - id: "AC-REQ-0023-001"
        statement: "The analysis document lists governance.registry.yml top-level sections and nested field classifications."

      - id: "AC-REQ-0023-002"
        statement: "The analysis document identifies controlled values and their authoritative datasets or missing dataset decisions."

      - id: "AC-REQ-0023-003"
        statement: "The analysis document separates future JSON Schema responsibility from semantic validator responsibility."

      - id: "AC-REQ-0023-004"
        statement: "The analysis document inventories current hardcoded validator rules relevant to the governance registry."

      - id: "AC-REQ-0023-005"
        statement: "docs:check validates the new analysis document through the structure and Markdown format guards."

    verification:
      method: "analysis"
      required_evidence:
        - "document"
        - "yaml"
        - "command"
        - "tool-output"

  - id: "REQ-0024"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Governance registry explicit schema contract"
    statement: >
      The project shall provide a canonical machine-readable JSON Schema that
      defines the structural shape of docs/reference/project-model/governance.registry.yml
      and records the boundary between schema validation, controlled datasets,
      and semantic cross-file validation.
    rationale: >
      M000.022A classified governance registry fields and hardcoded validator
      assumptions. The next governed step is to capture the registry shape in an
      explicit schema artifact before validators progressively move from
      hardcoded shape checks to schema-driven validation.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "data"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0024-001"
        statement: "REQ-0021 requires explicit governed registry schemas."

      - id: "PRE-REQ-0024-002"
        statement: "REQ-0023 provides the governance registry field classification and schema boundary analysis."

    main_flow:
      - id: "FLOW-REQ-0024-001"
        step: 1
        actor: "Maintainer"
        action: "Creates the canonical JSON Schema file for governance.registry.yml."
        expected_result: "The governance registry has an explicit machine-readable schema baseline."

      - id: "FLOW-REQ-0024-002"
        step: 2
        actor: "Maintainer"
        action: "Encodes structural fields, required sections, basic type constraints, ID patterns, and schema-local controlled values."
        expected_result: "The schema captures the registry shape without replacing semantic cross-file validation."

      - id: "FLOW-REQ-0024-003"
        step: 3
