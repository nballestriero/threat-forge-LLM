schema_version: '1.0'
change_control:
  decided_by:
  - requirements-governance:DEC-0028
  satisfies:
  - requirements-governance:REQ-0037
  rationale: This requirements part is loaded through the governed requirements index as part of the complete modular project-model layout.
schema_control:
  schema: docs/reference/project-model/schemas/requirements-part.schema.json
  rationale: The requirements part declares the canonical schema that validates modular requirements part shape through check-docs-format.mjs.
part:
  area_id: graph-traceability
  title: Graph Traceability requirements part
  status: draft
  description: Extracted requirements owned by the graph-traceability project-model area.
requirements:
- id: REQ-0002
  macro_requirement_id: MR-0001
  title: Canonical SPO relationships
  statement: 'Governed relationships shall be represented as Subject-Predicate-Object triples.

    '
  rationale: 'SPO triples make relationships deterministic, validateable, and suitable for future graph import.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: functional
  preconditions:
  - id: PRE-REQ-0002-001
    statement: The project has governed entities that require traceability.
  main_flow:
  - id: FLOW-REQ-0002-001
    step: 1
    actor: Maintainer
    action: Adds governed relationships to the graph matrix as SPO triples.
    expected_result: Each governed relationship has a subject, predicate, and object.
  - id: FLOW-REQ-0002-002
    step: 2
    actor: Future validator
    action: Checks the predicate against the governance registry.
    expected_result: Only registered predicates are accepted.
  alternative_flows:
  - id: ALT-REQ-0002-001
    title: Grouped relationship field is present
    trigger: A human-friendly grouped relationship field is introduced.
    steps:
    - id: FLOW-REQ-0002-ALT-001
      step: 1
      actor: Future validator
      action: Checks that the grouped field is derived from or equivalent to SPO triples.
      expected_result: The grouped field does not contradict the graph matrix.
  postconditions:
  - id: POST-REQ-0002-001
    statement: The graph matrix remains the canonical source of governed relationships.
  acceptance_criteria:
  - id: AC-REQ-0002-001
    statement: Each governed relationship in graph.matrix.yml uses subject, predicate, and object.
  - id: AC-REQ-0002-002
    statement: Each predicate used by graph.matrix.yml is registered in governance.registry.yml.
  verification:
    method: inspection
    required_evidence:
    - yaml
    - registry-entry
- id: REQ-0022
  macro_requirement_id: MR-0001
  title: Governed baseline artifact bidirectional traceability
  statement: 'The project shall require governed baseline artifacts to declare internal change-control markers that identify the governing requirement and decision, and the project graph shall contain matching relationships for those artifacts. Deterministic validation shall reject baseline artifacts whose file-local markers and graph relationships do not agree.

    '
  rationale: 'Registry, graph, schema, and contract files define the governance system itself. If they can be added or modified without internal traceability, the graph may look complete while the artifact body remains ungoverned, or the artifact may claim a requirement that the graph does not confirm.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: functional
  preconditions:
  - id: PRE-REQ-0022-001
    statement: The project model registry, requirements registry, and graph matrix exist as governed baseline artifacts.
  - id: PRE-REQ-0022-002
    statement: The project model validator already validates graph relationships and source-file traceability.
  main_flow:
  - id: FLOW-REQ-0022-001
    step: 1
    actor: Maintainer
    action: Adds file-local change_control metadata to governed baseline artifacts.
    expected_result: Each baseline artifact identifies the decision and requirement governing its baseline role.
  - id: FLOW-REQ-0022-002
    step: 2
    actor: Maintainer
    action: Adds matching graph.matrix.yml triples from the governing requirement to each baseline artifact.
    expected_result: The project graph confirms the artifact-local traceability claim.
  - id: FLOW-REQ-0022-003
    step: 3
    actor: Project model validator
    action: Checks marker-to-graph and graph-to-marker consistency for governed baseline artifacts.
    expected_result: A baseline artifact without bidirectional traceability is rejected.
  alternative_flows:
  - id: ALT-REQ-0022-001
    title: Missing baseline marker
    trigger: A governed baseline artifact has no change_control metadata.
    steps:
    - id: FLOW-REQ-0022-ALT-001
      step: 1
      actor: Project model validator
      action: Reports the missing file-local marker.
      expected_result: The project model check fails before the artifact can be accepted.
  - id: ALT-REQ-0022-002
    title: Graph mismatch
    trigger: A baseline artifact marker names a requirement or decision that is not confirmed by graph.matrix.yml.
    steps:
    - id: FLOW-REQ-0022-ALT-002
      step: 1
      actor: Project model validator
      action: Reports the mismatched marker and graph relationship.
      expected_result: The drift between artifact metadata and graph traceability is visible and blocking.
  postconditions:
  - id: POST-REQ-0022-001
    statement: Project-model baseline artifacts have bidirectional marker and graph traceability.
  acceptance_criteria:
  - id: AC-REQ-0022-001
    statement: governance.registry.yml, requirements.registry.yml, and graph.matrix.yml declare change_control.decided_by and change_control.satisfies markers.
  - id: AC-REQ-0022-002
    statement: graph.matrix.yml contains matching SPECIFIED_BY relationships for each baseline artifact marker.
  - id: AC-REQ-0022-003
    statement: The project model validator rejects a governed baseline artifact with missing or mismatched change_control metadata.
  - id: AC-REQ-0022-004
    statement: A controlled negative fixture proves that baseline artifact marker removal is rejected.
  verification:
    method: test
    required_evidence:
    - yaml
    - registry-entry
    - command
    - tool-output
- id: REQ-0038
  macro_requirement_id: MR-0001
  title: Graph index and part schema contracts
  statement: 'The project shall define the future graph index and graph part schema contract before splitting the monolithic graph matrix into area-owned graph part files.

    '
  rationale: 'Graph modularization changes traceability ownership, node and triple loading boundaries, cross-area relationship ownership, predicate compatibility checks, entity resolution, command validation, schema application checks, and source traceability checks. Defining the contract first prevents an ad hoc graph split that loses deterministic semantic validation or duplicates schema validation logic.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: functional
  preconditions:
  - id: PRE-REQ-0038-001
    statement: REQ-0034 defines the overall project model modularization model.
  - id: PRE-REQ-0038-002
    statement: REQ-0036 enforces project_model_areas before modular graph parts rely broadly on area_id values.
  - id: PRE-REQ-0038-003
    statement: REQ-0037 defines the requirements index and part contract so graph references can stay aligned with future modular requirement identities.
  main_flow:
  - id: FLOW-REQ-0038-001
    step: 1
    actor: Project model maintainer
    action: Defines graph.matrix.yml as the future graph index entrypoint.
    expected_result: The central graph matrix file remains the canonical graph loading boundary.
  - id: FLOW-REQ-0038-002
    step: 2
    actor: Project model maintainer
    action: Defines area-owned graph part files under docs/reference/project-model/graph.
    expected_result: Future graph nodes and triples can be split by registered project_model_areas values.
  - id: FLOW-REQ-0038-003
    step: 3
    actor: Project model maintainer
    action: Defines cross-area graph relationship ownership.
    expected_result: Future triples connecting different areas have one deterministic ownership boundary instead of being duplicated in endpoint areas.
  - id: FLOW-REQ-0038-004
    step: 4
    actor: Project model maintainer
    action: Defines the validation responsibility split for future graph index and part schemas.
    expected_result: Schema validation remains in check-docs-format.mjs and semantic graph aggregation remains in check-project-model.mjs.
  alternative_flows:
  - id: ALT-REQ-0038-001
    title: Cross-area relationship is needed
    trigger: A future graph triple connects subject and object records owned by different project-model areas.
    steps:
    - id: FLOW-REQ-0038-ALT-001
      step: 1
      actor: Project model validator
      action: Requires the triple to be owned by the dedicated cross-area graph part or by an explicitly governed future exception.
      expected_result: Cross-area graph relationships remain explicit, deterministic, and non-duplicated.
  postconditions:
  - id: POST-REQ-0038-001
    statement: docs/reference/project-model/schema-design/graph-index-and-part-schema-contract.md defines the future graph index and part contract.
  - id: POST-REQ-0038-002
    statement: No existing graph nodes or triples are migrated before the decisions contract and modular loader design are also defined.
  acceptance_criteria:
  - id: AC-REQ-0038-001
    statement: The contract document defines the future graph index path and graph part path pattern.
  - id: AC-REQ-0038-002
    statement: The contract document states that canonical modular graph references use <area_id>:<local_id> for modular records.
  - id: AC-REQ-0038-003
    statement: The contract document defines a cross-area graph ownership policy.
  - id: AC-REQ-0038-004
    statement: The contract document preserves check-docs-format.mjs as the schema validation entrypoint.
  - id: AC-REQ-0038-005
    statement: The contract document preserves check-project-model.mjs as the semantic graph aggregation and cross-file validation tool.
  - id: AC-REQ-0038-006
    statement: The workplan keeps decisions contract and modular loader design before graph extraction.
  verification:
    method: inspection
    required_evidence:
    - document
    - yaml
    - command
    - tool-output
