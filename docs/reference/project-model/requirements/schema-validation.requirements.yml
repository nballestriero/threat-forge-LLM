schema_version: '1.0'
change_control:
  decided_by:
    - DEC-0032
  satisfies:
    - REQ-0041
  rationale: This first extracted requirements part proves that requirements can be loaded from 
    an area-owned file while the project model still validates as one logical model.
schema_control:
  schema: docs/reference/project-model/schemas/requirements-part.schema.json
  rationale: The requirements part declares the canonical schema that validates modular 
    requirements part shape through check-docs-format.mjs.
part:
  area_id: schema-validation
  title: Schema validation requirements part
  status: draft
  description: Extracted requirements owned by the schema-validation project-model area.
requirements:
  - id: "REQ-0023"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Governance registry schema field classification"
    statement: >
      Before creating the explicit governance registry schema, the project shall
      document the current governance registry field model, classify fields as
      structural, free text, controlled values, governed IDs, ID references, or
      semantic validation rules, and inventory the validator rules that are
      currently hardcoded.
    rationale: >
      The governance registry contains the datasets that control capabilities,
      decisions, document types, body profiles, graph node types, and predicates.
      Its schema must be designed deliberately instead of copying hidden
      validator assumptions into a schema file.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0023-001"
        statement: "REQ-0021 requires explicit governed registry schemas and motivated controlled
          datasets."

      - id: "PRE-REQ-0023-002"
        statement: "The governance registry exists and is already consumed by deterministic validators."

    main_flow:
      - id: "FLOW-REQ-0023-001"
        step: 1
        actor: "Maintainer"
        action: "Inventories the top-level sections and nested fields of governance.registry.yml."
        expected_result: "The future schema scope is explicit."

      - id: "FLOW-REQ-0023-002"
        step: 2
        actor: "Maintainer"
        action: "Classifies each field as structural, free text, controlled value, governed ID, ID
          reference, or semantic validation rule."
        expected_result: "The project can decide what belongs in JSON Schema and what remains in semantic
          validation."

      - id: "FLOW-REQ-0023-003"
        step: 3
        actor: "Maintainer"
        action: "Maps controlled fields to authoritative datasets or identifies missing datasets that
          must be introduced."
        expected_result: "Controlled values are explicit and motivated before becoming binding."

      - id: "FLOW-REQ-0023-004"
        step: 4
        actor: "Maintainer"
        action: "Inventories current hardcoded validator rules related to governance registry shape
          and semantics."
        expected_result: "Validator assumptions are visible before schema migration."

    alternative_flows:
      - id: "ALT-REQ-0023-001"
        title: "Field cannot be classified yet"
        trigger: "A governance registry field has unclear ownership between schema, dataset, and semantic
          validator."
        steps:
          - id: "FLOW-REQ-0023-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Records the uncertainty as an open design decision in the analysis document."
            expected_result: "Unclear fields are not silently encoded into the schema."

    postconditions:
      - id: "POST-REQ-0023-001"
        statement: "The governance registry schema design has a field-level analysis artifact."

      - id: "POST-REQ-0023-002"
        statement: "The project has an explicit list of controlled datasets to add or enrich for the
          governance registry."

    acceptance_criteria:
      - id: "AC-REQ-0023-001"
        statement: "The analysis document lists governance.registry.yml top-level sections and nested
          field classifications."

      - id: "AC-REQ-0023-002"
        statement: "The analysis document identifies controlled values and their authoritative datasets
          or missing dataset decisions."

      - id: "AC-REQ-0023-003"
        statement: "The analysis document separates future JSON Schema responsibility from semantic
          validator responsibility."

      - id: "AC-REQ-0023-004"
        statement: "The analysis document inventories current hardcoded validator rules relevant to
          the governance registry."

      - id: "AC-REQ-0023-005"
        statement: "docs:check validates the new analysis document through the structure and Markdown
          format guards."

    verification:
      method: "analysis"
      required_evidence:
        - "document"
        - "yaml"
        - "command"
        - "tool-output"

  - id: "REQ-0024"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Governance registry explicit schema contract"
    statement: >
      The project shall provide a canonical machine-readable JSON Schema that
      defines the structural shape of docs/reference/project-model/governance.registry.yml
      and records the boundary between schema validation, controlled datasets,
      and semantic cross-file validation.
    rationale: >
      M000.022A classified governance registry fields and hardcoded validator
      assumptions. The next governed step is to capture the registry shape in an
      explicit schema artifact before validators progressively move from
      hardcoded shape checks to schema-driven validation.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "data"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0024-001"
        statement: "REQ-0021 requires explicit governed registry schemas."

      - id: "PRE-REQ-0024-002"
        statement: "REQ-0023 provides the governance registry field classification and schema boundary
          analysis."

    main_flow:
      - id: "FLOW-REQ-0024-001"
        step: 1
        actor: "Maintainer"
        action: "Creates the canonical JSON Schema file for governance.registry.yml."
        expected_result: "The governance registry has an explicit machine-readable schema baseline."

      - id: "FLOW-REQ-0024-002"
        step: 2
        actor: "Maintainer"
        action: "Encodes structural fields, required sections, basic type constraints, ID patterns,
          and schema-local controlled values."
        expected_result: "The schema captures the registry shape without replacing semantic cross-file
          validation."

      - id: "FLOW-REQ-0024-003"
        step: 3
        actor: "Format validator"
        action: "Checks the schema artifact baseline before future validators consume it as canonical
          input."
        expected_result: "Invalid schema artifacts are rejected before use."

    alternative_flows:
      - id: "ALT-REQ-0024-001"
        title: "Semantic rule cannot be represented in JSON Schema"
        trigger: "A governance rule depends on other registries, graph triples, package scripts, or
          repository files."
        steps:
          - id: "FLOW-REQ-0024-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Leaves the rule in the semantic validator and documents the boundary in the schema
              analysis."
            expected_result: "The schema remains a shape contract and does not pretend to validate
              cross-file semantics."

    postconditions:
      - id: "POST-REQ-0024-001"
        statement: "The governance registry has a canonical JSON Schema artifact."

      - id: "POST-REQ-0024-002"
        statement: "The schema artifact is registered and traceable as a governed baseline artifact."

    acceptance_criteria:
      - id: "AC-REQ-0024-001"
        statement: "docs/reference/project-model/schemas/governance-registry.schema.json exists and
          is valid JSON."

      - id: "AC-REQ-0024-002"
        statement: "The schema declares required governance registry top-level sections."

      - id: "AC-REQ-0024-003"
        statement: "The schema declares field shapes for registry metadata, taxonomies, capabilities,
          decisions, document types, body profiles, node types, and predicates."

      - id: "AC-REQ-0024-004"
        statement: "The schema artifact has file-local change-control metadata matching graph.matrix.yml
          relationships."

      - id: "AC-REQ-0024-005"
        statement: "docs:check validates the schema artifact baseline."

    verification:
      method: "test"
      required_evidence:
        - "json-schema"
        - "yaml"
        - "command"
        - "tool-output"

  - id: "REQ-0025"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Governance registry schema-driven validation"
    statement: >
      The documentation format validator shall load the canonical Governance
      Registry JSON Schema and apply it to docs/reference/project-model/governance.registry.yml
      so structural registry drift is rejected by schema-driven validation rather
      than only by hardcoded shape checks.
    rationale: >
      REQ-0024 introduced the schema artifact. The next safety step is proving
      that deterministic tooling consumes the schema as an executable contract,
      including rejection of fields that the previous hardcoded top-level checks
      would not catch.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "operational"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0025-001"
        statement: "The Governance Registry JSON Schema artifact exists."

      - id: "PRE-REQ-0025-002"
        statement: "The documentation format validator parses governed YAML and JSON files."

    main_flow:
      - id: "FLOW-REQ-0025-001"
        step: 1
        actor: "Documentation format validator"
        action: "Loads docs/reference/project-model/schemas/governance-registry.schema.json."
        expected_result: "The canonical schema artifact is available as validator input."

      - id: "FLOW-REQ-0025-002"
        step: 2
        actor: "Documentation format validator"
        action: "Applies the supported JSON Schema subset to the parsed governance registry YAML document."
        expected_result: "The governance registry is checked against the explicit schema contract."

      - id: "FLOW-REQ-0025-003"
        step: 3
        actor: "Negative fixture runner"
        action: "Mutates the governance registry with a schema-invalid field."
        expected_result: "The format validator rejects the invalid registry through schema-driven
          validation."

    alternative_flows:
      - id: "ALT-REQ-0025-001"
        title: "Schema contains unsupported feature"
        trigger: "The canonical schema uses a keyword outside the local supported subset."
        steps:
          - id: "FLOW-REQ-0025-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Either extends the deterministic validator or defers that schema keyword until
              runtime JSON Schema validation tooling is introduced."
            expected_result: "The validator remains deterministic and honest about its supported schema
              subset."

    postconditions:
      - id: "POST-REQ-0025-001"
        statement: "The governance registry is validated against its canonical schema by docs:check:format."

      - id: "POST-REQ-0025-002"
        statement: "Schema-invalid governance registry fields are rejected by a controlled negative
          fixture."

    acceptance_criteria:
      - id: "AC-REQ-0025-001"
        statement: "tools/docs/check-docs-format.mjs reads docs/reference/project-model/schemas/governance-registry.schema.json."

      - id: "AC-REQ-0025-002"
        statement: "docs:check:format validates docs/reference/project-model/governance.registry.yml
          against the Governance Registry schema."

      - id: "AC-REQ-0025-003"
        statement: "A negative fixture proves that an additional property rejected by the schema fails
          validation."

      - id: "AC-REQ-0025-004"
        statement: "docs:check runs the schema-driven governance registry validation through the canonical
          docs:check:format / tools/docs/check-docs-format.mjs schema validation entrypoint."

    verification:
      method: "test"
      required_evidence:
        - "json-schema"
        - "yaml"
        - "command"
        - "tool-output"

  - id: "REQ-0026"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Bidirectional schema application traceability"
    statement: >
      Canonical schema artifacts shall declare the governed artifact paths they
      apply to, governed artifacts shall declare their canonical schema, and the
      graph matrix shall contain matching schema-to-artifact relationships that
      deterministic validation checks bidirectionally.
    rationale: >
      Schema-driven validation is not fully governed if a schema can exist
      without being applied, or if a validator can apply a schema through
      hardcoded paths without the graph recording that contract. Bidirectional
      schema application traceability makes schema coverage explicit and
      auditable.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "data"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0026-001"
        statement: "The governance registry schema artifact exists."

      - id: "PRE-REQ-0026-002"
        statement: "The governance registry is validated against the schema by docs:check:format."

    main_flow:
      - id: "FLOW-REQ-0026-001"
        step: 1
        actor: "Schema artifact"
        action: "Declares the governed target artifact paths it applies to."
        expected_result: "Schema coverage is explicit inside the schema artifact."

      - id: "FLOW-REQ-0026-002"
        step: 2
        actor: "Governed target artifact"
        action: "Declares its canonical schema through schema_control metadata."
        expected_result: "The target artifact exposes artifact-to-schema traceability."

      - id: "FLOW-REQ-0026-003"
        step: 3
        actor: "Project model validator"
        action: "Compares schema-local x-applies_to metadata, artifact schema_control metadata, and
          graph.matrix.yml APPLIES_TO triples."
        expected_result: "Schema application traceability is consistent in both directions."

    alternative_flows:
      - id: "ALT-REQ-0026-001"
        title: "Schema application is missing from one side"
        trigger: "A schema, target artifact, or graph relationship omits the schema application relationship."
        steps:
          - id: "FLOW-REQ-0026-ALT-001"
            step: 1
            actor: "Project model validator"
            action: "Reports the missing schema application traceability side."
            expected_result: "The change is rejected until schema, artifact, and graph agree."

    postconditions:
      - id: "POST-REQ-0026-001"
        statement: "The governance registry schema application relationship is explicit in the schema,
          target artifact, and graph matrix."

    acceptance_criteria:
      - id: "AC-REQ-0026-001"
        statement: "docs/reference/project-model/schemas/governance-registry.schema.json declares
          x-applies_to for docs/reference/project-model/governance.registry.yml."

      - id: "AC-REQ-0026-002"
        statement: "docs/reference/project-model/governance.registry.yml declares schema_control.schema
          for the governance registry schema."

      - id: "AC-REQ-0026-003"
        statement: "graph.matrix.yml contains a schema APPLIES_TO governance registry triple."

      - id: "AC-REQ-0026-004"
        statement: "A negative fixture proves that missing schema application traceability fails validation."

    verification:
      method: "test"
      required_evidence:
        - "json-schema"
        - "yaml"
        - "command"
        - "tool-output"

  - id: "REQ-0027"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Requirements registry schema field classification"
    statement: >
      The project shall document a field-level schema analysis for the
      requirements registry before creating the explicit machine-readable
      requirements registry schema.
    rationale: >
      Requirements drive implementation, verification, and traceability. The
      project must separate schema-enforced shape, controlled lifecycle values,
      governed nested IDs, and semantic graph validation before turning current
      hardcoded validator assumptions into a canonical schema contract.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0027-001"
        statement: "REQ-0021 requires explicit governed registry schemas."

      - id: "PRE-REQ-0027-002"
        statement: "The governance registry schema analysis exists as the first schema-design precedent."

    main_flow:
      - id: "FLOW-REQ-0027-001"
        step: 1
        actor: "Maintainer"
        action: "Inventories requirements registry top-level fields, macro requirement fields, atomic
          requirement fields, nested requirement entities, and verification fields."
        expected_result: "The registry shape is visible before schema creation."

      - id: "FLOW-REQ-0027-002"
        step: 2
        actor: "Maintainer"
        action: "Classifies fields as structural, free text, controlled value, governed ID, ID reference,
          or semantic validator responsibility."
        expected_result: "The schema boundary and semantic validation boundary are explicit."

      - id: "FLOW-REQ-0027-003"
        step: 3
        actor: "Maintainer"
        action: "Maps lifecycle, type, scope, verification method, and evidence fields to authoritative
          controlled datasets."
        expected_result: "Controlled values are not hidden inside validator code."

    alternative_flows:
      - id: "ALT-REQ-0027-001"
        title: "Constraint depends on parent requirement ID"
        trigger: "A nested requirement entity ID pattern cannot be cleanly expressed by the initial
          JSON Schema subset."
        steps:
          - id: "FLOW-REQ-0027-ALT-001"
            step: 1
            actor: "Maintainer"
            action: "Leaves the parent-dependent rule in the semantic validator and documents the
              boundary."
            expected_result: "The schema stays accurate and does not pretend to enforce unsupported
              cross-field logic."

    postconditions:
      - id: "POST-REQ-0027-001"
        statement: "The requirements registry has a governed schema analysis document."

      - id: "POST-REQ-0027-002"
        statement: "The next requirements registry schema contract can be derived from documented
          field decisions."

    acceptance_criteria:
      - id: "AC-REQ-0027-001"
        statement: "docs/reference/project-model/schema-design/requirements-registry-schema-analysis.md
          exists."

      - id: "AC-REQ-0027-002"
        statement: "The analysis classifies top-level, macro requirement, atomic requirement, nested
          entity, and verification fields."

      - id: "AC-REQ-0027-003"
        statement: "The analysis maps controlled fields to authoritative taxonomy datasets."

      - id: "AC-REQ-0027-004"
        statement: "The analysis documents which current hardcoded validator rules belong in schema
          and which remain semantic validation."

      - id: "AC-REQ-0027-005"
        statement: "The analysis records the decided policies for manual macro requirement implementation
          status, mandatory macro ownership for atomic requirements, high-governance scope values,
          accepted requirement verification, implemented requirement evidence, and not_applicable
          rationale."

    verification:
      method: "inspection"
      required_evidence:
        - "document"
        - "yaml"
        - "command"
        - "tool-output"
  - id: "REQ-0028"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Requirements registry explicit schema contract"
    statement: >
      The project shall provide a canonical machine-readable JSON Schema that
