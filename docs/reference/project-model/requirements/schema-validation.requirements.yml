  - id: "REQ-0030"
    macro_requirement_id: "MR-0001"
    capability_id: "CAP-DOCUMENTATION-GOVERNANCE"

    title: "Graph matrix schema analysis"
    statement: >
      The project shall analyze docs/reference/project-model/graph.matrix.yml
      field by field before creating its explicit JSON Schema contract, including
      the top-level matrix shape, node records, SPO triples, controlled graph
      vocabulary, repository path checks, command checks, and schema-versus-semantic
      validation boundary.
    rationale: >
      The graph matrix connects the rest of the governed project model. Its
      schema must therefore be designed deliberately instead of copied from
      current hardcoded validator assumptions. The analysis must make visible
      which checks belong in JSON Schema and which checks require semantic
      validation across registries, package scripts, files, and traceability
      metadata.
    status: "accepted"
    implementation_status: "implemented"
    priority: "must"
    type: "documentation"
    scope: "project-model"

    preconditions:
      - id: "PRE-REQ-0030-001"
        statement: "The graph matrix exists as a governed project-model artifact."

      - id: "PRE-REQ-0030-002"
