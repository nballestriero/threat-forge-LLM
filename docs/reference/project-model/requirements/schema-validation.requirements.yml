          for the requirements registry schema."

      - id: "AC-REQ-0028-004"
        statement: "graph.matrix.yml contains a SchemaFile APPLIES_TO requirements registry triple."

      - id: "AC-REQ-0028-005"
        statement: "The structure, format, and project model validators recognize the requirements
          registry schema artifact as governed."

    verification:
      method: "inspection"
      required_evidence:
        - "json-schema"
        - "yaml"
        - "command"
        - "tool-output"

