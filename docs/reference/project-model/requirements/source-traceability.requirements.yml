schema_version: '1.0'
change_control:
  decided_by:
  - requirements-governance:DEC-0028
  satisfies:
  - requirements-governance:REQ-0037
  rationale: This requirements part is loaded through the governed requirements index as part of the
    complete modular project-model layout.
schema_control:
  schema: docs/reference/project-model/schemas/requirements-part.schema.json
  rationale: The requirements part declares the canonical schema that validates modular requirements
    part shape through check-docs-format.mjs.
part:
  area_id: source-traceability
  title: Source Traceability requirements part
  status: draft
  description: Extracted requirements owned by the source-traceability project-model area.
requirements:
- id: REQ-0005
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Bidirectional implementation traceability
  statement: 'The project shall verify that governed source files are registered in graph.matrix.yml,
    that implementation relationships declared in graph.matrix.yml are mirrored by traceability references
    in source-file comments, and that source-file traceability claims are mirrored by graph matrix
    triples.

    '
  rationale: 'Bidirectional checks prevent unregistered source files from entering the repository,
    prevent the matrix from claiming implementation that code does not acknowledge, and prevent code
    comments from claiming governed implementation that the graph matrix does not record.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0005-001
    statement: The graph matrix contains IMPLEMENTED_BY relationships involving source files.
  - id: PRE-REQ-0005-002
    statement: Source files can contain parseable file-level JSDoc traceability comments.
  main_flow:
  - id: FLOW-REQ-0005-001
    step: 1
    actor: Validation tool
    action: Discovers governed source files under controlled source roots.
    expected_result: Source files that require graph traceability are known even before graph.matrix.yml
      references them.
  - id: FLOW-REQ-0005-002
    step: 2
    actor: Validation tool
    action: Reads IMPLEMENTED_BY triples from graph.matrix.yml.
    expected_result: The expected requirement-to-source-file relationships are known.
  - id: FLOW-REQ-0005-003
    step: 3
    actor: Validation tool
    action: Reads file-level traceability comments from referenced and discovered source files.
    expected_result: The source-file implementation claims are known.
  - id: FLOW-REQ-0005-004
    step: 4
    actor: Validation tool
    action: Compares discovered files, matrix-to-code traceability, and code-to-matrix traceability.
    expected_result: Unregistered source files and bidirectional traceability mismatches are rejected.
  alternative_flows:
  - id: ALT-REQ-0005-001
    title: Governed source file is not registered
    trigger: A source file exists under a governed source root but has no IMPLEMENTED_BY relationship
      in graph.matrix.yml.
    steps:
    - id: FLOW-REQ-0005-ALT-001
      step: 1
      actor: Validation tool
      action: Reports the unregistered governed source file.
      expected_result: The check fails before an untraceable source file can be committed.
  - id: ALT-REQ-0005-002
    title: Matrix references source file without source comment
    trigger: graph.matrix.yml contains an IMPLEMENTED_BY SourceFile triple but the source file does
      not cite the requirement.
    steps:
    - id: FLOW-REQ-0005-ALT-002
      step: 1
      actor: Validation tool
      action: Reports the missing source-file traceability comment.
      expected_result: The check fails with a traceability error.
  - id: ALT-REQ-0005-003
    title: Source comment references requirement without matrix triple
    trigger: A source file claims it implements a requirement but graph.matrix.yml has no matching
      IMPLEMENTED_BY triple.
    steps:
    - id: FLOW-REQ-0005-ALT-003
      step: 1
      actor: Validation tool
      action: Reports the missing graph matrix relationship.
      expected_result: The check fails with a traceability error.
  postconditions:
  - id: POST-REQ-0005-001
    statement: Every governed source file is represented by IMPLEMENTED_BY traceability in graph.matrix.yml.
  - id: POST-REQ-0005-002
    statement: Implementation traceability is consistent between graph.matrix.yml and source-file
      comments.
  - id: POST-REQ-0005-003
    statement: Traceability is enforced at file level before future code-symbol-level traceability
      is introduced.
  acceptance_criteria:
  - id: AC-REQ-0005-001
    statement: Each governed source file under controlled source roots has at least one matching IMPLEMENTED_BY
      SourceFile triple.
  - id: AC-REQ-0005-002
    statement: Each IMPLEMENTED_BY SourceFile triple points to an existing source file.
  - id: AC-REQ-0005-003
    statement: Each SourceFile referenced by an IMPLEMENTED_BY requirement triple declares the related
      requirement in file-level JSDoc.
  - id: AC-REQ-0005-004
    statement: Each file-level JSDoc requirement claim has a matching IMPLEMENTED_BY triple in graph.matrix.yml.
  - id: AC-REQ-0005-005
    statement: Each validation tool node declared by a source file exists in graph.matrix.yml.
  - id: AC-REQ-0005-006
    statement: Each validation tool implemented by a source file has a matching IMPLEMENTED_BY triple.
  verification:
    method: test
    required_evidence:
    - source-comment
    - yaml
    - tool-output
- id: REQ-0006
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Validation command consistency
  statement: 'The project shall verify that governed validation Command nodes in graph.matrix.yml
    are consistent with executable scripts declared in package.json.

    '
  rationale: 'Validation command traceability is only useful if the graph matrix and package manifest
    agree on the commands that can actually be run.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: tooling
  preconditions:
  - id: PRE-REQ-0006-001
    statement: The repository declares validation commands as Command nodes in graph.matrix.yml.
  - id: PRE-REQ-0006-002
    statement: The repository declares executable npm scripts in package.json.
  main_flow:
  - id: FLOW-REQ-0006-001
    step: 1
    actor: Validation tool
    action: Reads Command nodes from graph.matrix.yml.
    expected_result: The governed command set is known.
  - id: FLOW-REQ-0006-002
    step: 2
    actor: Validation tool
    action: Reads scripts from package.json.
    expected_result: The executable npm script set is known.
  - id: FLOW-REQ-0006-003
    step: 3
    actor: Validation tool
    action: Compares npm run Command nodes with package.json scripts.
    expected_result: Each governed npm validation command points to an existing script.
  alternative_flows:
  - id: ALT-REQ-0006-001
    title: Command node references missing script
    trigger: A Command node declares an npm run command whose script does not exist in package.json.
    steps:
    - id: FLOW-REQ-0006-ALT-001
      step: 1
      actor: Validation tool
      action: Reports the missing package.json script.
      expected_result: The check fails with a command consistency error.
  - id: ALT-REQ-0006-002
    title: Governed validation script lacks Command node
    trigger: A validation script in package.json has no matching Command node.
    steps:
    - id: FLOW-REQ-0006-ALT-002
      step: 1
      actor: Validation tool
      action: Reports the missing graph matrix Command node.
      expected_result: The check fails with a command consistency error.
  postconditions:
  - id: POST-REQ-0006-001
    statement: Governed validation commands are consistent between graph.matrix.yml and package.json.
  acceptance_criteria:
  - id: AC-REQ-0006-001
    statement: Each npm run Command node references an existing package.json script.
  - id: AC-REQ-0006-002
    statement: Each governed validation script in package.json has a matching Command node.
  - id: AC-REQ-0006-003
    statement: Command nodes are still linked through SPO triples.
  verification:
    method: test
    required_evidence:
    - command
    - yaml
    - tool-output
- id: REQ-0007
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Decision-backed source traceability
  statement: 'The project shall reject governed source files whose file-level traceability is not backed by at least one accepted project decision connected through the graph to a requirement or validation tool implemented by that source file.

    '
  rationale: 'Requirement-to-source traceability proves what a file implements, but it does not by itself explain why the file or control is allowed to exist. Decision-backed source traceability ensures that governed code is introduced only through explicit governance decisions and that source-file comments cannot cite arbitrary or unrelated decisions.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0007-001
    statement: Governed source files declare file-level JSDoc traceability comments.
  - id: PRE-REQ-0007-002
    statement: The graph matrix contains decision relationships and IMPLEMENTED_BY relationships for requirements and validation tools.
  main_flow:
  - id: FLOW-REQ-0007-001
    step: 1
    actor: Project model validator
    action: Reads decision references declared in each governed source file JSDoc comment.
    expected_result: Source-local decision claims are available for deterministic comparison.
  - id: FLOW-REQ-0007-002
    step: 2
    actor: Project model validator
    action: Derives the decisions that back requirements or validation tools implemented by the same source file.
    expected_result: The graph-backed decision set for the source file is known.
  - id: FLOW-REQ-0007-003
    step: 3
    actor: Project model validator
    action: Compares source-local decision claims with graph-backed decision relationships.
    expected_result: Source files without graph-backed decision traceability, or with unrelated decision claims, are rejected.
  alternative_flows:
  - id: ALT-REQ-0007-001
    title: Source file lacks decision traceability
    trigger: A governed source file has requirement/tool traceability but no graph-backed decision reference in its JSDoc.
    steps:
    - id: FLOW-REQ-0007-ALT-001
      step: 1
      actor: Project model validator
      action: Reports the source file that lacks graph-backed decision traceability.
      expected_result: The repository check fails before ungoverned functionality can be committed.
  - id: ALT-REQ-0007-002
    title: Source file cites unrelated decision
    trigger: A source-file JSDoc comment cites a known decision that does not decide, support, or depend on a requirement or validation tool implemented by that file.
    steps:
    - id: FLOW-REQ-0007-ALT-002
      step: 1
      actor: Project model validator
      action: Reports the unrelated source-file decision claim.
      expected_result: The repository check fails with a decision traceability mismatch.
  postconditions:
  - id: POST-REQ-0007-001
    statement: Every governed source file has at least one graph-backed decision reference.
  - id: POST-REQ-0007-002
    statement: Source-file decision references are rejected when they are unknown or unrelated to that file's implemented requirement/tool relationships.
  acceptance_criteria:
  - id: AC-REQ-0007-001
    statement: Each governed source-file JSDoc block contains a Related decisions section.
  - id: AC-REQ-0007-002
    statement: Each cited decision exists in the aggregated project model.
  - id: AC-REQ-0007-003
    statement: At least one cited decision is connected by the graph to a requirement or validation tool implemented by the same source file.
  - id: AC-REQ-0007-004
    statement: A negative fixture proves that removing decision-backed source traceability is rejected.
  verification:
    method: test
    required_evidence:
    - source-comment
    - yaml
    - command
    - tool-output
- id: REQ-0008
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Implemented requirement evidence closure
  statement: 'The project shall reject accepted requirements marked as implemented unless the graph
    records implementation or specification evidence, verification evidence, and an accepted decision
    relationship for the same requirement.

    '
  rationale: 'Implementation status is a governance claim. The claim is only reliable when the graph
    records what implements or specifies the requirement, how the requirement is verified, and which
    accepted decision backs the requirement. This prevents requirements from being marked implemented
    through prose-only edits or partial registry changes.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: project-model
  preconditions:
  - id: PRE-REQ-0008-001
    statement: Requirements declare status and implementation_status fields in governed part files.
  - id: PRE-REQ-0008-002
    statement: The graph matrix records requirement relationships through SPO triples.
  main_flow:
  - id: FLOW-REQ-0008-001
    step: 1
    actor: Project model validator
    action: Reads every accepted requirement whose implementation_status is implemented.
    expected_result: Implemented requirement claims are known from the aggregated project model.
  - id: FLOW-REQ-0008-002
    step: 2
    actor: Project model validator
    action: Checks that each implemented requirement has implementation or specification evidence in the graph.
    expected_result: The requirement is tied to a governed source, configuration, schema, or document artifact.
  - id: FLOW-REQ-0008-003
    step: 3
    actor: Project model validator
    action: Checks that each implemented requirement has VERIFIED_BY graph evidence.
    expected_result: The requirement is tied to an executable or governed verification boundary.
  - id: FLOW-REQ-0008-004
    step: 4
    actor: Project model validator
    action: Checks that each implemented requirement is backed by an accepted decision relationship.
    expected_result: The implementation claim has an explicit governance reason.
  alternative_flows:
  - id: ALT-REQ-0008-001
    title: Implemented requirement lacks implementation or specification evidence
    trigger: A requirement is accepted and implemented but has no IMPLEMENTED_BY or SPECIFIED_BY graph relationship.
    steps:
    - id: FLOW-REQ-0008-ALT-001
      step: 1
      actor: Project model validator
      action: Reports the requirement missing implementation/specification evidence.
      expected_result: The repository check fails before an unsupported implementation claim can be committed.
  - id: ALT-REQ-0008-002
    title: Implemented requirement lacks verification evidence
    trigger: A requirement is accepted and implemented but has no VERIFIED_BY graph relationship.
    steps:
    - id: FLOW-REQ-0008-ALT-002
      step: 1
      actor: Project model validator
      action: Reports the requirement missing verification evidence.
      expected_result: The repository check fails before an unverified implementation claim can be committed.
  - id: ALT-REQ-0008-003
    title: Implemented requirement lacks accepted decision backing
    trigger: A requirement is accepted and implemented but no accepted decision decides or supports it in the graph.
    steps:
    - id: FLOW-REQ-0008-ALT-003
      step: 1
      actor: Project model validator
      action: Reports the requirement missing accepted decision backing.
      expected_result: The repository check fails before a prose-only implementation claim can be committed.
  postconditions:
  - id: POST-REQ-0008-001
    statement: Every accepted implemented requirement has graph-backed implementation or specification evidence.
  - id: POST-REQ-0008-002
    statement: Every accepted implemented requirement has graph-backed verification evidence.
  - id: POST-REQ-0008-003
    statement: Every accepted implemented requirement has graph-backed decision evidence.
  acceptance_criteria:
  - id: AC-REQ-0008-001
    statement: The validator rejects an accepted implemented requirement with no IMPLEMENTED_BY or SPECIFIED_BY relationship.
  - id: AC-REQ-0008-002
    statement: The validator rejects an accepted implemented requirement with no VERIFIED_BY relationship.
  - id: AC-REQ-0008-003
    statement: The validator rejects an accepted implemented requirement with no accepted Decision relationship.
  - id: AC-REQ-0008-004
    statement: Negative fixtures prove that each missing evidence class is rejected.
  verification:
    method: test
    required_evidence:
    - yaml
    - command
    - tool-output
- id: REQ-0009
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Graph target and command existence closure
  statement: 'The project shall reject graph relationships, graph nodes, and package command declarations
    that reference missing repository-backed source, schema, config, test, validation-tool, or package
    script targets.

    '
  rationale: 'Traceability is unsafe if the graph can point at files or commands that do not exist in
    the checkout. Repository-backed graph targets must be concrete, package scripts must be represented
    by Command nodes, and ValidationTool nodes must be tied to the exact source file that implements
    them.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0009-001
    statement: The graph matrix declares repository-backed nodes and SPO endpoints for source, schema,
      config, test, command, and validation-tool entities.
  - id: PRE-REQ-0009-002
    statement: package.json declares the executable npm scripts for governed validation and support
      commands.
  main_flow:
  - id: FLOW-REQ-0009-001
    step: 1
    actor: Project model validator
    action: Reads graph nodes and graph triple endpoints after modular aggregation.
    expected_result: Every repository-backed graph target is available for path existence validation.
  - id: FLOW-REQ-0009-002
    step: 2
    actor: Project model validator
    action: Verifies that SourceFile, SchemaFile, TestFile, and ConfigFile graph targets resolve to
      files in the checkout.
    expected_result: Stale graph references to missing repository-backed files are rejected.
  - id: FLOW-REQ-0009-003
    step: 3
    actor: Project model validator
    action: Verifies that ValidationTool nodes declare an existing path and that the graph contains a
      matching IMPLEMENTED_BY SourceFile relationship for that path.
    expected_result: Validation tool declarations cannot drift away from their implementing source file.
  - id: FLOW-REQ-0009-004
    step: 4
    actor: Project model validator
    action: Verifies that every package.json script has a Command node and every Command node runs an
      existing package.json script through a ValidationTool relationship.
    expected_result: Package command declarations and graph command nodes remain bidirectionally aligned.
  alternative_flows:
  - id: ALT-REQ-0009-001
    title: Graph endpoint references missing repository file
    trigger: A graph triple endpoint or path-backed graph node names a SourceFile, SchemaFile,
      TestFile, or ConfigFile that does not exist in the checkout.
    steps:
    - id: FLOW-REQ-0009-ALT-001
      step: 1
      actor: Project model validator
      action: Reports the missing path-backed graph target.
      expected_result: The repository check fails before stale graph references can be committed.
  - id: ALT-REQ-0009-002
    title: ValidationTool node drifts away from implementation source
    trigger: A ValidationTool node path is missing or has no matching IMPLEMENTED_BY SourceFile triple.
    steps:
    - id: FLOW-REQ-0009-ALT-002
      step: 1
      actor: Project model validator
      action: Reports the invalid validation-tool path or missing implementation relationship.
      expected_result: The repository check fails before the tool declaration becomes unverifiable.
  - id: ALT-REQ-0009-003
    title: package.json script lacks Command node
    trigger: package.json declares an executable script without a matching graph Command node.
    steps:
    - id: FLOW-REQ-0009-ALT-003
      step: 1
      actor: Project model validator
      action: Reports the untraced package.json script.
      expected_result: The repository check fails before an executable command can bypass graph governance.
  postconditions:
  - id: POST-REQ-0009-001
    statement: Repository-backed graph file targets resolve to real checkout files.
  - id: POST-REQ-0009-002
    statement: ValidationTool graph nodes are tied to existing implementation source files.
  - id: POST-REQ-0009-003
    statement: package.json scripts and graph Command nodes are bidirectionally aligned.
  acceptance_criteria:
  - id: AC-REQ-0009-001
    statement: The validator rejects graph SourceFile endpoints that point to missing files.
  - id: AC-REQ-0009-002
    statement: The validator rejects ValidationTool nodes whose declared implementation path is missing
      or lacks a matching IMPLEMENTED_BY triple.
  - id: AC-REQ-0009-003
    statement: The validator rejects package.json scripts that have no matching Command node.
  - id: AC-REQ-0009-004
    statement: Negative fixtures prove each protected drift class is rejected.
  verification:
    method: test
    required_evidence:
    - yaml
    - command
    - tool-output
