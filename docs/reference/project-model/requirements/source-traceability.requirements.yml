schema_version: '1.0'
change_control:
  decided_by:
  - requirements-governance:DEC-0028
  satisfies:
  - requirements-governance:REQ-0037
  rationale: This requirements part is loaded through the governed requirements index as part of the complete modular project-model layout.
schema_control:
  schema: docs/reference/project-model/schemas/requirements-part.schema.json
  rationale: The requirements part declares the canonical schema that validates modular requirements part shape through check-docs-format.mjs.
part:
  area_id: source-traceability
  title: Source Traceability requirements part
  status: draft
  description: Extracted requirements owned by the source-traceability project-model area.
requirements:
- id: REQ-0005
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Bidirectional implementation traceability
  statement: 'The project shall verify that governed source files are registered in graph.matrix.yml, that implementation relationships declared in graph.matrix.yml are mirrored by traceability references in source-file comments, and that source-file traceability claims are mirrored by graph matrix triples.

    '
  rationale: 'Bidirectional checks prevent unregistered source files from entering the repository, prevent the matrix from claiming implementation that code does not acknowledge, and prevent code comments from claiming governed implementation that the graph matrix does not record.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0005-001
    statement: The graph matrix contains IMPLEMENTED_BY relationships involving source files.
  - id: PRE-REQ-0005-002
    statement: Source files can contain parseable file-level JSDoc traceability comments.
  main_flow:
  - id: FLOW-REQ-0005-001
    step: 1
    actor: Validation tool
    action: Discovers governed source files under controlled source roots.
    expected_result: Source files that require graph traceability are known even before graph.matrix.yml references them.
  - id: FLOW-REQ-0005-002
    step: 2
    actor: Validation tool
    action: Reads IMPLEMENTED_BY triples from graph.matrix.yml.
    expected_result: The expected requirement-to-source-file relationships are known.
  - id: FLOW-REQ-0005-003
    step: 3
    actor: Validation tool
    action: Reads file-level traceability comments from referenced and discovered source files.
    expected_result: The source-file implementation claims are known.
  - id: FLOW-REQ-0005-004
    step: 4
    actor: Validation tool
    action: Compares discovered files, matrix-to-code traceability, and code-to-matrix traceability.
    expected_result: Unregistered source files and bidirectional traceability mismatches are rejected.
  alternative_flows:
  - id: ALT-REQ-0005-001
    title: Governed source file is not registered
    trigger: A source file exists under a governed source root but has no IMPLEMENTED_BY relationship in graph.matrix.yml.
    steps:
    - id: FLOW-REQ-0005-ALT-001
      step: 1
      actor: Validation tool
      action: Reports the unregistered governed source file.
      expected_result: The check fails before an untraceable source file can be committed.
  - id: ALT-REQ-0005-002
    title: Matrix references source file without source comment
    trigger: graph.matrix.yml contains an IMPLEMENTED_BY SourceFile triple but the source file does not cite the requirement.
    steps:
    - id: FLOW-REQ-0005-ALT-002
      step: 1
      actor: Validation tool
      action: Reports the missing source-file traceability comment.
      expected_result: The check fails with a traceability error.
  - id: ALT-REQ-0005-003
    title: Source comment references requirement without matrix triple
    trigger: A source file claims it implements a requirement but graph.matrix.yml has no matching IMPLEMENTED_BY triple.
    steps:
    - id: FLOW-REQ-0005-ALT-003
      step: 1
      actor: Validation tool
      action: Reports the missing graph matrix relationship.
      expected_result: The check fails with a traceability error.
  postconditions:
  - id: POST-REQ-0005-001
    statement: Every governed source file is represented by IMPLEMENTED_BY traceability in graph.matrix.yml.
  - id: POST-REQ-0005-002
    statement: Implementation traceability is consistent between graph.matrix.yml and source-file comments.
  - id: POST-REQ-0005-003
    statement: Traceability is enforced at file level before future code-symbol-level traceability is introduced.
  acceptance_criteria:
  - id: AC-REQ-0005-001
    statement: Each governed source file under controlled source roots has at least one matching IMPLEMENTED_BY SourceFile triple.
  - id: AC-REQ-0005-002
    statement: Each IMPLEMENTED_BY SourceFile triple points to an existing source file.
  - id: AC-REQ-0005-003
    statement: Each SourceFile referenced by an IMPLEMENTED_BY requirement triple declares the related requirement in file-level JSDoc.
  - id: AC-REQ-0005-004
    statement: Each file-level JSDoc requirement claim has a matching IMPLEMENTED_BY triple in graph.matrix.yml.
  - id: AC-REQ-0005-005
    statement: Each validation tool node declared by a source file exists in graph.matrix.yml.
  - id: AC-REQ-0005-006
    statement: Each validation tool implemented by a source file has a matching IMPLEMENTED_BY triple.
  verification:
    method: test
    required_evidence:
    - source-comment
    - yaml
    - tool-output
- id: REQ-0006
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Validation command consistency
  statement: 'The project shall verify that governed validation Command nodes in graph.matrix.yml are consistent with executable scripts declared in package.json.

    '
  rationale: 'Validation command traceability is only useful if the graph matrix and package manifest agree on the commands that can actually be run.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: tooling
  preconditions:
  - id: PRE-REQ-0006-001
    statement: The repository declares validation commands as Command nodes in graph.matrix.yml.
  - id: PRE-REQ-0006-002
    statement: The repository declares executable npm scripts in package.json.
  main_flow:
  - id: FLOW-REQ-0006-001
    step: 1
    actor: Validation tool
    action: Reads Command nodes from graph.matrix.yml.
    expected_result: The governed command set is known.
  - id: FLOW-REQ-0006-002
    step: 2
    actor: Validation tool
    action: Reads scripts from package.json.
    expected_result: The executable npm script set is known.
  - id: FLOW-REQ-0006-003
    step: 3
    actor: Validation tool
    action: Compares npm run Command nodes with package.json scripts.
    expected_result: Each governed npm validation command points to an existing script.
  alternative_flows:
  - id: ALT-REQ-0006-001
    title: Command node references missing script
    trigger: A Command node declares an npm run command whose script does not exist in package.json.
    steps:
    - id: FLOW-REQ-0006-ALT-001
      step: 1
      actor: Validation tool
      action: Reports the missing package.json script.
      expected_result: The check fails with a command consistency error.
  - id: ALT-REQ-0006-002
    title: Governed validation script lacks Command node
    trigger: A validation script in package.json has no matching Command node.
    steps:
    - id: FLOW-REQ-0006-ALT-002
      step: 1
      actor: Validation tool
      action: Reports the missing graph matrix Command node.
      expected_result: The check fails with a command consistency error.
  postconditions:
  - id: POST-REQ-0006-001
    statement: Governed validation commands are consistent between graph.matrix.yml and package.json.
  acceptance_criteria:
  - id: AC-REQ-0006-001
    statement: Each npm run Command node references an existing package.json script.
  - id: AC-REQ-0006-002
    statement: Each governed validation script in package.json has a matching Command node.
  - id: AC-REQ-0006-003
    statement: Command nodes are still linked through SPO triples.
  verification:
    method: test
    required_evidence:
    - command
    - yaml
    - tool-output
- id: REQ-0007
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Decision-backed source traceability
  statement: 'The project shall reject governed source files whose file-level traceability is not backed by at least one accepted project decision connected through the graph to a requirement or validation tool implemented by that source file.

    '
  rationale: 'Requirement-to-source traceability proves what a file implements, but it does not by itself explain why the file or control is allowed to exist. Decision-backed source traceability ensures that governed code is introduced only through explicit governance decisions and that source-file comments cannot cite arbitrary or unrelated decisions.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0007-001
    statement: Governed source files declare file-level JSDoc traceability comments.
  - id: PRE-REQ-0007-002
    statement: The graph matrix contains decision relationships and IMPLEMENTED_BY relationships for requirements and validation tools.
  main_flow:
  - id: FLOW-REQ-0007-001
    step: 1
    actor: Project model validator
    action: Reads decision references declared in each governed source file JSDoc comment.
    expected_result: Source-local decision claims are available for deterministic comparison.
  - id: FLOW-REQ-0007-002
    step: 2
    actor: Project model validator
    action: Derives the decisions that back requirements or validation tools implemented by the same source file.
    expected_result: The graph-backed decision set for the source file is known.
  - id: FLOW-REQ-0007-003
    step: 3
    actor: Project model validator
    action: Compares source-local decision claims with graph-backed decision relationships.
    expected_result: Source files without graph-backed decision traceability, or with unrelated decision claims, are rejected.
  alternative_flows:
  - id: ALT-REQ-0007-001
    title: Source file lacks decision traceability
    trigger: A governed source file has requirement/tool traceability but no graph-backed decision reference in its JSDoc.
    steps:
    - id: FLOW-REQ-0007-ALT-001
      step: 1
      actor: Project model validator
      action: Reports the source file that lacks graph-backed decision traceability.
      expected_result: The repository check fails before ungoverned functionality can be committed.
  - id: ALT-REQ-0007-002
    title: Source file cites unrelated decision
    trigger: A source-file JSDoc comment cites a known decision that does not decide, support, or depend on a requirement or validation tool implemented by that file.
    steps:
    - id: FLOW-REQ-0007-ALT-002
      step: 1
      actor: Project model validator
      action: Reports the unrelated source-file decision claim.
      expected_result: The repository check fails with a decision traceability mismatch.
  postconditions:
  - id: POST-REQ-0007-001
    statement: Every governed source file has at least one graph-backed decision reference.
  - id: POST-REQ-0007-002
    statement: Source-file decision references are rejected when they are unknown or unrelated to that file's implemented requirement/tool relationships.
  acceptance_criteria:
  - id: AC-REQ-0007-001
    statement: Each governed source-file JSDoc block contains a Related decisions section.
  - id: AC-REQ-0007-002
    statement: Each cited decision exists in the aggregated project model.
  - id: AC-REQ-0007-003
    statement: At least one cited decision is connected by the graph to a requirement or validation tool implemented by the same source file.
  - id: AC-REQ-0007-004
    statement: A negative fixture proves that removing decision-backed source traceability is rejected.
  verification:
    method: test
    required_evidence:
    - source-comment
    - yaml
    - command
    - tool-output
- id: REQ-0008
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Implemented requirement evidence closure
  statement: 'The project shall reject accepted requirements marked as implemented unless the graph records implementation or specification evidence, verification evidence, and an accepted decision relationship for the same requirement.

    '
  rationale: 'Implementation status is a governance claim. The claim is only reliable when the graph records what implements or specifies the requirement, how the requirement is verified, and which accepted decision backs the requirement. This prevents requirements from being marked implemented through prose-only edits or partial registry changes.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: project-model
  preconditions:
  - id: PRE-REQ-0008-001
    statement: Requirements declare status and implementation_status fields in governed part files.
  - id: PRE-REQ-0008-002
    statement: The graph matrix records requirement relationships through SPO triples.
  main_flow:
  - id: FLOW-REQ-0008-001
    step: 1
    actor: Project model validator
    action: Reads every accepted requirement whose implementation_status is implemented.
    expected_result: Implemented requirement claims are known from the aggregated project model.
  - id: FLOW-REQ-0008-002
    step: 2
    actor: Project model validator
    action: Checks that each implemented requirement has implementation or specification evidence in the graph.
    expected_result: The requirement is tied to a governed source, configuration, schema, or document artifact.
  - id: FLOW-REQ-0008-003
    step: 3
    actor: Project model validator
    action: Checks that each implemented requirement has VERIFIED_BY graph evidence.
    expected_result: The requirement is tied to an executable or governed verification boundary.
  - id: FLOW-REQ-0008-004
    step: 4
    actor: Project model validator
    action: Checks that each implemented requirement is backed by an accepted decision relationship.
    expected_result: The implementation claim has an explicit governance reason.
  alternative_flows:
  - id: ALT-REQ-0008-001
    title: Implemented requirement lacks implementation or specification evidence
    trigger: A requirement is accepted and implemented but has no IMPLEMENTED_BY or SPECIFIED_BY graph relationship.
    steps:
    - id: FLOW-REQ-0008-ALT-001
      step: 1
      actor: Project model validator
      action: Reports the requirement missing implementation/specification evidence.
      expected_result: The repository check fails before an unsupported implementation claim can be committed.
  - id: ALT-REQ-0008-002
    title: Implemented requirement lacks verification evidence
    trigger: A requirement is accepted and implemented but has no VERIFIED_BY graph relationship.
    steps:
    - id: FLOW-REQ-0008-ALT-002
      step: 1
      actor: Project model validator
      action: Reports the requirement missing verification evidence.
      expected_result: The repository check fails before an unverified implementation claim can be committed.
  - id: ALT-REQ-0008-003
    title: Implemented requirement lacks accepted decision backing
    trigger: A requirement is accepted and implemented but no accepted decision decides or supports it in the graph.
    steps:
    - id: FLOW-REQ-0008-ALT-003
      step: 1
      actor: Project model validator
      action: Reports the requirement missing accepted decision backing.
      expected_result: The repository check fails before a prose-only implementation claim can be committed.
  postconditions:
  - id: POST-REQ-0008-001
    statement: Every accepted implemented requirement has graph-backed implementation or specification evidence.
  - id: POST-REQ-0008-002
    statement: Every accepted implemented requirement has graph-backed verification evidence.
  - id: POST-REQ-0008-003
    statement: Every accepted implemented requirement has graph-backed decision evidence.
  acceptance_criteria:
  - id: AC-REQ-0008-001
    statement: The validator rejects an accepted implemented requirement with no IMPLEMENTED_BY or SPECIFIED_BY relationship.
  - id: AC-REQ-0008-002
    statement: The validator rejects an accepted implemented requirement with no VERIFIED_BY relationship.
  - id: AC-REQ-0008-003
    statement: The validator rejects an accepted implemented requirement with no accepted Decision relationship.
  - id: AC-REQ-0008-004
    statement: Negative fixtures prove that each missing evidence class is rejected.
  verification:
    method: test
    required_evidence:
    - yaml
    - command
    - tool-output
- id: REQ-0009
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Graph target and command existence closure
  statement: 'The project shall reject graph relationships, graph nodes, and package command declarations that reference missing repository-backed source, schema, config, test, validation-tool, or package script targets.

    '
  rationale: 'Traceability is unsafe if the graph can point at files or commands that do not exist in the checkout. Repository-backed graph targets must be concrete, package scripts must be represented by Command nodes, and ValidationTool nodes must be tied to the exact source file that implements them.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0009-001
    statement: The graph matrix declares repository-backed nodes and SPO endpoints for source, schema, config, test, command, and validation-tool entities.
  - id: PRE-REQ-0009-002
    statement: package.json declares the executable npm scripts for governed validation and support commands.
  main_flow:
  - id: FLOW-REQ-0009-001
    step: 1
    actor: Project model validator
    action: Reads graph nodes and graph triple endpoints after modular aggregation.
    expected_result: Every repository-backed graph target is available for path existence validation.
  - id: FLOW-REQ-0009-002
    step: 2
    actor: Project model validator
    action: Verifies that SourceFile, SchemaFile, TestFile, and ConfigFile graph targets resolve to files in the checkout.
    expected_result: Stale graph references to missing repository-backed files are rejected.
  - id: FLOW-REQ-0009-003
    step: 3
    actor: Project model validator
    action: Verifies that ValidationTool nodes declare an existing path and that the graph contains a matching IMPLEMENTED_BY SourceFile relationship for that path.
    expected_result: Validation tool declarations cannot drift away from their implementing source file.
  - id: FLOW-REQ-0009-004
    step: 4
    actor: Project model validator
    action: Verifies that every package.json script has a Command node and every Command node runs an existing package.json script through a ValidationTool relationship.
    expected_result: Package command declarations and graph command nodes remain bidirectionally aligned.
  alternative_flows:
  - id: ALT-REQ-0009-001
    title: Graph endpoint references missing repository file
    trigger: A graph triple endpoint or path-backed graph node names a SourceFile, SchemaFile, TestFile, or ConfigFile that does not exist in the checkout.
    steps:
    - id: FLOW-REQ-0009-ALT-001
      step: 1
      actor: Project model validator
      action: Reports the missing path-backed graph target.
      expected_result: The repository check fails before stale graph references can be committed.
  - id: ALT-REQ-0009-002
    title: ValidationTool node drifts away from implementation source
    trigger: A ValidationTool node path is missing or has no matching IMPLEMENTED_BY SourceFile triple.
    steps:
    - id: FLOW-REQ-0009-ALT-002
      step: 1
      actor: Project model validator
      action: Reports the invalid validation-tool path or missing implementation relationship.
      expected_result: The repository check fails before the tool declaration becomes unverifiable.
  - id: ALT-REQ-0009-003
    title: package.json script lacks Command node
    trigger: package.json declares an executable script without a matching graph Command node.
    steps:
    - id: FLOW-REQ-0009-ALT-003
      step: 1
      actor: Project model validator
      action: Reports the untraced package.json script.
      expected_result: The repository check fails before an executable command can bypass graph governance.
  postconditions:
  - id: POST-REQ-0009-001
    statement: Repository-backed graph file targets resolve to real checkout files.
  - id: POST-REQ-0009-002
    statement: ValidationTool graph nodes are tied to existing implementation source files.
  - id: POST-REQ-0009-003
    statement: package.json scripts and graph Command nodes are bidirectionally aligned.
  acceptance_criteria:
  - id: AC-REQ-0009-001
    statement: The validator rejects graph SourceFile endpoints that point to missing files.
  - id: AC-REQ-0009-002
    statement: The validator rejects ValidationTool nodes whose declared implementation path is missing or lacks a matching IMPLEMENTED_BY triple.
  - id: AC-REQ-0009-003
    statement: The validator rejects package.json scripts that have no matching Command node.
  - id: AC-REQ-0009-004
    statement: Negative fixtures prove each protected drift class is rejected.
  verification:
    method: test
    required_evidence:
    - yaml
    - command
    - tool-output
- id: REQ-0010
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Negative fixture traceability contract
  statement: 'The project shall define negative validator fixtures as governed traceability artifacts before enforcing repository-wide fixture inventory checks.

    '
  rationale: 'Negative fixtures protect deterministic controls, but they are executed in intentionally invalid isolated workspaces. The model must distinguish real-repository fixture inventory from fixture execution workspaces before enforcement is added, otherwise negative tests can fail for the wrong reason and stop proving their intended diagnostic class.

    '
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: project-model
  preconditions:
  - id: PRE-REQ-0010-001
    statement: Negative fixtures are stored under tools/docs/fixtures/negative in the real repository.
  - id: PRE-REQ-0010-002
    statement: The negative fixture runner builds isolated invalid workspaces to verify validator failures.
  main_flow:
  - id: FLOW-REQ-0010-001
    step: 1
    actor: Project model designer
    action: Defines the NegativeFixture entity type and fixture traceability relationships.
    expected_result: Future graph records can distinguish fixture files from generic configuration files.
  - id: FLOW-REQ-0010-002
    step: 2
    actor: Project model designer
    action: Defines the real-repository enforcement context separately from fixture execution isolation.
    expected_result: Future enforcement can inventory real fixtures without changing the intended failure reason of isolated negative fixtures.
  - id: FLOW-REQ-0010-003
    step: 3
    actor: Project model validator
    action: Defers enforcement until the real-repository and fixture-execution contexts are separated.
    expected_result: The contract is available without introducing an unstable or over-broad gate.
  alternative_flows:
  - id: ALT-REQ-0010-001
    title: Fixture inventory is enforced inside isolated fixture workspace
    trigger: A future validator applies repository-wide fixture inventory while validating a deliberately incomplete negative fixture workspace.
    steps:
    - id: FLOW-REQ-0010-ALT-001
      step: 1
      actor: Project model validator
      action: Skips repository-wide fixture inventory unless the fixture explicitly targets fixture inventory enforcement.
      expected_result: The negative fixture continues to fail for its intended governed reason.
  postconditions:
  - id: POST-REQ-0010-001
    statement: Negative fixture traceability has an explicit contract before runtime enforcement.
  - id: POST-REQ-0010-002
    statement: Future enforcement can target only the real repository inventory unless explicitly testing fixture inventory behavior.
  acceptance_criteria:
  - id: AC-REQ-0010-001
    statement: The project model documents NegativeFixture as the target entity type for governed negative fixtures.
  - id: AC-REQ-0010-002
    statement: The project model documents the required fixture traceability relationships.
  - id: AC-REQ-0010-003
    statement: The contract states that real-repository fixture inventory enforcement must not be applied blindly inside isolated invalid fixture workspaces.
  - id: AC-REQ-0010-004
    statement: The contract is now followed by deterministic real-repository fixture inventory enforcement while preserving isolated fixture execution boundaries.
  verification:
    method: analysis
    required_evidence:
    - document
    - yaml
- id: REQ-0011
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Real-repository negative fixture inventory enforcement
  statement: The project-model validator shall reject any real repository negative fixture file that is not represented and traced as a governed NegativeFixture graph entity.
  rationale: Negative fixtures are safety controls for deterministic validators. A fixture file that exists outside the graph can silently stop protecting a requirement, validator, gate, or command. Real-repository inventory enforcement makes fixture coverage explicit without forcing every isolated invalid workspace to carry extra traceability unrelated to the diagnostic under test.
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0011-001
    statement: Negative fixtures are stored as JSON files under tools/docs/fixtures/negative.
  - id: PRE-REQ-0011-002
    statement: The project graph can represent repository-owned fixture files as NegativeFixture nodes.
  - id: PRE-REQ-0011-003
    statement: Fixture execution workspaces are temporary mutated copies of the real repository.
  main_flow:
  - id: FLOW-REQ-0011-001
    step: 1
    actor: Project model validator
    action: Discovers real negative fixture files under tools/docs/fixtures/negative.
    expected_result: The validator has a deterministic inventory of fixture files present in the checkout.
  - id: FLOW-REQ-0011-002
    step: 2
    actor: Project model validator
    action: Requires each discovered fixture file to have a matching NegativeFixture graph node.
    expected_result: Unregistered fixture files are rejected.
  - id: FLOW-REQ-0011-003
    step: 3
    actor: Project model validator
    action: Requires each NegativeFixture to have VALIDATES, EXERCISES, and EXPECTS_FAILURE_OF traceability.
    expected_result: Fixture files are connected to the validator, gate, command, or requirement they protect.
  - id: FLOW-REQ-0011-004
    step: 4
    actor: Negative fixture runner
    action: Uses the normal model validator result for the fixture that intentionally creates an unregistered fixture file.
    expected_result: The inventory rule is covered by a negative fixture without masking unrelated fixture diagnostics.
  alternative_flows:
  - id: ALT-REQ-0011-001
    title: A temporary fixture workspace intentionally adds an unregistered fixture
    trigger: The unregistered-negative-fixture test creates a temporary extra fixture file.
    steps:
    - id: FLOW-REQ-0011-ALT-001
      step: 1
      actor: Project model validator
      action: Rejects the temporary repository because the extra fixture has no NegativeFixture graph node.
      expected_result: The new inventory enforcement has direct negative coverage.
  postconditions:
  - id: POST-REQ-0011-001
    statement: Every real negative fixture file has graph inventory traceability.
  - id: POST-REQ-0011-002
    statement: Negative fixture traceability can be tightened later with expected diagnostic/control assertions.
  acceptance_criteria:
  - id: AC-REQ-0011-001
    statement: The validator rejects a tools/docs/fixtures/negative/*.json file that has no NegativeFixture graph node.
  - id: AC-REQ-0011-002
    statement: The validator rejects a NegativeFixture graph node whose file path does not exist.
  - id: AC-REQ-0011-003
    statement: The validator requires each discovered NegativeFixture to have VALIDATES, EXERCISES, and EXPECTS_FAILURE_OF traceability.
  - id: AC-REQ-0011-004
    statement: A dedicated negative fixture proves unregistered real fixture files are rejected.
  verification:
    method: test
    required_evidence:
    - yaml
    - command
    - tool-output
- id: REQ-0012
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Governed commit and push flow contract
  statement: The project shall define a governed commit and push flow that separates pre-commit content validation from post-commit/pre-push repository cleanliness enforcement.
  rationale: A full repository cleanliness check is unsafe inside docs:check because the pre-commit gate runs while files are staged. The project still needs a post-commit/pre-push guard so generated or unintended changes cannot remain outside the commit before push. Recording the contract before scripts and hooks are added prevents the workflow automation from breaking legitimate commits or silently bypassing review.
  status: accepted
  implementation_status: not_implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0012-001
    statement: The repository uses docs:check as the pre-commit validation gate.
  - id: PRE-REQ-0012-002
    statement: The repository generates transient artifacts under artifacts/ and excludes that directory from Git by policy.
  - id: PRE-REQ-0012-003
    statement: Developers can still run git commit and git push manually unless a governed wrapper or hook blocks unsafe flows.
  main_flow:
  - id: FLOW-REQ-0012-001
    step: 1
    actor: Project model designer
    action: Defines the difference between commit-time content validation and post-commit/pre-push cleanliness validation.
    expected_result: Future controls do not place a full working-tree cleanliness rule inside docs:check.
  - id: FLOW-REQ-0012-002
    step: 2
    actor: Project model designer
    action: Defines the future repo:check:clean command boundary.
    expected_result: The repository has an explicit target for post-commit cleanliness enforcement.
  - id: FLOW-REQ-0012-003
    step: 3
    actor: Project model designer
    action: Defines the future governed commit/push helper and pre-push hook behavior.
    expected_result: Future automation can block unsafe commits or pushes without duplicating policy.
  alternative_flows:
  - id: ALT-REQ-0012-001
    title: Full cleanliness check is placed in pre-commit
    trigger: A future implementation makes docs:check fail merely because files are staged for a legitimate commit.
    steps:
    - id: FLOW-REQ-0012-ALT-001
      step: 1
      actor: Repository operator
      action: Moves full cleanliness enforcement to the post-commit/pre-push clean check boundary.
      expected_result: docs:check remains pre-commit safe while pre-push still blocks incomplete commits.
  - id: ALT-REQ-0012-002
    title: Push is attempted with uncommitted generated changes
    trigger: A generator or manual edit leaves tracked changes after the commit.
    steps:
    - id: FLOW-REQ-0012-ALT-002
      step: 1
      actor: Pre-push gate
      action: Rejects the push and reports that repository changes require review.
      expected_result: The developer must inspect, commit, or revert the remaining changes before pushing.
  postconditions:
  - id: POST-REQ-0012-001
    statement: The project has a documented boundary for pre-commit, post-commit/pre-push, hook, and governed command responsibilities.
  - id: POST-REQ-0012-002
    statement: Future implementation can add script and hook enforcement without making docs:check incompatible with pre-commit execution.
  acceptance_criteria:
  - id: AC-REQ-0012-001
    statement: The contract states that docs:check must not require a fully clean working tree while it is used as a pre-commit gate.
  - id: AC-REQ-0012-002
    statement: The contract states that a future post-commit/pre-push check must reject staged changes, unstaged tracked changes, and unsafe artifacts before push.
  - id: AC-REQ-0012-003
    statement: The contract states that a future pre-push hook must invoke the same clean-check script as the governed command.
  - id: AC-REQ-0012-004
    statement: The contract states that a future commit/push helper must fail closed and require review when blocking gates fail.
  verification:
    method: analysis
    required_evidence:
    - document
    - yaml
- id: REQ-0013
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Post-commit repository cleanliness command
  statement: The project shall provide a governed repository cleanliness command that rejects staged, unstaged, untracked non-ignored changes and unsafe artifacts/ tracking after commit and before push.
  rationale: The governed commit/push flow needs an executable post-commit boundary that can be used manually, by a future pre-push hook, and by a future commit/push helper without making docs:check incompatible with pre-commit execution.
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0013-001
    statement: The repository is inside a Git working tree.
  - id: PRE-REQ-0013-002
    statement: docs:check remains the pre-commit content validation gate and does not require a fully clean repository while files are staged for commit.
  main_flow:
  - id: FLOW-REQ-0013-001
    step: 1
    actor: Developer or automation
    action: Runs npm run repo:check:clean after a commit and before pushing.
    expected_result: The repository cleanliness command inspects Git state deterministically.
  - id: FLOW-REQ-0013-002
    step: 2
    actor: Repository cleanliness command
    action: Checks the index, working tree, untracked non-ignored files, tracked artifacts/, and staged artifacts/ entries.
    expected_result: Any unsafe repository state is reported with review-oriented diagnostics.
  - id: FLOW-REQ-0013-003
    step: 3
    actor: Repository cleanliness command
    action: Exits with a non-zero status when unsafe state is found.
    expected_result: A future hook or governed commit/push helper can fail closed before push.
  alternative_flows:
  - id: ALT-REQ-0013-001
    title: Repository has uncommitted changes after commit
    trigger: A generated output or manual edit remains unstaged, staged, or untracked after the commit.
    steps:
    - id: FLOW-REQ-0013-ALT-001
      step: 1
      actor: Repository cleanliness command
      action: Lists the dirty repository entries and exits with failure.
      expected_result: The developer must review, commit, revert, or intentionally ignore the entries before push.
  - id: ALT-REQ-0013-002
    title: artifacts/ is tracked or staged
    trigger: A generated artifact or handoff archive is accidentally added to Git tracking or staging.
    steps:
    - id: FLOW-REQ-0013-ALT-002
      step: 1
      actor: Repository cleanliness command
      action: Reports the artifacts/ entries and exits with failure.
      expected_result: Generated artifacts cannot silently enter the governed repository history.
  postconditions:
  - id: POST-REQ-0013-001
    statement: The repository has an executable post-commit/pre-push cleanliness command.
  - id: POST-REQ-0013-002
    statement: The command can be reused by a future pre-push hook without duplicating policy.
  acceptance_criteria:
  - id: AC-REQ-0013-001
    statement: package.json exposes repo:check:clean as a governed npm script.
  - id: AC-REQ-0013-002
    statement: The graph contains a Command node for npm run repo:check:clean and links it to its ValidationTool.
  - id: AC-REQ-0013-003
    statement: The command rejects dirty index, dirty working tree, untracked non-ignored files, tracked artifacts/, and staged artifacts/ entries.
  - id: AC-REQ-0013-004
    statement: The command exits successfully when the repository is clean and artifacts/ is only ignored local output.
  verification:
    method: test
    required_evidence:
    - command
    - repository-path
    - tool-output
- id: REQ-0014
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Pre-push repository cleanliness hook
  statement: The project shall provide a versioned Git pre-push hook that invokes the governed repository cleanliness command before allowing manual pushes.
  rationale: repo:check:clean is useful as a manual command, but manual git push remains bypassable unless the repository provides a hook that delegates to the same governed policy. The hook must not duplicate cleanliness logic; it must invoke the canonical command so policy remains centralized and traceable.
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0014-001
    statement: repo:check:clean is available as the canonical post-commit/pre-push cleanliness command.
  - id: PRE-REQ-0014-002
    statement: The repository uses the versioned .githooks directory as the hook source when core.hooksPath is configured.
  main_flow:
  - id: FLOW-REQ-0014-001
    step: 1
    actor: Developer
    action: Runs git push with the versioned hook path enabled.
    expected_result: Git invokes .githooks/pre-push before the push reaches the remote.
  - id: FLOW-REQ-0014-002
    step: 2
    actor: Pre-push hook
    action: Runs npm run repo:check:clean.
    expected_result: The hook delegates to the governed repository cleanliness command instead of duplicating policy.
  - id: FLOW-REQ-0014-003
    step: 3
    actor: Repository cleanliness command
    action: Fails when the index, working tree, untracked non-ignored files, tracked artifacts/, or staged artifacts/ are unsafe.
    expected_result: Git push is blocked and the developer receives review-oriented diagnostics.
  alternative_flows:
  - id: ALT-REQ-0014-001
    title: Repository is dirty before push
    trigger: git push is attempted while the repository contains uncommitted or unsafe artifact state.
    steps:
    - id: FLOW-REQ-0014-ALT-001
      step: 1
      actor: Pre-push hook
      action: Propagates the non-zero repo:check:clean exit code.
      expected_result: The push fails before remote state can change.
  postconditions:
  - id: POST-REQ-0014-001
    statement: Manual git push uses the same cleanliness policy as the future governed commit/push helper.
  - id: POST-REQ-0014-002
    statement: The hook contains only orchestration and no duplicate repository-cleanliness rules.
  acceptance_criteria:
  - id: AC-REQ-0014-001
    statement: .githooks/pre-push exists as a versioned repository file.
  - id: AC-REQ-0014-002
    statement: .githooks/pre-push invokes npm run repo:check:clean.
  - id: AC-REQ-0014-003
    statement: The graph records the pre-push gate, hook file, and dependency on the repository cleanliness command.
  - id: AC-REQ-0014-004
    statement: The documentation structure guard requires the pre-push hook file to exist.
  verification:
    method: test
    required_evidence:
    - git-hook
    - command
    - tool-output
- id: REQ-0015
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Governed commit and push command with computed staging
  statement: The project shall provide a governed commit/push command that computes the Git change set internally, stages only allowed repository paths, runs blocking validation gates, commits, verifies post-commit cleanliness, and pushes only when all gates pass.
  rationale: A governed helper that still requires manual git add can accidentally omit new files, include stale staging, or allow unsafe artifacts to enter review by habit. Computing the change set from Git status and failing closed for forbidden or unknown paths gives the project one auditable flow for normal changes while preserving human review for unusual repository additions.
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0015-001
    statement: repo:check:clean is available as the canonical post-commit/pre-push cleanliness command.
  - id: PRE-REQ-0015-002
    statement: docs:check remains the canonical pre-commit content validation gate.
  - id: PRE-REQ-0015-003
    statement: The repository has a controlled set of paths that may be staged automatically by the governed command.
  main_flow:
  - id: FLOW-REQ-0015-001
    step: 1
    actor: Developer
    action: Runs npm run repo:commit-push with a non-empty commit message.
    expected_result: The governed command starts from the current Git status instead of requiring manual staging.
  - id: FLOW-REQ-0015-002
    step: 2
    actor: Governed commit/push command
    action: Computes changed, new, renamed, and deleted repository paths from Git status.
    expected_result: The exact candidate change set is known before staging.
  - id: FLOW-REQ-0015-003
    step: 3
    actor: Governed commit/push command
    action: Rejects forbidden paths, generated artifacts, temporary archives, and paths outside the automatic-staging allowlist.
    expected_result: Unsafe or unusual paths require explicit review before the flow can continue.
  - id: FLOW-REQ-0015-004
    step: 4
    actor: Governed commit/push command
    action: Stages only the computed allowed paths and runs npm run docs:check.
    expected_result: The commit includes the reviewed change set and cannot proceed if blocking documentation/model gates fail.
  - id: FLOW-REQ-0015-005
    step: 5
    actor: Governed commit/push command
    action: Creates the commit, runs npm run repo:check:clean, and pushes.
    expected_result: The push occurs only after the commit is created and the repository is clean.
  alternative_flows:
  - id: ALT-REQ-0015-001
    title: Change set contains forbidden or unknown path
    trigger: Git status reports artifacts/, temporary archives, generated manifests, or a path outside the automatic-staging allowlist.
    steps:
    - id: FLOW-REQ-0015-ALT-001
      step: 1
      actor: Governed commit/push command
      action: Prints the rejected path and exits with failure before staging.
      expected_result: The developer must review the path and either remove it or intentionally update the governed allowlist in a separate reviewed change.
  - id: ALT-REQ-0015-002
    title: Blocking validation gate fails
    trigger: docs:check, git commit, repo:check:clean, or git push exits with failure.
    steps:
    - id: FLOW-REQ-0015-ALT-002
      step: 1
      actor: Governed commit/push command
      action: Propagates the failing command status and prints that review is required.
      expected_result: The flow stops before later stages can hide the failed gate.
  postconditions:
  - id: POST-REQ-0015-001
    statement: Normal repository changes can be committed and pushed through one governed command.
  - id: POST-REQ-0015-002
    statement: The command stages internally and does not require manual git add.
  - id: POST-REQ-0015-003
    statement: The command fails closed when it sees unsafe paths, gate failures, or post-commit dirty state.
  acceptance_criteria:
  - id: AC-REQ-0015-001
    statement: package.json exposes repo:commit-push as a governed npm script.
  - id: AC-REQ-0015-002
    statement: The command computes the Git change set internally and stages only allowed changed paths.
  - id: AC-REQ-0015-003
    statement: The command rejects artifacts/, generated ZIP/log/temp files, generated handoff manifests, and paths outside the automatic-staging allowlist.
  - id: AC-REQ-0015-004
    statement: The command runs docs:check before git commit and repo:check:clean after git commit.
  - id: AC-REQ-0015-005
    statement: The graph records the command, validation tool, source file, requirement, decision, and post-commit cleanliness dependency.
  verification:
    method: test
    required_evidence:
    - command
    - source-comment
    - tool-output
- id: REQ-0016
  macro_requirement_id: MR-0001
  capability_id: CAP-REQUIREMENTS-MANAGEMENT
  title: Generated artifact canonical-source guard
  statement: The project model shall reject generated artifacts under artifacts/ when they are modeled as governed source, schema, config, test, fixture, implementation, specification, declaration, or canonical source material.
  rationale: artifacts/ is an ignored local output tree. It can be inspected by validators as generated output, but allowing it to appear as governed source material would let transient files become false sources of truth and weaken the repository cleanliness guarantees.
  status: accepted
  implementation_status: implemented
  priority: must
  type: operational
  scope: repository
  preconditions:
  - id: PRE-REQ-0016-001
    statement: The repository uses artifacts/ for generated local outputs that are excluded from Git.
  - id: PRE-REQ-0016-002
    statement: The graph may need to mention generated outputs as validation targets.
  main_flow:
  - id: FLOW-REQ-0016-001
    step: 1
    actor: Project model validator
    action: Inspects graph nodes and triple endpoints for repository paths under artifacts/.
    expected_result: Generated artifact paths are recognized deterministically.
  - id: FLOW-REQ-0016-002
    step: 2
    actor: Project model validator
    action: Allows generated artifact paths only as Document validation targets.
    expected_result: Validators can still declare that they validate generated outputs.
  - id: FLOW-REQ-0016-003
    step: 3
    actor: Project model validator
    action: Rejects generated artifact paths used as source-like or canonical model inputs.
    expected_result: Generated local outputs cannot become governed sources of truth.
  alternative_flows:
  - id: ALT-REQ-0016-001
    title: Artifact is modeled as source implementation
    trigger: A graph triple uses artifacts/... as a SourceFile IMPLEMENTED_BY target.
    steps:
    - id: FLOW-REQ-0016-ALT-001
      step: 1
      actor: Project model validator
      action: Reports the generated artifact source misuse and exits with failure.
      expected_result: The developer must move the source reference to a real governed file or remove the invalid trace.
  postconditions:
  - id: POST-REQ-0016-001
    statement: artifacts/ remains a generated output location, not a canonical source root.
  acceptance_criteria:
  - id: AC-REQ-0016-001
    statement: Graph nodes under artifacts/ are allowed only as Document nodes.
  - id: AC-REQ-0016-002
    statement: Graph triple endpoints under artifacts/ are allowed only as Document objects of VALIDATES triples from ValidationTool, Gate, or Command subjects.
  - id: AC-REQ-0016-003
    statement: A negative fixture proves an artifact path modeled as SourceFile is rejected.
  verification:
    method: test
    required_evidence:
    - command
    - yaml
    - tool-output
