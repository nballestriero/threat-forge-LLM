schema_version: "1.0"

change_control:
  decided_by:
    - "DEC-0013"
  satisfies:
    - "REQ-0022"
  rationale: >
    This governed baseline artifact declares its internal traceability marker so
    deterministic validation can compare file-local change-control metadata with
    graph.matrix.yml relationships.

schema_control:
  schema: "docs/reference/project-model/schemas/governance-registry.schema.json"
  rationale: >
    The governance registry declares the canonical schema that validates its
    structural shape so schema-to-artifact application can be checked
    bidirectionally against graph.matrix.yml.

registry:
  id: "project-governance-registry"
  title: "Project governance registry"
  status: "draft"
  description: >
    Compact controlled registry for project capabilities, decisions,
    document types, body profiles, taxonomies, graph node types, and graph
    predicates.

taxonomies:
  capability_status:
    - id: "proposed"
      description: "Capability proposed but not yet accepted as binding."
    - id: "accepted"
      description: "Capability accepted as part of the governed product model."
    - id: "implemented"
      description: "Capability has implementation and verification traceability."
    - id: "deprecated"
      description: "Capability is no longer recommended for new work."
    - id: "superseded"
      description: "Capability has been replaced by another capability."

  decision_status:
    - id: "proposed"
      description: "Decision under discussion."
    - id: "accepted"
      description: "Decision accepted as binding."
    - id: "rejected"
      description: "Decision explicitly rejected."
    - id: "superseded"
      description: "Decision replaced by a later decision."

  requirement_status:
    - id: "proposed"
      description: "Requirement proposed but not yet accepted as binding."
    - id: "accepted"
      description: "Requirement approved and accepted as binding; implementation is tracked separately."
    - id: "deprecated"
      description: "Requirement no longer recommended."
    - id: "superseded"
      description: "Requirement replaced by another requirement."

  requirement_implementation_status:
    - id: "not_implemented"
      description: "Requirement is approved but has no implementation evidence yet."
    - id: "partially_implemented"
      description: "Requirement has partial implementation evidence but is not complete."
    - id: "implemented"
      description: "Requirement is implemented and has traceability or validation evidence."
    - id: "not_applicable"
      description: "Requirement does not require runtime implementation evidence."

  priority:
    - id: "must"
      description: "Mandatory requirement."
    - id: "should"
      description: "Important but not mandatory yet."
    - id: "could"
      description: "Optional improvement."
    - id: "wont"
      description: "Explicitly excluded for now."

  requirement_type:
    - id: "functional"
      description: "Observable product behavior."
    - id: "non-functional"
      description: "Quality attribute or constraint."
    - id: "documentation"
      description: "Documentation corpus or documentation governance requirement."
    - id: "data"
      description: "Data structure, registry, matrix, or graph model requirement."
    - id: "operational"
      description: "Tooling, workflow, validation, or repository operation requirement."

  scope:
    - id: "repository"
      description: "Applies to the repository as a whole."
    - id: "documentation-corpus"
      description: "Applies to governed documentation under docs."
    - id: "project-model"
      description: "Applies to the compact project model files."
    - id: "tooling"
      description: "Applies to deterministic tools and validation commands."
    - id: "governance-control"
      description: "Applies to the repository governance control report, page, and future admin surface."
    - id: "contracts"
      description: "Applies to governed data, API, and report contracts."

  verification_method:
    - id: "inspection"
      description: "Verified by human or deterministic inspection."
    - id: "test"
      description: "Verified by automated test or executable check."
    - id: "analysis"
      description: "Verified through deterministic analysis."
    - id: "manual-review"
      description: "Verified by explicit human review."

  evidence_type:
    - id: "repository-path"
      description: "Evidence based on a repository-relative path."
    - id: "document"
      description: "Evidence based on a governed documentation artifact."
    - id: "yaml"
      description: "Evidence based on a YAML registry or matrix."
    - id: "json-schema"
      description: "Evidence based on a governed JSON Schema contract."
    - id: "api-contract"
      description: "Evidence based on a governed backend or HTTP API contract."
    - id: "registry-entry"
      description: "Evidence based on an entry in a governed registry."
    - id: "command"
      description: "Evidence based on an executable command."
    - id: "tool-output"
      description: "Evidence based on deterministic tool output."
    - id: "git-hook"
      description: "Evidence based on a versioned Git hook."
    - id: "source-comment"
      description: "Evidence based on a parseable source-file comment."

  registry_schema_version:
    - id: "1.0"
      description: "Initial governed registry schema version."
      rationale: >
        Registry schema versions must be controlled because validators, schema
        files, editor integrations, and future tools need an explicit compatibility
        boundary.
      validation_impact: >
        Deterministic validators shall reject unsupported registry schema
        versions instead of accepting unreviewed registry shapes.

  registry_status:
    - id: "draft"
      description: "Registry is under active design and may change through governed work."
      rationale: "Draft registries allow schema and dataset design before stabilization."
      validation_impact: "Draft status is accepted but should remain visible in reports."
    - id: "accepted"
      description: "Registry is accepted as a stable governed baseline."
      rationale: "Accepted registries become normative inputs for deterministic tools."
      validation_impact: "Accepted status may require stricter future change controls."
    - id: "deprecated"
      description: "Registry remains readable but is no longer recommended for new work."
      rationale: "Deprecation preserves historical compatibility while discouraging new use."
      validation_impact: "Future validators may warn or block new references to deprecated registries."
    - id: "superseded"
      description: "Registry has been replaced by a newer governed artifact."
      rationale: "Supersession makes replacement explicit instead of silently changing authority."
      validation_impact: "Future validators may require a SUPERSEDES relationship."

  diataxis_section:
    - id: "tutorials"
      description: "Learning-oriented Diátaxis section."
      rationale: "Document type placement must be deterministic for structure guards and readers."
      validation_impact: "Document types using this value shall map to docs/tutorials."
    - id: "how-to"
      description: "Task-oriented Diátaxis section."
      rationale: "Document type placement must be deterministic for structure guards and readers."
      validation_impact: "Document types using this value shall map to docs/how-to."
    - id: "reference"
      description: "Information-oriented Diátaxis section."
      rationale: "Document type placement must be deterministic for structure guards and readers."
      validation_impact: "Document types using this value shall map to docs/reference."
    - id: "explanation"
      description: "Understanding-oriented Diátaxis section."
      rationale: "Document type placement must be deterministic for structure guards and readers."
      validation_impact: "Document types using this value shall map to docs/explanation."

  project_model_areas:
    - id: "global"
      description: "Cross-cutting project-model area for decisions, relationships, or policies that are intentionally not owned by a single functional area."
      rationale: "Some governance decisions and graph relationships define repository-wide rules rather than one capability boundary."
      validation_impact: "Future validators shall allow global only for explicitly cross-cutting indexes, decisions, or graph parts."
    - id: "documentation-structure"
      description: "Area for governed documentation layout, Diátaxis placement, required files, and repository documentation boundaries."
      rationale: "Documentation structure has distinct ownership from schema validation and semantic project-model checks."
      validation_impact: "Future modular parts using this area shall own structure-related requirements, decisions, and graph relationships."
    - id: "schema-validation"
      description: "Area for governed JSON Schema contracts, schema application traceability, and format validation entrypoint rules."
      rationale: "Schema validation has a stable contract and tooling boundary around check-docs-format.mjs."
      validation_impact: "Future modular parts using this area shall own schema contract and schema-driven validation requirements, decisions, and graph relationships."
    - id: "requirements-governance"
      description: "Area for macro requirements, atomic requirements, lifecycle rules, acceptance criteria, and requirement registry governance."
      rationale: "Requirements governance is a distinct model concern even when individual requirements belong to product capabilities."
      validation_impact: "Future validators shall aggregate this area with other parts before checking requirement references and lifecycle semantics."
    - id: "graph-traceability"
      description: "Area for graph matrix contracts, SPO relationships, predicate compatibility, and cross-artifact traceability semantics."
      rationale: "Traceability graph ownership must scale separately from the requirements registry and decision registry."
      validation_impact: "Future validators shall aggregate graph-traceability parts before checking SPO compatibility and entity existence."
    - id: "source-traceability"
      description: "Area for governed source-file registration, JSDoc traceability, and implementation evidence checks."
      rationale: "Source traceability connects model requirements to tools and source files and needs a clear modular ownership boundary."
      validation_impact: "Future validators shall apply source traceability checks after aggregating all requirement and graph parts."
    - id: "governance-control"
      description: "Area for governance control report, static control page, generated artifacts, and future admin/control surfaces."
      rationale: "Governance control outputs are generated and consumed differently from project-model registries."
      validation_impact: "Future modular parts using this area shall own report/page contract and generation traceability."
    - id: "project-handoff"
      description: "Area for handoff ZIP generation, context packaging, and local artifact exclusion policy."
      rationale: "Project handoff is an operational capability with distinct commands and artifact boundaries."
      validation_impact: "Future modular parts using this area shall own handoff command, tool, and artifact-policy traceability."
    - id: "markdown-format"
      description: "Area for governed Markdown body profiles and Markdown document format checks."
      rationale: "Markdown body governance is format-oriented and separate from YAML registry schema validation."
      validation_impact: "Future modular parts using this area shall own body-profile requirements, decisions, and validation relationships."
    - id: "backend-architecture"
      description: "Area for future backend layering, composition-root, API contract, and architecture governance requirements."
      rationale: "Backend architecture will grow after product boundary work and should not be mixed into documentation governance files."
      validation_impact: "Future modular parts using this area shall own backend architecture requirements and enforcement design when runtime code exists."

capabilities:
  - id: "CAP-DOCUMENTATION-GOVERNANCE"
    title: "Documentation governance"
    description: >
      Structured documentation, body-format governance, requirements registry,
      traceability matrix, and graph-ready documentation.
    status: "accepted"

  - id: "CAP-GRAPH-IMPORT"
    title: "Graph import"
    description: >
      Future import of governed project knowledge into graph-oriented storage,
      including Neo4j-compatible nodes and relationships.
    status: "accepted"

  - id: "CAP-REQUIREMENTS-MANAGEMENT"
    title: "Requirements management"
    description: >
      Macro requirements, atomic requirements, acceptance criteria, flows,
      evidence, and traceability.
    status: "accepted"

  - id: "CAP-BACKEND-ARCHITECTURE"
    title: "Backend architecture governance"
    description: >
      Default backend layering, dependency composition, factory/composition-root
      pattern, and future deterministic enforcement.
    status: "accepted"

  - id: "CAP-API-CONTRACTS"
    title: "Backend API contracts"
    description: >
      Governed backend and API contracts used as authoritative documentation
      sources for HTTP behavior, JSON payload models, future admin documentation,
      and runtime validators such as Zod.
    status: "accepted"


  - id: "CAP-GOVERNANCE-CONTROL"
    title: "Governance control surface"
    description: >
      Machine-readable governance control report, static control page, future
      protected admin surface, and non-interactive tool or LLM consumption.
    status: "accepted"

  - id: "CAP-PRODUCT-BOUNDARY"
    title: "Product boundary"
    description: >
      Definition and maintenance of the product scope, non-goals, and clean-start
      assumptions.
    status: "proposed"

decisions:
  - id: "DEC-0001"
    title: "Clean restart"
    status: "accepted"
    statement: >
      The project starts as a clean repository and does not inherit the previous
      threat-forge repository as a source of truth.
    rationale: >
      A clean restart avoids carrying forward accidental complexity, obsolete
      assumptions, and uncontrolled documentation structures.
    consequences:
      - "Old repository history is not imported."
      - "Old documentation is not copied by default."
      - "Old ideas may be reintroduced only through explicit new decisions."

  - id: "DEC-0002"
    title: "Compact governed project model"
    status: "accepted"
    statement: >
      Governance vocabularies, requirements, and governed relationships are
      concentrated in a compact project model under docs/reference/project-model.
    rationale: >
      The project needs deterministic governance without creating too many
      scattered registry and matrix files.
    consequences:
      - "Governance vocabulary is stored in governance.registry.yml."
      - "Macro requirements and atomic requirements are stored in requirements.registry.yml."
      - "Governed relationships are stored in graph.matrix.yml."

  - id: "DEC-0003"
    title: "Canonical SPO relationship model"
    status: "accepted"
    statement: >
      All governed relationships must be represented as Subject-Predicate-Object
      triples.
    rationale: >
      SPO triples provide a stable relationship model for deterministic
      validation, coherence checking, traceability, and future graph import.
    consequences:
      - "The graph matrix is the canonical source of governed relationships."
      - "Grouped fields are allowed only as derived or validated views."
      - "Future code must validate predicates and subject/object type compatibility."

  - id: "DEC-0004"
    title: "Validation commands as graph nodes"
    status: "accepted"
    statement: >
      Commands used to run validation checks are represented as governed graph
      nodes and linked through SPO triples.
    rationale: >
      Command tracking must remain compatible with the canonical SPO model and
      must not become a parallel free-form verification field.
    consequences:
      - "Validation commands are represented as Command nodes."
      - "Validation tools are represented as ValidationTool nodes."
      - "Gates, commands, tools, and config files are linked in graph.matrix.yml."

  - id: "DEC-0005"
    title: "Bidirectional implementation traceability"
    status: "accepted"
    statement: >
      Governed source files must be discovered by validation and implementation
      relationships must be consistent in both directions between graph.matrix.yml
      and source-file comments.
    rationale: >
      Traceability degrades if a source file can enter the repository without any
      requirement link, if the graph matrix claims a source file implements a
      requirement while the source file does not declare that traceability, or if
      source comments claim implementation that the matrix does not contain.
    consequences:
      - "Governed source files under controlled source roots must have IMPLEMENTED_BY graph traceability."
      - "IMPLEMENTED_BY triples from requirements to source files must be mirrored by source-file comments."
      - "Source-file comments that claim requirement implementation must be mirrored by IMPLEMENTED_BY triples."
      - "The initial validation level is file-level traceability; code-symbol traceability may be added later."

  - id: "DEC-0006"
    title: "Validation commands must match package scripts"
    status: "accepted"
    statement: >
      Command nodes that represent npm validation commands must be consistent
      with scripts declared in package.json.
    rationale: >
      The graph matrix must not advertise commands that cannot be executed, and
      package.json must not silently drift away from governed validation command
      nodes.
    consequences:
      - "Command nodes with npm run commands must reference existing package.json scripts."
      - "Governed validation scripts in package.json must have matching Command nodes."
      - "The project model validator checks package.json command consistency."

  - id: "DEC-0007"
    title: "Governed file format validation"
    status: "accepted"
    statement: >
      Governed YAML and Markdown files must be validated deterministically
      against baseline format rules and registered Markdown body profiles.
    rationale: >
      Folder structure and traceability are not sufficient if file bodies remain
      uncontrolled. File-format validation keeps governed documents predictable
      and parseable.
    consequences:
      - "Project model YAML files must satisfy baseline top-level format rules."
      - "Governed Markdown files must satisfy registered body profiles."
      - "docs:check runs the file format validator."

  - id: "DEC-0008"
    title: "Validator negative fixtures"
    status: "accepted"
    statement: >
      Deterministic validators must have controlled negative fixtures that prove
      invalid repository states are rejected.
    rationale: >
      Passing validators are not enough if there is no evidence that they fail
      when the governed model, commands, source traceability, YAML format, or
      Markdown body profiles are invalid.
    consequences:
      - "Negative fixture execution is part of docs:check."
      - "Each negative fixture must declare the expected validation failure."
      - "The negative fixture runner must fail when an invalid state is accepted."

  - id: "DEC-0009"
    title: "Default backend composition and API contract documentation pattern"
    status: "accepted"
    statement: >
      Backend implementation shall default to factory/composition-root based
      dependency composition, separated backend layers, and governed backend/API
      contracts as authoritative documentation sources.
    rationale: >
      The previous threat-forge project showed that factory-based composition,
      separated backend layers, and explicit API contracts reduce accidental
      coupling and keep implementation aligned with documentation.
    consequences:
      - "Controllers and route handlers must not instantiate concrete infrastructure adapters directly."
      - "Concrete dependencies must be assembled in factories or composition roots."
      - "Backend services should depend on ports or application boundaries instead of concrete adapters."
      - "Backend/API contracts must be treated as primary technical documentation for HTTP behavior."
      - "A future deterministic checker must enforce approved backend architecture patterns."

  - id: "DEC-0010"
    title: "Governance control is report-first and contract-first"
    status: "accepted"
    statement: >
      The governance control page shall be generated from a deterministic,
      machine-readable governance control report. The report contract is the
      shared source for the static page, future protected admin UI, CLI tools,
      backend APIs, and LLM consumers.
    rationale: >
      Building the visual page first would risk duplicating analysis logic and
      making the future admin UI diverge from CLI tools or LLM consumers. A
      contract-first report keeps every consumer aligned.
    consequences:
      - "The governance control report JSON contract is the canonical data interface."
      - "The static HTML page is a consumer of the report, not the source of truth."
      - "Future protected admin UI and backend APIs must consume or expose the same report model."
      - "JSON Schema is the canonical external contract for the report."
      - "Zod may be used for runtime validation inside TypeScript or JavaScript code, but it must not diverge from canonical JSON Schema or OpenAPI contracts."

  - id: "DEC-0011"
    title: "Project handoff archives are generated by a Node.js repository tool"
    status: "accepted"
    statement: >
      Project handoff archives shall be generated by a deterministic Node.js
      repository tool that includes .git and hidden project metadata while
      excluding dependency installations, generated artifacts, local IDE caches,
      and environment files by default.
    rationale: >
      A repository-owned tool avoids platform-specific archive behavior and gives
      human and LLM handoffs a repeatable archive policy on Windows, Linux, and
      macOS.
    consequences:
      - The handoff archive command is declared in package.json.
      - The archive policy includes .git by default.
      - Dependency installations and local caches are excluded by default.
      - Environment files remain excluded unless explicitly requested.

  - id: "DEC-0012"
    title: "Governed registries require explicit schemas and controlled datasets"
    status: "accepted"
    statement: >
      Each governed registry and graph matrix shall have an explicit
      machine-readable schema, and deterministic tools shall load the canonical
      schema files rather than relying only on hardcoded shape checks. Fields
      constrained to controlled values shall name their authoritative dataset or
      taxonomy.
    rationale: >
      Registry structure and controlled vocabularies are part of the project
      governance contract. If validator code alone defines registry shape, the
      schema can drift from documentation, datasets, editor support, and future
      tool consumers.
    consequences:
      - "Governance, requirements, and graph matrix registries require explicit schema files."
      - "Deterministic tools must read and validate against canonical registry schemas."
      - "Fields with controlled values must declare the authoritative dataset or taxonomy they use."
      - "Controlled value sets must document meaning, rationale, and validation impact before they become binding."

  - id: "DEC-0013"
    title: "Baseline artifacts require bidirectional traceability"
    status: "accepted"
    statement: >
      Governed baseline artifacts shall carry file-local change-control markers
      that identify the decision and requirement governing their current
      baseline role, and graph.matrix.yml shall contain matching relationships.
    rationale: >
      Source-file traceability alone does not protect registry, contract, schema,
      and graph artifacts. A baseline file can otherwise be modified or added
      without an internal marker that can be compared against the project graph.
    consequences:
      - "Governed baseline artifacts declare decided_by and satisfies markers."
      - "The project model validator checks marker-to-graph and graph-to-marker consistency."
      - "The initial enforcement covers the project-model registry files and can be extended to contract/schema roots."



  - id: "DEC-0014"
    title: "Governance registry schema analysis separates schema shape from semantic validation"
    status: "accepted"
    statement: >
      The governance registry schema design shall classify fields by structural
      shape, free text, controlled values, governed IDs, ID references, and
      semantic validation responsibilities before creating the explicit schema.
    rationale: >
      Creating the schema directly from current validator code would preserve
      hidden assumptions. A field-level analysis makes controlled datasets,
      hardcoded rules, and semantic validator boundaries visible before they
      become binding schema artifacts.
    consequences:
      - "The first registry schema step is a governed analysis document, not an immediate JSON Schema drop-in."
      - "The analysis documents which current validator rules are schema shape rules and which must remain semantic checks."
      - "Controlled value datasets must be identified before the governance registry schema becomes binding."

  - id: "DEC-0015"
    title: "Governance registry schema is a canonical JSON Schema baseline"
    status: "accepted"
    statement: >
      The governance registry schema shall be captured in a versioned JSON Schema
      artifact under docs/reference/project-model/schemas, with deterministic
      checks validating the schema artifact before validators migrate from
      hardcoded shape checks to schema-driven registry validation.
    rationale: >
      REQ-0021 requires explicit machine-readable registry schemas, and M000.022A
      classified the governance registry fields. Creating the first schema
      contract turns that analysis into a protected baseline artifact while
      keeping semantic cross-file validation in deterministic tools.
    consequences:
      - "docs/reference/project-model/schemas/governance-registry.schema.json becomes the canonical shape contract for governance.registry.yml."
      - "The schema declares structural constraints, field shapes, ID patterns, and initial controlled-value boundaries."
      - "Cross-file checks such as ID existence, graph consistency, package script existence, and source traceability remain semantic validator responsibilities."
      - "The schema carries file-local change-control metadata that is checked against graph.matrix.yml."


  - id: "DEC-0016"
    title: "Governance registry schema is executed by deterministic validation"
    status: "accepted"
    statement: >
      The documentation format validator shall load and apply the canonical
      Governance Registry JSON Schema to the parsed governance registry YAML
      document as part of docs:check.
    rationale: >
      A schema artifact that is only registered but not executed does not prevent
      registry drift. The schema must become validator input so structural
      changes are checked by the governed contract instead of only by hardcoded
      checks.
    consequences:
      - "docs:check:format validates governance.registry.yml against governance-registry.schema.json."
      - "A negative fixture proves that schema-rejected fields fail validation."
      - "Hardcoded semantic checks remain valid for cross-file references and graph consistency."

  - id: "DEC-0017"
    title: "Schema application must be bidirectionally traceable"
    status: "accepted"
    statement: >
      Canonical schema artifacts shall explicitly declare the governed artifact
      paths they apply to, governed artifacts shall declare their canonical
      schema, and graph.matrix.yml shall contain matching schema-to-artifact
      relationships.
    rationale: >
      A schema file can otherwise exist without being applied, or a validator can
      apply a schema through hardcoded paths without the governed graph recording
      that contract. Bidirectional schema application traceability makes schema
      coverage auditable and prevents silent drift between schemas and target
      artifacts.
    consequences:
      - "Schema artifacts declare x-applies_to target artifact paths."
      - "Governed artifacts declare schema_control metadata that points to their canonical schema."
      - "graph.matrix.yml records schema application relationships."
      - "The project model validator checks schema-to-artifact and artifact-to-schema consistency."


  - id: "DEC-0018"
    title: "Requirements registry schema analysis separates lifecycle data from semantic traceability"
    status: "accepted"
    statement: >
      The requirements registry schema design shall classify requirement fields,
      nested flow entities, lifecycle values, verification evidence, and
      cross-registry references before creating the explicit schema contract.
    rationale: >
      Requirements are the central governance objects for implementation,
      verification, and traceability. Creating their schema directly from current
      validator code would hide which fields are local shape constraints and
      which require semantic checks against capabilities, graph relationships,
      source files, commands, and evidence.
    consequences:
      - "The requirements registry schema starts with a field-level analysis document."
      - "Lifecycle and verification fields are mapped to explicit controlled datasets."
      - "Macro requirement implementation status remains manual, while every atomic requirement must reference an existing macro requirement."
      - "Requirement scope remains a high-governance controlled taxonomy and must not grow without rationale, validation impact, and graph-backed governance."
      - "Accepted requirements require acceptance criteria and verification."
      - "Implemented requirements require deterministic VERIFIED_BY evidence, with IMPLEMENTED_BY required when an implementation artifact is applicable."
      - "not_applicable implementation status is rationale-gated, constrained by requirement type, and decision-backed for important cases."
      - "Nested requirement entity ID rules remain semantic validator responsibilities where they depend on parent requirement IDs."

  - id: "DEC-0019"
    title: "Requirements registry schema is a canonical JSON Schema baseline"
    status: "accepted"
    statement: >
      The requirements registry schema shall be captured in a versioned JSON
      Schema artifact under docs/reference/project-model/schemas, with
      deterministic checks validating the schema artifact and schema application
      traceability before validators migrate additional requirements registry
      checks to schema-driven validation.
    rationale: >
      REQ-0027 classified the requirements registry fields and decided which
      fields are local shape constraints, controlled lifecycle values, governed
      nested IDs, or semantic cross-file validation responsibilities. Creating
      the schema artifact turns that analysis into a protected baseline contract
      without pretending to replace semantic graph validation.
    consequences:
      - "docs/reference/project-model/schemas/requirements-registry.schema.json becomes the canonical shape contract for requirements.registry.yml."
      - "The schema declares structural constraints, field shapes, ID patterns, and the high-governance boundary for controlled fields such as scope."
      - "Cross-file checks such as macro existence, capability existence, parent-specific nested IDs, graph consistency, and implemented requirement evidence remain semantic validator responsibilities."
      - "The schema carries file-local change-control metadata and x-applies_to so schema application traceability can be checked bidirectionally."


  - id: "DEC-0020"
    title: "Requirements registry schema is executed by deterministic validation"
    status: "accepted"
    statement: >
      The documentation format validator shall load and apply the canonical
      Requirements Registry JSON Schema to the parsed requirements registry YAML
      document as part of docs:check.
    rationale: >
      A requirements registry schema that is only registered and traceable does
      not prevent structural drift in atomic requirements, macro requirements,
      nested flows, acceptance criteria, or verification fields. The schema must
      become validator input so requirements registry shape changes are checked
      by the governed contract before semantic graph validation runs.
    consequences:
      - "docs:check:format validates requirements.registry.yml against requirements-registry.schema.json."
      - "A negative fixture proves that schema-rejected requirements registry fields fail validation."
      - "Semantic checks for macro ownership, capability references, graph evidence, and implementation evidence remain in project-model validation."




  - id: "DEC-0021"
    title: "Graph matrix schema analysis separates local shape from semantic graph validation"
    status: "accepted"
    statement: >
      The graph matrix schema design shall classify graph.matrix.yml fields,
      node records, SPO triples, controlled graph vocabulary, repository path
      checks, command checks, and cross-artifact traceability before creating
      the explicit graph matrix schema contract.
    rationale: >
      The graph matrix is the central traceability surface for decisions,
      requirements, schemas, source files, commands, gates, tools, and governed
      documents. Creating its schema directly from current validator code would
      hide which rules are local YAML shape constraints and which depend on the
      governance registry, requirements registry, package manifest, repository
      filesystem, or source-file JSDoc.
    consequences:
      - "The graph matrix schema rollout starts with a field-level analysis document."
      - "Local matrix shape rules are separated from semantic graph checks."
      - "Predicate and node-type compatibility remain governed by governance.registry.yml, not by a second hidden schema enum."
      - "Repository path checks, command checks, schema application checks, baseline artifact checks, and source-file traceability remain deterministic semantic validator responsibilities."
      - "The future graph matrix schema step must add schema_control to graph.matrix.yml and register graph-matrix.schema.json as an applied SchemaFile."

  - id: "DEC-0022"
    title: "Graph matrix schema is a canonical JSON Schema baseline"
    status: "accepted"
    statement: >
      The graph matrix schema shall be captured in a versioned JSON Schema
      artifact under docs/reference/project-model/schemas, with deterministic
      checks validating the schema artifact and schema application traceability
      before graph.matrix.yml is validated by schema-driven execution.
    rationale: >
      REQ-0030 classified graph matrix fields and established that local YAML
      shape belongs in JSON Schema while predicate compatibility, entity
      existence, package command existence, repository path checks, baseline
      artifact checks, schema application traceability, and source-file
      traceability remain semantic validator responsibilities. Creating the
      schema artifact turns that analysis into a protected baseline without
      duplicating the graph vocabulary inside the schema.
    consequences:
      - "docs/reference/project-model/schemas/graph-matrix.schema.json becomes the canonical shape contract for graph.matrix.yml."
      - "The schema declares structural constraints for matrix metadata, nodes, triples, change_control, and schema_control."
      - "Predicate and node-type existence are still checked semantically against governance.registry.yml."
      - "The schema carries file-local change-control metadata and x-applies_to so schema application traceability can be checked bidirectionally."


  - id: "DEC-0023"
    title: "Graph matrix schema is executed by deterministic validation"
    status: "accepted"
    statement: >
      The documentation format validator shall load and apply the canonical Graph
      Matrix JSON Schema to the parsed graph matrix YAML document as part of
      docs:check.
    rationale: >
      A graph matrix schema that is only registered and traceable does not
      prevent structural drift in matrix metadata, node records, triple records,
      schema_control, or change_control fields. The schema must become validator
      input so local graph matrix shape changes are checked by the governed
      contract before semantic graph validation runs.
    consequences:
      - "docs:check:format validates graph.matrix.yml against graph-matrix.schema.json."
      - "A negative fixture proves that schema-rejected graph matrix fields fail validation."
      - "Predicate compatibility, entity existence, package command checks, repository path checks, schema application traceability, baseline artifact checks, and source-file traceability remain semantic validator responsibilities."


  - id: "DEC-0024"
    title: "Governed artifact schema validation has a single execution entrypoint"
    status: "accepted"
    statement: >
      tools/docs/check-docs-format.mjs and docs:check:format are the canonical
      deterministic execution path for governed artifact JSON Schema validation.
      Other validators must not duplicate artifact JSON Schema validation logic;
      they may validate semantic consistency, schema application traceability,
      graph relationships, source-file references, package commands, repository
      paths, and lifecycle evidence.
    rationale: >
      Governance, requirements, and graph matrix schemas now have executable
      validation. Without an explicit entrypoint decision, future tools could
      reimplement schema validation independently and drift from the canonical
      diagnostics or supported JSON Schema subset.
    consequences:
      - "tools/docs/check-docs-format.mjs remains the schema execution boundary for governed artifacts."
      - "docs:check:format is the command-level schema validation entrypoint."
      - "tools/docs/check-project-model.mjs remains responsible for semantic and bidirectional traceability checks."
      - "New schema-controlled artifacts must extend the format validator rather than introduce duplicate schema validators."



  - id: "DEC-0025"
    title: "Project model modularization uses governed areas and clean migration"
    status: "accepted"
    statement: >
      Requirements, graph traceability, and decisions shall be modularized by
      governed project-model area using canonical composite identifiers in the
      form <area_id>:<local_id>. The `area_id` value shall be controlled by an
      explicit `project_model_areas` taxonomy, aligned with capabilities where
      useful but not derived from capability_id automatically.
    rationale: >
      requirements.registry.yml, graph.matrix.yml, and governance.registry.yml
      are growing together. A requirements-only split would leave graph triples
      and decisions as monolithic scaling bottlenecks. A governed area boundary
      gives requirements, graph parts, and decisions the same ownership model
      while allowing local identifier sequences to restart safely. Since the
      project is before first release, clean coordinated breaking changes are
      preferable to preserving long-term compatibility with the current
      monolithic layout.
    consequences:
      - "Future modular requirements, graph, and decision files use central indexes and area-owned parts."
      - "Canonical references use <area_id>:<local_id> once modular loaders are introduced."
      - "The project_model_areas taxonomy must be introduced with deterministic validation, bidirectional implementation traceability, and negative fixture evidence before broad use."
      - "check-docs-format.mjs remains the JSON Schema validation entrypoint, while check-project-model.mjs aggregates modular parts and validates semantics."
      - "Long-term compatibility with the monolithic layout is not a requirement during the pre-release migration."


  - id: "DEC-0026"
    title: "Project model areas are an explicit controlled taxonomy"
    status: "accepted"
    statement: >
      The project_model_areas taxonomy shall be declared explicitly in the
      governance registry with described, rationalized, and validation-impactful
      values. Area identifiers shall not be inferred automatically from
      capability_id values.
    rationale: >
      Modular project-model files need a physical ownership boundary for
      requirements, graph triples, and decisions. Product capabilities describe
      functional scope, while project-model areas describe file modularization
      and loading boundaries. Keeping them separate prevents capability changes
      from silently moving governed records between files.
    consequences:
      - "taxonomies.project_model_areas becomes the controlled value set for future area_id fields."
      - "Every project_model_areas value carries description, rationale, and validation impact before broad use."
      - "Future schema and loader work shall validate area_id shape through check-docs-format.mjs and semantic membership through check-project-model.mjs."
      - "Negative fixture coverage for invalid area_id values is required before modular parts rely on the taxonomy broadly."

document_types:
  - id: "tutorial"
    diataxis_section: "tutorials"
    description: >
      Learning-oriented document that guides the reader through a practical path.
    body_profile_id: "BODY-TUTORIAL"

  - id: "how-to"
    diataxis_section: "how-to"
    description: >
      Task-oriented procedure for achieving a specific result.
    body_profile_id: "BODY-HOW-TO"

  - id: "reference"
    diataxis_section: "reference"
    description: >
      Information-oriented technical specification, registry, matrix, or contract.
    body_profile_id: "BODY-REFERENCE"

  - id: "explanation"
    diataxis_section: "explanation"
    description: >
      Understanding-oriented document explaining context, rationale, or concepts.
    body_profile_id: "BODY-EXPLANATION"

  - id: "decision-record"
    diataxis_section: "explanation"
    description: >
      Decision-oriented explanation document or registered decision entry.
    body_profile_id: "BODY-DECISION"

body_profiles:
  - id: "BODY-TUTORIAL"
    description: "Required body structure for tutorial documents."
    required_headings:
      - "Goal"
      - "Prerequisites"
      - "Steps"
      - "Result"
    forbidden_headings: []

  - id: "BODY-HOW-TO"
    description: "Required body structure for how-to documents."
    required_headings:
      - "Purpose"
      - "Procedure"
      - "Verification"
    forbidden_headings: []

  - id: "BODY-REFERENCE"
    description: "Required body structure for reference documents."
    required_headings:
      - "Purpose"
      - "Schema"
      - "Rules"
    forbidden_headings: []

  - id: "BODY-EXPLANATION"
    description: "Required body structure for explanation documents."
    required_headings:
      - "Context"
      - "Explanation"
      - "Consequences"
    forbidden_headings: []

  - id: "BODY-DECISION"
    description: "Required body structure for decision record documents."
    required_headings:
      - "Status"
      - "Context"
      - "Decision"
      - "Consequences"
    forbidden_headings: []

node_types:
  - id: "Capability"
    description: "Product capability or product area."

  - id: "Taxonomy"
    description: "Governed controlled value set with explicit value descriptions and deterministic validation responsibilities."

  - id: "MacroRequirement"
    description: "High-level requirement decomposed into atomic requirements."

  - id: "Requirement"
    description: "Atomic, verifiable requirement."

  - id: "Decision"
    description: "Accepted, proposed, superseded, or rejected project decision."

  - id: "Document"
    description: "Governed documentation artifact or documentation directory."

  - id: "SourceFile"
    description: "Implementation source file."

  - id: "SchemaFile"
    description: "Machine-readable schema artifact that defines structural validation for a governed target artifact."

  - id: "TestFile"
    description: "Automated test file."

  - id: "ConfigFile"
    description: "Configuration file, package manifest, hook, or tool configuration."

  - id: "Gate"
    description: "Validation gate or commit-blocking check."

  - id: "Command"
    description: "Executable command used to run a validation tool or gate."

  - id: "ValidationTool"
    description: "Deterministic tool used to validate repository artifacts."

  - id: "CodeSymbol"
    description: "Future function, class, method, or exported symbol inside a source file."

  - id: "AcceptanceCriterion"
    description: "Observable criterion used to accept a requirement."

  - id: "Precondition"
    description: "Condition that must hold before a requirement flow starts."

  - id: "Postcondition"
    description: "Condition that must hold after a requirement flow completes."

  - id: "FlowStep"
    description: "Main or alternative flow step."

  - id: "AlternativeFlow"
    description: "Alternative flow associated with an atomic requirement."

predicates:
  - id: "CONTAINS"
    description: "The subject structurally contains the object."
    allowed_subject_types:
      - "MacroRequirement"
      - "Requirement"
    allowed_object_types:
      - "Requirement"
      - "AcceptanceCriterion"
      - "Precondition"
      - "Postcondition"
      - "FlowStep"
      - "AlternativeFlow"

  - id: "BELONGS_TO_CAPABILITY"
    description: "The requirement belongs to a product capability."
    allowed_subject_types:
      - "Requirement"
      - "MacroRequirement"
    allowed_object_types:
      - "Capability"

  - id: "DECIDES"
    description: "The decision establishes or chooses the object."
    allowed_subject_types:
      - "Decision"
    allowed_object_types:
      - "Requirement"
      - "MacroRequirement"
      - "Document"
      - "Capability"
      - "Taxonomy"
      - "ValidationTool"
      - "Gate"
      - "Command"

  - id: "SUPPORTS"
    description: "The subject supports the object."
    allowed_subject_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"
      - "Document"
    allowed_object_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"
      - "Document"
      - "Gate"
      - "ValidationTool"

  - id: "CONFLICTS_WITH"
    description: "The subject conflicts with the object and requires review."
    allowed_subject_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"
      - "Document"
    allowed_object_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"
      - "Document"

  - id: "SUPERSEDES"
    description: "The subject replaces the object."
    allowed_subject_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"
    allowed_object_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"

  - id: "SPECIFIED_BY"
    description: "The subject is specified by a reference document or registry."
    allowed_subject_types:
      - "Capability"
      - "MacroRequirement"
      - "Requirement"
      - "Decision"
      - "Taxonomy"
      - "Gate"
      - "ValidationTool"
      - "Command"
    allowed_object_types:
      - "Document"
      - "ConfigFile"
      - "SchemaFile"

  - id: "EXPLAINED_BY"
    description: "The subject is explained by an explanatory document."
    allowed_subject_types:
      - "Capability"
      - "MacroRequirement"
      - "Requirement"
      - "Decision"
      - "Gate"
      - "ValidationTool"
      - "Command"
    allowed_object_types:
      - "Document"

  - id: "APPLIES_TO"
    description: "The schema file defines the structural validation contract for the target governed artifact."
    allowed_subject_types:
      - "SchemaFile"
    allowed_object_types:
      - "Document"
      - "ConfigFile"


  - id: "DEPENDS_ON"
    description: "The subject depends on the object and should be evaluated after or together with it."
    allowed_subject_types:
      - "Requirement"
      - "MacroRequirement"
      - "Decision"
      - "Document"
      - "ValidationTool"
      - "Gate"
      - "Command"
    allowed_object_types:
      - "Requirement"
      - "MacroRequirement"
      - "Decision"
      - "Document"
      - "ValidationTool"
      - "Gate"
      - "Command"

  - id: "IMPLEMENTED_BY"
    description: "The subject is implemented by a source file, configuration file, or future code symbol."
    allowed_subject_types:
      - "Requirement"
      - "Gate"
      - "ValidationTool"
    allowed_object_types:
      - "SourceFile"
      - "ConfigFile"
      - "CodeSymbol"

  - id: "VERIFIED_BY"
    description: "The requirement or acceptance criterion is verified by a test file or validation gate."
    allowed_subject_types:
      - "Requirement"
      - "AcceptanceCriterion"
    allowed_object_types:
      - "TestFile"
      - "Gate"

  - id: "HAS_COMMAND"
    description: "The subject exposes or is executed through the command."
    allowed_subject_types:
      - "Gate"
      - "ValidationTool"
    allowed_object_types:
      - "Command"

  - id: "RUNS_TOOL"
    description: "The command runs the validation tool."
    allowed_subject_types:
      - "Command"
    allowed_object_types:
      - "ValidationTool"

  - id: "DECLARED_IN"
    description: "The subject is declared in a configuration file."
    allowed_subject_types:
      - "Command"
      - "Gate"
    allowed_object_types:
      - "ConfigFile"

  - id: "VALIDATES"
    description: "The validation tool or gate validates the object."
    allowed_subject_types:
      - "ValidationTool"
      - "Gate"
    allowed_object_types:
      - "Document"
      - "ConfigFile"
      - "SourceFile"
      - "Requirement"
      - "MacroRequirement"
      - "Taxonomy"
