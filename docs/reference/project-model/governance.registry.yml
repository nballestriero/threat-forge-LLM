      - "Consequences"
    forbidden_headings: []

node_types:
  - id: "Capability"
    description: "Product capability or product area."

  - id: "Taxonomy"
    description: "Governed controlled value set with explicit value descriptions and deterministic
      validation responsibilities."

  - id: "MacroRequirement"
    description: "High-level requirement decomposed into atomic requirements."

  - id: "Requirement"
    description: "Atomic, verifiable requirement."

  - id: "Decision"
    description: "Accepted, proposed, superseded, or rejected project decision."

  - id: "Document"
    description: "Governed documentation artifact or documentation directory."

  - id: "SourceFile"
    description: "Implementation source file."

  - id: "SchemaFile"
    description: "Machine-readable schema artifact that defines structural validation for a governed
      target artifact."

  - id: "TestFile"
    description: "Automated test file."

  - id: "ConfigFile"
    description: "Configuration file, package manifest, hook, or tool configuration."

  - id: "Gate"
    description: "Validation gate or commit-blocking check."

  - id: "Command"
    description: "Executable command used to run a validation tool or gate."

  - id: "ValidationTool"
    description: "Deterministic tool used to validate repository artifacts."

  - id: "CodeSymbol"
    description: "Future function, class, method, or exported symbol inside a source file."

  - id: "AcceptanceCriterion"
    description: "Observable criterion used to accept a requirement."

  - id: "Precondition"
    description: "Condition that must hold before a requirement flow starts."

  - id: "Postcondition"
    description: "Condition that must hold after a requirement flow completes."

  - id: "FlowStep"
    description: "Main or alternative flow step."

  - id: "AlternativeFlow"
    description: "Alternative flow associated with an atomic requirement."

predicates:
  - id: "CONTAINS"
    description: "The subject structurally contains the object."
    allowed_subject_types:
      - "MacroRequirement"
      - "Requirement"
    allowed_object_types:
      - "Requirement"
      - "AcceptanceCriterion"
      - "Precondition"
      - "Postcondition"
      - "FlowStep"
      - "AlternativeFlow"

  - id: "BELONGS_TO_CAPABILITY"
    description: "The requirement belongs to a product capability."
    allowed_subject_types:
      - "Requirement"
      - "MacroRequirement"
    allowed_object_types:
      - "Capability"

  - id: "DECIDES"
    description: "The decision establishes or chooses the object."
    allowed_subject_types:
      - "Decision"
    allowed_object_types:
      - "Requirement"
      - "MacroRequirement"
      - "Document"
      - "Capability"
      - "Taxonomy"
      - "ValidationTool"
      - "Gate"
      - "Command"

  - id: "SUPPORTS"
    description: "The subject supports the object."
    allowed_subject_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"
      - "Document"
    allowed_object_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"
      - "Document"
      - "Gate"
      - "ValidationTool"

  - id: "CONFLICTS_WITH"
    description: "The subject conflicts with the object and requires review."
    allowed_subject_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"
      - "Document"
    allowed_object_types:
      - "Decision"
      - "Requirement"
      - "MacroRequirement"
