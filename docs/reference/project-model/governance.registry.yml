      - "ConfigFile"
      - "SchemaFile"

  - id: "EXPLAINED_BY"
    description: "The subject is explained by an explanatory document."
    allowed_subject_types:
      - "Capability"
      - "MacroRequirement"
      - "Requirement"
      - "Decision"
      - "Gate"
      - "ValidationTool"
      - "Command"
    allowed_object_types:
      - "Document"

  - id: "APPLIES_TO"
    description: "The schema file defines the structural validation contract for the target governed
      artifact."
    allowed_subject_types:
      - "SchemaFile"
    allowed_object_types:
      - "Document"
      - "ConfigFile"


  - id: "DEPENDS_ON"
    description: "The subject depends on the object and should be evaluated after or together with
      it."
    allowed_subject_types:
